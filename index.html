function fetchArrATIS() {
  const fl = state.flights ? (state.flights[state.flightIdx] || {}) : (state.flight || {});
  const rawDiv  = document.getElementById('arr-atis-raw');
  const atisSel = document.getElementById('arr-atis-sel');
  const tempInp = document.getElementById('arr-temp-inp');
  const dewInp  = document.getElementById('arr-dew-inp');
  const wdirInp = document.getElementById('arr-wdir-inp');
  const wspdInp = document.getElementById('arr-wspd-inp');
  const gustInpArr = document.getElementById('arr-gust-inp');
  const ceilInp = document.getElementById('arr-ceil-inp');
  const visInp  = document.getElementById('arr-vis-inp');
  if (!rawDiv) return;
  const icao = fl.arrCity || '';
  const ICAO_MAP = {PHX:'KPHX',LAX:'KLAX',DFW:'KDFW',CLT:'KCLT',JFK:'KJFK',MIA:'KMIA',LHR:'EGLL',NRT:'RJAA',HND:'RJTT',SYD:'YSSY',AKL:'NZAA',ICN:'RKSI'};
  const icaoCode = ICAO_MAP[icao] || icao;
  rawDiv.textContent = 'Fetching...';

  const fill = (text) => {
    rawDiv.textContent = text;
    setFlight('arrAtisRaw', text);
    // ATIS letter
    const infoM = text.match(/INFORMATION\s+([A-Z])/i) || text.match(/INFO\s+([A-Z])/i);
    if (infoM && atisSel) { setFlight('arrAtis', infoM[1].toUpperCase()); Array.from(atisSel.options).forEach(o=>{ o.selected = o.value===infoM[1].toUpperCase(); }); }
    // Wind: 27015KT or WIND 270/15, with optional gust G25
    const windM = text.match(/(\d{3})(\d{2,3})(?:G(\d{2,3}))?KT/i) || text.match(/WIND\s+(\d{3})\/(\d{1,3})/i);
    if (windM) {
      const dir = windM[1].padStart(3,'0'), spd = String(parseInt(windM[2]));
      const gust = windM[3] ? String(parseInt(windM[3])) : '';
      setFlight('arrWindDir', dir); setFlight('arrWindSpd', spd);
      if (wdirInp) wdirInp.value = dir;
      if (wspdInp) wspdInp.value = spd;
      if (gust) { setFlight('arrWindGust', gust); if (gustInpArr) gustInpArr.value = gust; }
    }
    // Temp/Dew: 20/10 or T20/M02
    const tdM = text.match(/(-?\d{1,2})\/M?(-?\d{1,2})/) || text.match(/TEMP\s+(-?\d+)/i);
    if (tdM) {
      const t = tdM[1], dew = tdM[2];
      if (t !== undefined) { setFlight('arrTemp', t); if (tempInp) tempInp.value = t; }
      if (dew !== undefined) { setFlight('arrDew', dew.replace('M','-')); if (dewInp) dewInp.value = dew.replace('M','-'); }
    }
    // Ceiling: BKN030 OVC010 etc — pick lowest
    const skyM = [...text.matchAll(/(?:BKN|OVC|FEW|SCT)(\d{3})/gi)];
    if (skyM.length) {
      const lowest = skyM.reduce((a,b) => parseInt(a[1]) < parseInt(b[1]) ? a : b);
      const ceilVal = lowest[0].slice(0,3).toUpperCase() + String(parseInt(lowest[1])*100);
      setFlight('arrCeiling', ceilVal); if (ceilInp) ceilInp.value = ceilVal;
    }
    // Visibility
    const visM = text.match(/(\d+(?:\/\d+)?\s*SM)/i) || text.match(/(\d+)\s+SM/i);
    if (visM) { setFlight('arrVis', visM[1]); if (visInp) visInp.value = visM[1]; }
    // QNH: A2992 or Q1013
    const qnhM = text.match(/\bA(\d{4})\b/) || text.match(/\bQ(\d{4})\b/);
    if (qnhM) {
      const qnh = qnhM[0][0]==='A' ? (parseInt(qnhM[1])/100).toFixed(2) : qnhM[1];
      setFlight('arrQnh', qnh);
      const qnhEl = document.getElementById('arr-qnh-inp'); if (qnhEl) qnhEl.value = qnh;
    }
  };

  const relayUrl2  = 'https://www.atisrelay.com/api/atis/' + icaoCode;
  const guruUrl2   = 'https://api.atis.guru/v1/stations/' + icaoCode;
  const datisUrl2  = 'https://datis.clowd.io/api/' + icaoCode;
  const metarBase2 = 'https://aviationweather.gov/api/data/metar?ids=' + icaoCode + '&format=json&taf=false';
  const proxyUrl2  = 'https://corsproxy.io/?' + encodeURIComponent(metarBase2);

  const tryMetar2 = () => {
    fetch(proxyUrl2)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const m=Array.isArray(data)?data[0]:data; const raw=m&&(m.rawOb||m.raw_text)||''; if(!raw) throw new Error(); fill('(METAR) '+raw); })
      .catch(() => {
        fetch(metarBase2)
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(data => { const m=Array.isArray(data)?data[0]:data; const raw=m&&(m.rawOb||m.raw_text)||''; if(raw) fill('(METAR) '+raw); else throw new Error(); })
          .catch(() => { if(rawDiv) rawDiv.textContent = 'Could not fetch — enter manually'; });
      });
  };

  const tryDatis2 = () => {
    fetch(datisUrl2)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const a=Array.isArray(data)?data[0]:data; const t=a.datis||a.text||''; if(!t) throw new Error(); fill(t); })
      .catch(() => tryMetar2());
  };

  const tryGuru2 = () => {
    fetch(guruUrl2)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const entry=Array.isArray(data)?data[0]:data; const text=entry.atis||entry.text||entry.atis_raw||''; if(!text) throw new Error(); fill(text); })
      .catch(() => tryDatis2());
  };

  fetch(relayUrl2)
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      const text = data.atis || data.text || data.raw || (Array.isArray(data.atis_body)?data.atis_body.join(' '):'') || '';
      if (!text) throw new Error();
      fill(text);
    })
    .catch(() => tryGuru2());
}

function updateLayoverCountdown() {
  if (tab !== 'layover') return;
  const lay = state.layover || {};
  const el = document.getElementById('layover-countdown');
  if (!el) return;
  const pickupDate = lay.pickupDate || '';
  const pickupTime = lay.pickupTime || '';
  if (!pickupDate || !pickupTime) { el.textContent = '—'; return; }
  const pickupMs = new Date(pickupDate + 'T' + pickupTime + ':00').getTime();
  if (isNaN(pickupMs)) { el.textContent = '??'; return; }
  const diffMs = pickupMs - Date.now();
  if (diffMs <= 0) {
    el.textContent = diffMs > -3600000 ? 'NOW' : 'DEPARTED';
    el.style.color = 'var(--red)';
    return;
  }
  const totalSecs = Math.floor(diffMs / 1000);
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  const s = totalSecs % 60;
  el.textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  el.style.color = totalSecs < 3600 ? 'var(--red)' : totalSecs < 7200 ? 'var(--amber)' : 'var(--green)';
}
setInterval(updateLayoverCountdown, 1000);


function fmtTime(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 4) v = v.slice(0, 4);
  if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2);
  el.value = v;
  // Validate range
  if (v.length === 5) {
    const [h, m] = v.split(':').map(Number);
    el.style.borderColor = (h < 24 && m < 60) ? 'var(--border2)' : 'var(--red)';
  } else {
    el.style.borderColor = 'var(--border2)';
  }
}

function validTime(v) {
  if (!v || v.length !== 5 || v[2] !== ':') return false;
  const [h, m] = v.split(':').map(Number);
  return h >= 0 && h < 24 && m >= 0 && m < 60;
}


function updateDepInTimer() {
  const el = document.getElementById('dep-in-timer');
  if (!el) return;
  const fl = currentFlight();
  if (!fl.depDate || !fl.depTime) return;
  try {
    const depMs = new Date(fl.depDate + 'T' + fl.depTime + ':00').getTime();
    const diff = depMs - Date.now();
    const abs = Math.abs(diff);
    const past = diff < 0;
    const h = Math.floor(abs / 3600000);
    const m = Math.floor((abs % 3600000) / 60000);
    const mins = diff / 60000;
    el.textContent = (past ? '-' : '') + (h > 0 ? h + 'h ' : '') + m + 'm';
    el.style.color = mins <= 0 ? 'var(--red)' : mins < 15 ? 'var(--amber)' : 'var(--green)';
  } catch(e) {}
}

  function runParse(text) {
    if (!text || text.trim().length < 20) { showFplStatus('No text to parse — paste the flight plan first.', 'error'); return; }
    const result = parseCCIFlightPlan(text);
    if (!result || Object.keys(result).length === 0) { showFplStatus('Could not find flight plan data. Make sure you pasted the full CCI plan.', 'error'); return; }
    // Handle ORV — save to state; renderPreflight will draw the card on next render
    if (result.orv) {
      setFlight('orv', result.orv);
      delete result.orv;
    }
    // Apply all other parsed fields
    Object.entries(result).forEach(([k, v]) => { if (v !== null && v !== undefined && v !== '') setFlight(k, String(v)); });
    const count = Object.keys(result).length;
    showFplStatus('✓ Filled ' + count + ' fields from flight plan.', 'success');
    // Close popup and re-render so ORV card and all parsed fields appear immediately
    setTimeout(() => {

    }, 800);
  }

}

// ── ORV table renderer — top-level so renderPreflight can call it too ─────────
function renderORVTable(rows, container) {
  // container: a DOM element to render into (required — no body fallback)
  if (!container || !rows || !rows.length) return;
  const COLS = ['TO IDENT','LAT','LONG','TC','MC','MH','DIST'];
  const KEYS = ['ident','lat','lon','tc','mc','mh','dist'];
  const tbl = document.createElement('table');
  tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:11px;font-family:SF Mono,monospace';
  // Header row
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  hr.style.cssText = 'background:var(--surf2,#1e2229)';
  COLS.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c;
    th.style.cssText = 'padding:6px 8px;text-align:center;color:var(--text3,#8899aa);font-size:10px;font-weight:700;letter-spacing:0.5px;white-space:nowrap;border-bottom:1px solid var(--border,#2a3040)';
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  tbl.appendChild(thead);
  // Data rows
  const tbody = document.createElement('tbody');
  rows.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.style.cssText = i % 2 === 0 ? 'background:var(--surf,#161b22)' : 'background:var(--surf2,#1e2229)';
    KEYS.forEach((k, ki) => {
      const td = document.createElement('td');
      td.textContent = row[k] || '—';
      td.style.cssText = 'padding:6px 8px;text-align:center;color:var(--text,' + (ki===0?'#e6edf3':'#cdd9e5') + ');white-space:nowrap;border-bottom:1px solid var(--border,#2a3040)';
      if (ki === 0) td.style.fontWeight = '700';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  container.innerHTML = '';
  container.appendChild(tbl);
}

function parseCCIFlightPlan(text) {
  const result = {};
  const lines = text.split(/\r?\n/);
  const get = (pattern, group) => { for (const l of lines) { const m = l.match(pattern); if (m) return m[group || 1].trim(); } return null; };

  // ── Flight number: "AAL195" or leading 4-digit fallback "0195/12APR" ──────
  // Prefer the explicit AAL designation anywhere in the plan
  const fltLine = get(/\bAAL(\d+)\b/i);
  if (fltLine) result.flightNum = fltLine;
  else { const m2 = get(/\b(\d{4})\/\d{2}[A-Z]{3}/); if (m2) result.flightNum = m2; }

  // ── Date: "12APR" → "YYYY-MM-DD" ─────────────────────────────────────────
  for (const l of lines) {
    const m = l.match(/\b(\d{1,2})(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\b/i);
    if (m) {
      result.depDate = `${new Date().getFullYear()}-${MONTH_NUM[m[2].toUpperCase()]}-${m[1].padStart(2,'0')}`;
      break;
    }
  }

  // ── Dep time: 0805Z → 08:05 ──────────────────────────────────────────────
  const depTime = get(/(\d{4})Z/);
  if (depTime) result.depTime = depTime.slice(0,2) + ':' + depTime.slice(2);

  // ── Airports: EGLL→LHR, KPHX→PHX etc ────────────────────────────────────
  const ICAO_MAP = {'EGLL':'LHR','KPHX':'PHX','KLAX':'LAX','KDFW':'DFW','KCLT':'CLT','KJFK':'JFK','KMIA':'MIA','RJAA':'NRT','RJTT':'HND','YSSY':'SYD','NZAA':'AKL','RKSI':'ICN'};
  for (const l of lines) {
    const m = l.match(/IFR\s+AAL\d+\/\d+[^-]+-\s+(\w{4})\s+(\w{3,4})\s+ALTN/i) ||
              l.match(/(\w{4})-(\w{4})\s+AAL/i);
    if (m) {
      result.depCity = ICAO_MAP[m[1]] || m[1].replace(/^K/,'').replace(/^E/,'');
      result.arrCity = ICAO_MAP[m[2]] || m[2].replace(/^K/,'').replace(/^E/,'');
      break;
    }
  }

  // ── A/C Type: 777-200 or 777-300 ─────────────────────────────────────────
  const acRaw = get(/\*\*\*\s*(777-\d00(?:ER)?)\s*\*\*\*/i);
  if (acRaw) result.acType = acRaw.includes('300') ? '777-300ER' : '777-200ER';

  // ── Weights (in thousands, e.g. "604.3") ─────────────────────────────────
  // PTOW ATOW ZFW FUEL line: "12C 604.3 607.3 403.6 203.0P"
  for (const l of lines) {
    const m = l.match(/(\d+)C\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)P/);
    if (m) {
      result.temp      = m[1];
      result.ptow      = m[2];
      result.atow      = m[3]; // RMP/ATOW
      // m[4] = ZFW — not filled
      result.fuelBlock = m[5]; // flight planned fuel → Block field
      break;
    }
  }

  // ── Temp ─────────────────────────────────────────────────────────────────
  if (!result.temp) { const t = get(/\bTEMP\s+(-?\d+)C/i); if (t) result.temp = t; }

  // ── EPR (MAX line) ────────────────────────────────────────────────────────
  const eprMax = get(/\*MAX\*\s+EPR.*?([\d.]{5})/);
  if (eprMax) result.epr = eprMax;

  // ── First runway entry: RWY FLAP EPR V1 VR V2 ────────────────────────────
  for (const l of lines) {
    // e.g. "27R 05 ON 1.456 160 164 167 34C 631.6T"
    const m = l.match(/^\s*([\dLR]{2,4}[X-Z]?)\s+(0?5|1[05]|20|25|30)\s+ON\s+([\d.]+)\s+(\d{3})\s+(\d{3})\s+(\d{3})/);
    if (m && !result.rwy) {
      result.rwy   = m[1];
      result.flaps = m[2];
      result.epr   = result.epr || m[3];
      result.v1    = m[4];
      result.vr    = m[5];
      result.v2    = m[6];
    }
  }

  // ── Performance mode: MAX power if "*MAX*" present ────────────────────────
  if (text.includes('*MAX*')) result.perf1 = 'MAX';

  // ── WBD header block: power setting, runway condition, planned temp, PTOW, ATOW ──
  // Format:  *** 777-200 *** TO1 DRY ***
  //          TEMP PTOW ATOW ZFW FUEL
  //          12C  604.3 607.3 403.6 203.0P
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    // Power setting + runway condition line: e.g. "*** 777-200 *** TO1 DRY ***"
    const powerMatch = l.match(/\*\*\*\s*[\w-]+\s*\*\*\*\s+(TO\d?)\s+(DRY|WET)\s*\*\*\*/i);
    if (powerMatch) {
      result.perf1 = powerMatch[1].toUpperCase().replace('TO', 'TO-').replace('TO-0','TO').replace('TO-1','TO-1').replace('TO-2','TO-2');
      // Normalize: TO stays TO, TO1→TO-1, TO2→TO-2
      const raw = powerMatch[1].toUpperCase();
      if (raw === 'TO') result.perf1 = 'TO';
      else if (raw === 'TO1') result.perf1 = 'TO-1';
      else if (raw === 'TO2') result.perf1 = 'TO-2';
      result.perf2 = powerMatch[2].charAt(0).toUpperCase() + powerMatch[2].slice(1).toLowerCase(); // Dry/Wet
    }
    // Planned temp from WBD data line: "TEMP PTOW ATOW ZFW FUEL" header then values
    if (/^\s*TEMP\s+PTOW\s+ATOW\s+ZFW/i.test(l) && lines[i+1]) {
      const vals = lines[i+1].trim().split(/\s+/);
      // vals: [temp, ptow, atow, zfw, fuel...]  e.g. 12C 604.3 607.3 403.6 203.0P
      if (vals.length >= 3) {
        const tempRaw = vals[0].replace(/C$/i,'');
        if (!isNaN(parseFloat(tempRaw))) result.plannedTemp = tempRaw;
        const ptowVal = parseFloat(vals[1]);
        if (!isNaN(ptowVal)) result.ptow = ptowVal.toFixed(1);
        const atowVal = parseFloat(vals[2]);
        if (!isNaN(atowVal)) result.atow = atowVal.toFixed(1);
        if (vals[3]) { const zfwVal = parseFloat(vals[3]); if (!isNaN(zfwVal)) result.zfw = zfwVal.toFixed(1); }
      }
    }
  }

  // ── THRUST / V-SPEED section: grab first data row ─────────────────────────
  // Header: "RWY FLAP A/C EPR V1 VR V2 AT MTOW"
  // Data:   "27R 05 ON 1.456 160 164 167 34C 631.6T"
  // AT column: a temp like "34C" → assumed temp; or "MAX" → use Max Power + planned temp
  let inThrustSection = false;
  let thrustHeaderFound = false;
  for (const l of lines) {
    if (/THRUST\s*\/\s*V[-\s]?SPEED/i.test(l)) { inThrustSection = true; continue; }
    if (inThrustSection) {
      // Detect the column header row
      if (!thrustHeaderFound && /\bRWY\b.*\bFLAP\b.*\bEPR\b/i.test(l)) { thrustHeaderFound = true; continue; }
      if (!thrustHeaderFound) continue;
      const t = l.trim();
      if (!t || /^[-=]+$/.test(t)) continue; // skip separator lines
      // First non-separator data line after header
      // Format: RWY FLAP A/C EPR V1 VR V2 AT MTOW
      //   e.g.: 27R 05 ON 1.456 160 164 167 34C 631.6T
      const dm = t.match(/^(\S+)\s+(\d{1,2})\s+(ON|OFF)\s+([\d.]+)\s+\d+\s+\d+\s+\d+\s+(\S+)\s+(\S+)/i);
      if (dm) {
        result.flaps  = dm[2].replace(/^0/,'') || dm[2]; // strip leading zero: 05→5
        result.acPack = dm[3].toUpperCase();              // ON or OFF
        result.epr    = dm[4];                            // EPR / N1
        const atField = dm[5];                            // "34C" or "MAX"
        if (/^MAX$/i.test(atField)) {
          result.perf3 = 'MAX';                           // use planned temp
        } else {
          const atNum = atField.replace(/C$/i,'');
          if (!isNaN(parseFloat(atNum))) result.perf3 = atNum;
        }
        const mtowFull = dm[6]; // e.g. "631.6T"
        const mtowMatch = mtowFull.match(/^([\d.]+)([A-Z])$/i);
        if (mtowMatch) {
          result.mtow1 = parseFloat(mtowMatch[1]).toFixed(1);
          result.mtow2 = mtowMatch[1].toUpperCase ? mtowMatch[2].toUpperCase() : mtowMatch[2];
        } else {
          const n = parseFloat(mtowFull);
          if (!isNaN(n)) result.mtow1 = n.toFixed(1);
        }
        break; // only need first data row
      }
      // If we hit a line that looks like a section break, stop
      if (/^={3,}/.test(t) || /^PAGE\s+\d+/i.test(t)) break;
    }
  }


  // NS page: "DEP LHR 1005/12 PLN 1005/12  22" — gate is trailing number on dep line
  // Also handles: "GATE 22", "GATE B25", "DEP GATE 22"
  let gateFound = null;
  for (const l of lines) {
    // NS page format: "DEP <ICAO> <time> PLN <time> <gate>"
    const nsm = l.match(/^\s*DEP\s+\w{3,4}\s+\d{4}\/\d{2}\s+PLN\s+\d{4}\/\d{2}\s+([A-Z]?\d{1,3}[A-Z]?)\s*$/i);
    if (nsm) { gateFound = nsm[1].toUpperCase(); break; }
    // Generic: "GATE 22" / "GATE B25" / "DEP GATE 22"
    const gm = l.match(/(?:DEP(?:ARTURE)?\s+)?GATE[:\s]+([A-Z]?\d{1,3}[A-Z]?)\b/i);
    if (gm) { gateFound = gm[1].toUpperCase(); break; }
  }
  if (gateFound) result.gate = gateFound;

  // ── Enroute time ─────────────────────────────────────────────────────────
  // Real CCI format: "ENRT BRN PHX 171553 1031 4693"  → 4-digit field after airport+burn
  // Also: "FLIPLN 0033 1031 0011 1115" → 2nd 4-digit group on FLIPLN line
  // Converts to "HH+MM"
  const toHHMM = raw => {
    const pre = raw.match(/^(\d{1,2})[+:](\d{2})$/);
    if (pre) return pre[1].padStart(2,'0') + '+' + pre[2];
    const dig = raw.match(/^(\d{4})$/);
    if (dig) return dig[1].slice(0,2) + '+' + dig[1].slice(2);
    return null;
  };
  const etPatterns = [
    /ENRT\s+BRN\s+\w+\s+\d+\s+(\d{4})\s+\d+/i,           // ENRT BRN PHX 171553 1031 4693
    /^\s*FLIPLN\s+\d+\s+(\d{4})\s+/i,                      // FLIPLN 0033 1031 0011 ...
    /^\s*ETIME\s+(\d{1,2}[+:]\d{2}|\d{4})\b/i,
    /^\s*ELAPSE\s*TIME[:\s]+(\d{1,2}[+:]\d{2}|\d{4})\b/i,
    /^\s*ETE\s+(\d{1,2}[+:]\d{2}|\d{4})\b/i,
    /^\s*TIME\s+(\d{4})\b/i,
    /ELAPSED\s+TIME[:\s]+(\d{1,2}[+:]\d{2}|\d{4})/i,
    /FLIGHT\s+TIME[:\s]+(\d{1,2}[+:]\d{2}|\d{4})/i,
  ];
  for (const pat of etPatterns) {
    if (result.enrouteTime) break;
    for (const l of lines) {
      const m = l.match(pat);
      if (m) { const fmt = toHHMM(m[1]); if (fmt) { result.enrouteTime = fmt; break; } }
    }
  }

  // ── Min Takeoff Fuel (fuelTrip) ───────────────────────────────────────────
  // Real CCI: "MIN T/O FUEL 197919" (whole lbs) and "MIN T/O 197919" (summary line)
  // Stored as-is (whole lbs string) to match the numInp field which takes raw numbers
  const minFuelPatterns = [
    /MIN\s+T\/O\s+FUEL\s+(\d+)/i,          // "MIN T/O FUEL 197919"  — header line
    /^\s*MIN\s+T\/O\s+(\d+)\s*$/i,         // "MIN T/O 197919"       — summary line
    /MIN\s+(?:TKOF|TAKEOFF)\s+FUEL\s+(\d+)/i,
    /MINIMUM\s+(?:T\/O|TAKEOFF)\s+FUEL\s+(\d+)/i,
    /TRIP\s+FUEL\s+(\d+)/i,
  ];
  for (const pat of minFuelPatterns) {
    if (result.fuelTrip) break;
    const v = get(pat);
    // Convert whole lbs → thousands with 1 decimal (e.g. 197919 → 197.9)
    if (v) {
      const n = parseFloat(v);
      result.fuelTrip = n > 9999 ? (n / 1000).toFixed(1) : n.toFixed(1);
    }
  }

  // ── Planned Arrival Fuel (fuelArrPlanned) ────────────────────────────────
  // Real CCI: "TOT BRN 173918 PLAN ARR FUEL 29077 02HR/16MIN"
  // Also standalone: "PLAN ARR FUEL 029077 0216"
  const arrFuelPatterns = [
    /PLAN\s+ARR\s+FUEL\s+0*(\d+)/i,        // "PLAN ARR FUEL 29077" or "029077"
    /PLN\s+ARR\s+FUEL\s+0*(\d+)/i,
    /PLANNED?\s+ARRIV\w*\s+FUEL\s+0*(\d+)/i,
    /DEST(?:INATION)?\s+FUEL\s+0*(\d+)/i,
  ];
  for (const pat of arrFuelPatterns) {
    if (result.fuelArrPlanned) break;
    const v = get(pat);
    if (v) {
      const n = parseFloat(v);
      result.fuelArrPlanned = n > 9999 ? (n / 1000).toFixed(1) : n.toFixed(1);
    }
  }

  // ── Cost Index ────────────────────────────────────────────────────────────
  const ci = get(/COST\s*INDEX[:\s]+(\d+)/i);
  if (ci) result.costIndex = ci;

  // ── Route string (truncated to fit) ──────────────────────────────────────
  let routeText = '';
  let inRoute = false;
  for (const l of lines) {
    if (/^ROUTE:/i.test(l.trim())) { routeText = l.replace(/^ROUTE:\s*/i,'').trim(); inRoute = true; continue; }
    if (inRoute) {
      if (/^ALTN\s+RTE/i.test(l.trim()) || /^---/.test(l.trim()) || l.trim() === '') { inRoute = false; continue; }
      routeText += ' ' + l.trim();
    }
  }
  if (routeText) result.route = routeText.trim();

  // ── Oceanic Route Verification ────────────────────────────────────────────
  // Starts at "OCEANIC ROUTE VERIFICATION", stops at the first of:
  //   - a line of 3+ dashes or equals (hard rule separator)
  //   - any line containing "RELEASE" (e.g. "PAGE 1 RELEASE 1.0 ...")
  //   - the CCI footer ID line (e.g. "41410040-9000-...")
  //   - a new "PAGE N" header line
  // Each data line is expected to have 7 space-separated tokens:
  //   TO_IDENT  LAT  LONG  TC  MC  MH  DIST
  // Any line that doesn't parse to exactly 7 numeric/coord tokens is skipped
  // (this removes the stray +1 trailing line that isn't waypoint data).
  let orvRows = [];
  let inORV = false;
  // Regex: ident  lat  lon  TC  MC  MH  dist
  // Lat/lon can be either:
  //   CCI format:  N59000  W010000  (letter-first, e.g. N59000, W010000, N65543, W058350)
  //   Classic fmt: 59N000  010W000  (digits-first, e.g. 59N, 010W)
  // TC/MC/MH can be digits OR "---" (e.g. BALIX entry point has no prior segment)
  // DIST can be digits OR "----"
  const latRe  = '[NS]\\d{2,5}|\\d{1,3}[NS]\\d*';
  const lonRe  = '[EW]\\d{3,6}|\\d{1,3}[EW]\\d*';
  const degRe  = '(?:\\d{1,3}|---)';           // bearing: digits or ---
  const distRe = '(?:\\d{1,4}|-{3,4})';        // distance: digits or ----
  const orvRowRe = new RegExp(
    '^(\\S+)\\s+(' + latRe + ')\\s+(' + lonRe + ')\\s+(' + degRe + ')\\s+(' + degRe + ')\\s+(' + degRe + ')\\s+(' + distRe + ')$',
    'i'
  );
  for (const l of lines) {
    if (/OCEANIC\s+ROUTE\s+VERIF/i.test(l)) { inORV = true; continue; }
    if (inORV) {
      const t = l.trim();
      if (
        /^={3,}/.test(t) ||
        /RELEASE/i.test(t) ||
        /^PAGE\s+\d+/i.test(t) ||
        /^\d{8}-\d{4}-/.test(t)
      ) { inORV = false; continue; }
      if (!t) continue;
      // Skip the column-header line (contains non-numeric labels like "TO" or "IDENT")
      if (/\b(TO|IDENT|LAT|LONG|LON|TRUE|MAG|DIST)\b/i.test(t)) continue;
      // Only keep lines that match the 7-token waypoint pattern
      const m = t.match(orvRowRe);
      if (m) {
        orvRows.push({
          ident: m[1].toUpperCase(),
          lat:   m[2].toUpperCase(),
          lon:   m[3].toUpperCase(),
          tc:    m[4],
          mc:    m[5],
          mh:    m[6],
          dist:  m[7]
        });
      }
    }
  }
  if (orvRows.length) result.orv = JSON.stringify(orvRows);

  return result;
}
