function activateRedispatch(goToRdAirport) {
  const fl = currentFlight();
  if (goToRdAirport) {
    if (!fl.rdOrigArrCity) setFlight('rdOrigArrCity', fl.arrCity);
    if (!fl.rdOrigArrFuel) setFlight('rdOrigArrFuel', fl.fuelArrPlanned);
    setFlight('rdActive', true);
    setFlight('arrCity', fl.rdAirport || fl.arrCity);
    if (fl.rdArrFuelRdApt) setFlight('fuelArrPlanned', fl.rdArrFuelRdApt);
  } else {
    if (fl.rdOrigArrCity) setFlight('arrCity', fl.rdOrigArrCity);
    if (fl.rdOrigArrFuel) setFlight('fuelArrPlanned', fl.rdOrigArrFuel);
    setFlight('rdActive', false);
  }
  render();
}

function adjustArrTime(deltaMins) {
  const fl = currentFlight();
  const parts = (fl.arrTime || '00:00').split(':');
  let total = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0) + deltaMins;
  const dateStr = fl.arrDate || '';
  if (total < 0 || total >= 1440) {
    const dir = total < 0 ? -1 : 1;
    total = ((total % 1440) + 1440) % 1440;
    if (dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() + dir);
      setFlight('arrDate', d.toISOString().split('T')[0]);
      return;
    }
  }
  setFlight('arrTime', String(Math.floor(total / 60)).padStart(2,'0') + ':' + String(total % 60).padStart(2,'0'));
  setTimeout(updateFlightRemaining, 0);
}

function swapFlightCities() {
  const fl = currentFlight();
  const oldDep = fl.depCity;
  const oldArr = fl.arrCity;
  setFlight('depCity', oldArr || 'LHR');
  setFlight('arrCity', oldDep || 'PHX');
}

function shiftFlight(dir) {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const newIdx = state.flightIdx + dir;
  if (newIdx < 0) return;
  if (newIdx >= state.flights.length) state.flights.push({});
  state.flightIdx = newIdx;
  state.flight = state.flights[state.flightIdx] || {};
  saveState();
  render();
  setTimeout(updateBreakCountdowns, 50);
}

function deleteFlightSlot() {
  if (!state.flights || state.flights.length <= 1) {
    state.flights = [{}];
    state.flightIdx = 0;
  } else {
    state.flights.splice(state.flightIdx, 1);
    state.flightIdx = Math.min(state.flightIdx, state.flights.length - 1);
    state.flights[state.flightIdx] = {};
  }
  state.flight = state.flights[state.flightIdx] || {};
  saveState();
  render();
  setTimeout(updateBreakCountdowns, 50);
}

function breakAlarmPlus3(prefix) {
  const fl = currentFlight();
  const timeKey = BREAK_TIME_KEY[prefix] || 'wakeTime';
  const dateKey = BREAK_DATE_KEY[prefix] || 'wakeDate';
  const baseMs = (fl[dateKey] && validTime(fl[timeKey]))
    ? new Date(`${fl[dateKey]}T${fl[timeKey]}:00Z`).getTime()
    : Date.now();
  const t = new Date(baseMs + 3 * 3600000);
  setFlight(timeKey, `${String(t.getUTCHours()).padStart(2,'0')}:${String(t.getUTCMinutes()).padStart(2,'0')}`);
  setFlight(dateKey, `${t.getUTCFullYear()}-${String(t.getUTCMonth()+1).padStart(2,'0')}-${String(t.getUTCDate()).padStart(2,'0')}`);
}

function clearBreakAlarm(prefix) {
  setFlight(BREAK_TIME_KEY[prefix] || 'wakeTime', '');
  setFlight(BREAK_DATE_KEY[prefix] || 'wakeDate', '');
}

// ── Shortcuts alarm integration ───────────────────────────────────────────
function openShortcutsAlarm() {
  const fl = currentFlight();
  const alarms = [];
  if (fl.wakeDate   && validTime(fl.wakeTime))   alarms.push({ label:'Break Alarm 1', date:fl.wakeDate,   time:fl.wakeTime });
  if (fl.break2Date && validTime(fl.break2Time)) alarms.push({ label:'Break Alarm 2', date:fl.break2Date, time:fl.break2Time });
  if (fl.break3Date && validTime(fl.break3Time)) alarms.push({ label:'Break Alarm 3', date:fl.break3Date, time:fl.break3Time });
  if (fl.break4Date && validTime(fl.break4Time)) alarms.push({ label:'Break Alarm 4', date:fl.break4Date, time:fl.break4Time });
  if (!alarms.length) return;

  const lines = ['PROTOCOL BREAK ALARMS', ''];
  alarms.forEach(a => {
    const ms    = new Date(a.date + 'T' + a.time + ':00Z').getTime();
    const local = new Date(ms);
    const lh    = String(local.getHours()).padStart(2,'0');
    const lm    = String(local.getMinutes()).padStart(2,'0');
    lines.push(a.label + ': ' + a.date + ' at ' + a.time + ' UTC');
    lines.push('Local device time: ' + lh + ':' + lm);
    lines.push('');
  });
  lines.push('Message: WAKE UP — end crew rest now');
  const text = lines.join('\n');

  const copy = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    } catch(e) {}
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(copy);
  } else { copy(); }

  showShortcutsOverlay(alarms);
}

function showLegsPage() {

  try { rows = JSON.parse(fl.legs || '[]'); } catch(e) {}

  cls.addEventListener('click', () => pop.remove());

  // ── Scrollable table body ──
  const body = document.createElement('div');
  body.style.cssText = 'flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch';

  // Altitude-change detection (same logic as Flight Tab legs table)
  const flArr = rows.map(r => r.fl || '');
  const flCount = {};
  flArr.forEach(f => { if(f) flCount[f] = (flCount[f]||0)+1; });
  const cruiseFl = Object.keys(flCount).sort((a,b) => flCount[b]-flCount[a])[0] || '';
  const firstCruise = flArr.indexOf(cruiseFl);
  const lastCruise  = flArr.lastIndexOf(cruiseFl);
  const altChanges  = new Set();
  for (let j=1; j<flArr.length; j++) {
    if (flArr[j] && flArr[j-1] && flArr[j] !== flArr[j-1]) {
      if (j > firstCruise && j <= lastCruise) altChanges.add(j);
    }
  }

  const COLS = ['IDENT','LAT','LON','FL/MK','FUEL'];
  const hdrStyle = 'position:sticky;top:0;z-index:2;padding:6px 4px;text-align:center;color:var(--text3);font-size:10px;font-weight:700;letter-spacing:0.6px;white-space:nowrap;border-bottom:2px solid var(--border);background:var(--surf2)';
  const table = document.createElement('table');
  table.style.cssText = 'width:100%;border-collapse:collapse;font-family:SF Mono,monospace;table-layout:fixed';
  const colgroup = document.createElement('colgroup');
  ['22%','20%','20%','20%','18%'].forEach(w => { const col=document.createElement('col'); col.style.width=w; colgroup.appendChild(col); });
  table.appendChild(colgroup);

  const thead = document.createElement('thead');
  thead.innerHTML = '<tr>' + COLS.map(c => '<th style="' + hdrStyle + '">' + c + '</th>').join('') + '</tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  rows.forEach((row, i) => {
    const isRD       = rdPtIdent && (row.ident||'').toUpperCase() === rdPtIdent;
    const isAltChg   = altChanges.has(i);
    const bg         = isRD ? 'var(--amber-l,#fff8e1)' : isAltChg ? 'var(--teal-l)' : (i%2===0 ? 'var(--surf)' : 'var(--surf2)');
    const identColor = isRD ? 'var(--amber)' : isAltChg ? 'var(--teal)' : 'var(--text)';
    const flColor    = isRD ? 'var(--amber)' : isAltChg ? 'var(--teal)' : 'var(--blue)';

    const td = (val, color, align) =>
      '<td style="padding:6px 4px;text-align:'+(align||'center')+';color:'+(color||'var(--text2)')+';white-space:nowrap;border-bottom:1px solid var(--border);font-size:12px">'
      + (val||'\u2014') + '</td>';

    let identCell = '<td style="padding:6px 4px 6px 8px;text-align:left;color:'+identColor+';font-weight:700;white-space:nowrap;border-bottom:1px solid var(--border);font-size:12px">'
      + (row.ident||'\u2014')
      + (row.name && (row.ident||'').length === 3 ? ' <span style="font-size:10px;font-weight:500;color:var(--text3)">(' + row.name + ')</span>' : '')
      + (isRD ? ' <span style="font-size:9px;font-weight:800;color:var(--amber);background:rgba(0,0,0,0.12);border-radius:3px;padding:1px 4px;vertical-align:middle">R/D</span>' : '')
      + '</td>';

    tbody.innerHTML += '<tr style="background:'+bg+'">'
      + identCell
      + td(row.lat || '\u2014', 'var(--text2)', 'center')
      + td(row.lon || '\u2014', 'var(--text2)', 'center')
      + td(row.flmk || row.fl || '\u2014', flColor, 'center')
      + td(row.fuel || '\u2014', 'var(--amber)', 'center')
      + '</tr>';
  });
  table.appendChild(tbody);
  body.appendChild(table);
  pop.appendChild(body);
  document.body.appendChild(pop);
}

function openClockAlarm(hour, min, label) {
  const h = String(hour % 24).padStart(2,'0');
  const m = String(min % 60).padStart(2,'0');
  showClockToast(h, m, label);
}

function openClockAlarmUTC(dateStr, timeStr, label) {
  const alarmMs = new Date(dateStr + 'T' + timeStr + ':00Z').getTime();
  const local = new Date(alarmMs);
  openClockAlarm(local.getHours(), local.getMinutes(), label);
}

function dismissClockToast() { var el=document.getElementById('clock-toast'); if(el) el.remove(); }

function showClockToast(h, m, label) {
  var existing = document.getElementById('clock-toast');
  if (existing) existing.remove();

  var isLight = document.body.classList.contains('light');
  var bg  = isLight ? '#ffffff' : '#1a1d23';
  var t1  = isLight ? '#1a1a18' : '#e8eaf0';
  var t2  = isLight ? '#5f5e5a' : '#8892a4';
  var bdr = isLight ? '#e2dfd6' : '#2a3340';

  var toast = document.createElement('div');
  toast.id = 'clock-toast';
  toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;'
    + 'background:' + bg + ';border:1px solid ' + bdr + ';border-radius:14px;padding:20px 24px;'
    + 'min-width:280px;text-align:center;width:calc(100% - 48px);max-width:320px';

  var lbl = document.createElement('div');
  lbl.style.cssText = 'font-size:13px;font-weight:700;color:' + t2 + ';text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px';
  lbl.textContent = label + ' alarm';

  var time = document.createElement('div');
  time.style.cssText = 'font-size:48px;font-weight:700;font-family:SF Mono,monospace;color:' + t1 + ';margin-bottom:4px;letter-spacing:2px';
  time.textContent = h + ':' + m;

  var hint = document.createElement('div');
  hint.style.cssText = 'font-size:13px;color:' + t2 + ';margin-bottom:16px;line-height:1.5';
  hint.textContent = 'device local time';

  var siriBox = document.createElement('div');
  siriBox.style.cssText = 'background:' + (isLight?'#F1EFE8':'#181c22') + ';border-radius:10px;padding:10px 14px;margin-bottom:14px;text-align:left';

  var siriLbl = document.createElement('div');
  siriLbl.style.cssText = 'font-size:13px;font-weight:700;color:' + t2 + ';text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px';
  siriLbl.textContent = 'Tell Siri';

  var siriPhrase = document.createElement('div');
  siriPhrase.style.cssText = 'font-size:13px;font-weight:600;color:' + t1 + ';line-height:1.5;font-style:italic';
  siriPhrase.textContent = '"Hey Siri, set an alarm for ' + h + ':' + m + '"';

  siriBox.appendChild(siriLbl);
  siriBox.appendChild(siriPhrase);

  var isStandalone = window.navigator.standalone === true;

  var openLink = document.createElement('button');
  openLink.style.cssText = 'display:block;width:100%;padding:12px;border-radius:10px;border:none;'
    + 'background:#185FA5;color:#fff;font-size:12px;font-weight:700;cursor:pointer;'
    + 'margin-bottom:8px;box-sizing:border-box;text-align:center';
  openLink.textContent = 'Share alarm time';
  openLink.addEventListener('click', function() {
    var shareText = label + ' alarm: ' + h + ':' + m + ' (device local time)';
    if (navigator.share) {
      navigator.share({
        title: 'Protocol — ' + label + ' alarm',
        text: shareText
      }).catch(function() {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(shareText).then(function() {
        openLink.textContent = 'Copied \u2713';
        setTimeout(function() { openLink.textContent = 'Share alarm time'; }, 2000);
      });
    }
  });

  var dismissBtn = document.createElement('button');
  dismissBtn.style.cssText = 'width:100%;padding:10px;border-radius:10px;border:1px solid ' + bdr + ';background:transparent;color:' + t2 + ';font-size:13px;cursor:pointer';
  dismissBtn.textContent = 'Dismiss';
  dismissBtn.addEventListener('click', dismissClockToast);

  toast.appendChild(lbl);
  toast.appendChild(time);
  toast.appendChild(hint);
  toast.appendChild(siriBox);
  toast.appendChild(openLink);
  toast.appendChild(dismissBtn);
  document.body.appendChild(toast);

  setTimeout(dismissClockToast, 60000);
}

// ── Break alarm countdowns ──────────────────────────────────────────────────
let alarmFired = { 'cd-break1': false, 'cd-break2': false, 'cd-break3': false, 'cd-break4': false };

function updateBreakCountdowns() {
  if (tab !== 'flight') return;
  const fl = state.flights ? (state.flights[state.flightIdx] || {}) : (state.flight || {});
  const utcNowMs = Date.now();

  // Derive break date from dep/arr dates: start at depDate, advance days until
  // the break UTC time falls within the flight window (dep → arr + 4h buffer).
  // Falls back to today/tomorrow if no dep date set.
  function resolveBreakDate(timeStr) {
    const p = timeStr.split(':');
    const brkHr  = parseInt(p[0]);
    const brkMin = parseInt(p[1]);
    const depDate = fl.depDate;
    const arrDate = fl.arrDate;
    const depTime = fl.depTime || '00:00';
    const arrTime = fl.arrTime || '23:59';
    // Get city offsets (minutes from UTC) to convert local times to UTC
    const cityList = (typeof CITY_LIST !== 'undefined') ? CITY_LIST : [];
    const depOffMin = cityOffset(fl.depCity, -420);
    const arrOffMin = cityOffset(fl.arrCity, depOffMin);
    if (depDate) {
      // Convert dep/arr local times to UTC for boundary calc
      const [dh,dm] = depTime.split(':').map(Number);
      const [ah,am] = arrTime.split(':').map(Number);
      const depLocalMs = new Date(depDate + 'T00:00:00Z').getTime() + dh*3600000 + dm*60000;
      const depMs = depLocalMs - depOffMin * 60000;  // to UTC
      const arrBaseMs = arrDate
        ? new Date(arrDate + 'T00:00:00Z').getTime() + ah*3600000 + am*60000 - arrOffMin*60000
        : depMs + 30 * 3600000;
      const arrMs = arrBaseMs + 4 * 3600000; // 4h buffer
      // Break times are stored as UTC — try depDate through depDate+4
      for (let d = 0; d <= 4; d++) {
        const base = new Date(depDate + 'T00:00:00Z');
        base.setUTCDate(base.getUTCDate() + d);
        const candidate = base.getTime() + brkHr * 3600000 + brkMin * 60000;
        if (candidate >= depMs - 3600000 && candidate <= arrMs) return base.toISOString().slice(0, 10);
      }
      return depDate;
    }
    // No dep date — use today or tomorrow UTC
    const now = new Date();
    const todayUTC = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), brkHr, brkMin, 0);
    const base = todayUTC >= Date.now()
      ? new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()))
      : new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + 1));
    return base.toISOString().slice(0, 10);
  }

  function countdownFor(ignoredDate, timeStr, elId) {
    const el = document.getElementById(elId);
    if (!el) return;
    if (!timeStr || !validTime(timeStr)) { el.textContent = '—'; alarmFired[elId] = false; return; }
    const dateStr = resolveBreakDate(timeStr);
    let alarmMs;
    alarmMs = new Date(dateStr + 'T' + timeStr + ':00Z').getTime();
    if (isNaN(alarmMs)) { el.textContent = '??'; return; }
    const diffMs = alarmMs - utcNowMs;
    if (diffMs <= 0) {
      if (diffMs < -600000) {
        el.textContent = 'DONE'; el.style.color = 'var(--text3)';
        if (el.parentElement) el.parentElement.style.opacity = '0.5';
        alarmFired[elId] = false;
      } else {
        el.textContent = 'WAKE'; el.style.color = '#ef4444';
        if (el.parentElement) el.parentElement.style.opacity = '1';
      }
      return;
    }
    if (alarmFired[elId] && diffMs > 10000) alarmFired[elId] = false;
    if (el.parentElement) el.parentElement.style.opacity = '1';
    const totalSecs = Math.floor(diffMs / 1000);
    const hrs  = Math.floor(totalSecs / 3600);
    const mins = Math.floor((totalSecs % 3600) / 60);
    const secs = totalSecs % 60;
    el.textContent = String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    if (elId === 'cd-break1') el.style.color = totalSecs < 1800 ? '#ef4444' : 'var(--amber)';
    if (elId === 'cd-break2') el.style.color = totalSecs < 1800 ? '#ef4444' : '#ec4899';
    if (elId === 'cd-break3') el.style.color = totalSecs < 1800 ? '#ef4444' : 'var(--teal)';
    if (elId === 'cd-break4') el.style.color = totalSecs < 1800 ? '#ef4444' : 'var(--purple)';
  }

  countdownFor(fl.wakeDate,   fl.wakeTime,   'cd-break1');
  countdownFor(fl.break2Date, fl.break2Time, 'cd-break2');
  countdownFor(fl.break3Date, fl.break3Time, 'cd-break3');
  countdownFor(fl.break4Date, fl.break4Time, 'cd-break4');
}

setInterval(updateBreakCountdowns, 1000);

function captureFlightTime(prefix) {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const fl = state.flights[state.flightIdx] || {};
  const depOff = {LAX:-420,DFW:-300,JFK:-240,CLT:-240,PHX:-420,MIA:-240}[fl.depCity||'PHX'] || -420;
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  const isBreak = prefix === 'wake' || prefix === 'break2';
  let h, m, yyyy, mm, dd;
  if (isBreak) {
    // Break alarms are UTC — extract UTC values directly from now
    const nowObj = new Date();
    h    = String(nowObj.getUTCHours()).padStart(2,'0');
    m    = String(nowObj.getUTCMinutes()).padStart(2,'0');
    yyyy = nowObj.getUTCFullYear();
    mm   = String(nowObj.getUTCMonth()+1).padStart(2,'0');
    dd   = String(nowObj.getUTCDate()).padStart(2,'0');
  } else {
    const offset = prefix === 'arr'
      ? ((function(){ const c = (CITY_LIST||[{v:'LHR',off:60}]).find(x=>x.v===(fl.arrCity||'LHR')); return c?c.off:60; })())
      : depOff;
    const ln = new Date(utcMs + offset * 60000);
    h    = String(ln.getHours()).padStart(2,'0');
    m    = String(ln.getMinutes()).padStart(2,'0');
    yyyy = ln.getFullYear();
    mm   = String(ln.getMonth()+1).padStart(2,'0');
    dd   = String(ln.getDate()).padStart(2,'0');
  }
  setFlight(prefix+'Time', `${h}:${m}`);
  setFlight(prefix+'Date', `${yyyy}-${mm}-${dd}`);
}

function pickupPlus24() {
  const lay = state.layover || {};
  const checkinDate = lay.checkinDate || '';
  const checkinTime = lay.checkinTime || '';
  if (!checkinDate || !checkinTime) {
    alert('Enter check-in date and time first');
    return;
  }
  const ci = new Date(`${checkinDate}T${checkinTime}`);
  const pu = new Date(ci.getTime() + 24 * 60 * 60000);
  const h  = String(pu.getHours()).padStart(2,'0');
  const m  = String(pu.getMinutes()).padStart(2,'0');
  const yyyy = pu.getFullYear();
  const mm   = String(pu.getMonth()+1).padStart(2,'0');
  const dd   = String(pu.getDate()).padStart(2,'0');
  setLayover('pickupTime', `${h}:${m}`);
  setLayover('pickupDate', `${yyyy}-${mm}-${dd}`);
}


function showRefGuide(depIcao, arrIcao, flightNum) {
  const ex=document.getElementById('ref-guide-pop'); if(ex){ex.remove();return;}
  const dep=(depIcao||'').toUpperCase();
  const arr=(arrIcao||'').toUpperCase();
  const atlanticPorts=['LHR','FCO','DUB','MAD','CDG','LGW','AMS','FRA','BCN','ZRH','BRU','MAN','OSL','ARN'];
  const pacificPorts=['ICN','NRT','HND','AKL','SYD','PEK','PVG','HKG','NAN','PPT'];
  const isAtlantic=atlanticPorts.some(p=>dep===p||arr===p);
  const isPacific =pacificPorts.some(p=>dep===p||arr===p);

  const pop=document.createElement('div'); pop.id='ref-guide-pop';
  pop.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;box-sizing:border-box';
  const bar=document.createElement('div'); bar.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:48px 16px 8px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0';
  const tabRow=document.createElement('div'); tabRow.style.cssText='display:flex;gap:6px';
  let activeGuide=isAtlantic?'atlantic':(isPacific?'pacific':'atlantic');
  const content=document.createElement('div'); content.style.cssText='flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;touch-action:pan-y pinch-zoom';

  const CK_KEY='refguide_marks_';
  const loadMarks=(g)=>{ try{return JSON.parse(localStorage.getItem(CK_KEY+g)||'{}')}catch(e){return{}} };
  const saveMarks=(g,m)=>{ try{localStorage.setItem(CK_KEY+g,JSON.stringify(m))}catch(e){} };
  const drawMarks=(canvas,marks,idx)=>{
    const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height);
    const r=canvas.width*0.009; // scales with image resolution, ~capital-O sized
    (marks[idx]||[]).forEach(([rx,ry])=>{
      const x=rx*canvas.width, y=ry*canvas.height;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle='rgba(16,185,129,0.85)'; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=r*0.21;
      ctx.beginPath(); ctx.moveTo(x-r*0.43,y); ctx.lineTo(x-r*0.07,y+r*0.36); ctx.lineTo(x+r*0.5,y-r*0.43); ctx.stroke();
    });
  };

  const renderGuide=(guide)=>{
    content.innerHTML=''; activeGuide=guide;
    [atlBtn,pacBtn].forEach(b=>{b.style.background='transparent';b.style.color='var(--text2)'});
    if(guide==='atlantic'){atlBtn.style.background='var(--blue)';atlBtn.style.color='#fff';}
    else{pacBtn.style.background='var(--blue)';pacBtn.style.color='#fff';}
    let marks=loadMarks(guide);
    const pageImgs=guide==='atlantic'?EUROPE_PAGES:PACIFIC_PAGES;
    pageImgs.forEach((src,idx)=>{
      const pgLbl=document.createElement('div');
      pgLbl.style.cssText='font-size:12px;color:var(--text3);text-align:center;padding:4px 0;letter-spacing:0.3px';
      pgLbl.textContent='Page '+(idx+1)+' of '+pageImgs.length; content.appendChild(pgLbl);
      const wrap=document.createElement('div');
      wrap.style.cssText='position:relative;width:100%;margin-bottom:20px;border:1px solid var(--border);border-radius:4px;overflow:hidden;touch-action:pan-x pan-y pinch-zoom';
      const img=document.createElement('img'); img.src=src;
      img.style.cssText='width:100%;display:block;user-select:none;-webkit-user-select:none'; img.draggable=false;
      const canvas=document.createElement('canvas');
      canvas.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;touch-action:pan-x pan-y pinch-zoom';
      const setupCanvas=()=>{canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;drawMarks(canvas,marks,idx)};
      if(img.complete)setupCanvas(); else img.addEventListener('load',setupCanvas);
      let _ptrs={},_moved=false,_startT=0;
      canvas.addEventListener('pointerdown',e=>{_ptrs[e.pointerId]=true;_moved=false;_startT=Date.now()});
      canvas.addEventListener('pointermove',e=>{
        if(Object.keys(_ptrs).length>1)_moved=true;
        else if(e.movementX!=null&&(Math.abs(e.movementX)+Math.abs(e.movementY))>6)_moved=true;
      });
      canvas.addEventListener('pointerup',e=>{
        delete _ptrs[e.pointerId];
        if(!(!_moved&&Object.keys(_ptrs).length===0&&(Date.now()-_startT)<400))return;
        const rect=canvas.getBoundingClientRect();
        const rx=(e.clientX-rect.left)/rect.width, ry=(e.clientY-rect.top)/rect.height;
        if(!marks[idx])marks[idx]=[];
        const hi=marks[idx].findIndex(([ox,oy])=>{const dx=(ox-rx)*rect.width,dy=(oy-ry)*rect.height;return Math.sqrt(dx*dx+dy*dy)<14});
        if(hi>=0)marks[idx].splice(hi,1); else marks[idx].push([rx,ry]);
        saveMarks(guide,marks); drawMarks(canvas,marks,idx);
      });
      canvas.addEventListener('pointercancel',e=>{delete _ptrs[e.pointerId]});
      wrap.appendChild(img); wrap.appendChild(canvas); content.appendChild(wrap);
    });
    const resetBtn=document.createElement('button'); resetBtn.textContent='Clear All Marks';
    resetBtn.style.cssText='width:100%;margin-top:8px;padding:10px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:13px;cursor:pointer';
    resetBtn.addEventListener('click',()=>{saveMarks(guide,{});renderGuide(guide)});
    content.appendChild(resetBtn);
  };

  const atlBtn=document.createElement('button'); atlBtn.textContent='Atlantic'; atlBtn.style.cssText='padding:5px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer';
  const pacBtn=document.createElement('button'); pacBtn.textContent='Pacific';  pacBtn.style.cssText='padding:5px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer';
  atlBtn.addEventListener('click',()=>renderGuide('atlantic'));
  pacBtn.addEventListener('click',()=>renderGuide('pacific'));
  const clrBtn=document.createElement('button'); clrBtn.textContent='Clear';
  clrBtn.style.cssText='padding:5px 12px;border-radius:6px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:12px;font-weight:600;cursor:pointer';
  clrBtn.addEventListener('click',()=>{saveMarks(activeGuide,{});renderGuide(activeGuide);});
  const closBtn=document.createElement('button'); closBtn.textContent='✕'; closBtn.style.cssText='padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;margin-left:auto';
  closBtn.addEventListener('click',()=>pop.remove());
  tabRow.appendChild(atlBtn); tabRow.appendChild(pacBtn); tabRow.appendChild(clrBtn);
  bar.appendChild(tabRow); bar.appendChild(closBtn);
  pop.appendChild(bar); pop.appendChild(content);
  document.body.appendChild(pop);
  renderGuide(activeGuide);
}

function showDivertPopup() {
  const existing = document.getElementById('divert-pop');
  if (existing) { existing.remove(); return; }
  const fl = currentFlight();

  // ── Theatre detection ──────────────────────────────────────────────────
  let theatre = (typeof detectTheatre === 'function')
    ? detectTheatre(fl.depCity || '', fl.arrCity || '')
    : null;

  const THEATRES = [
    { code:'NATL', label:'North Atlantic' },
    { code:'MATL', label:'Mid Atlantic' },
    { code:'NPAC', label:'North Pacific' },
    { code:'SPAC', label:'South Pacific' },
    { code:'DSAM', label:'Deep South / S. America' },
  ];

  // ── Active diverts — persist in localStorage keyed by theatre ────────────
  // Only reuse saved list if the current flight is in the same theatre.
  // A different or unknown theatre starts with a clean list.
  const STORAGE_KEY = 'activeDiverts_' + (theatre || 'NONE');
  function loadActive() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return [];
  }
  function saveActive() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(activeDiverts)); } catch(e) {}
    setFlight('activeDiverts', [...activeDiverts]);
  }
  let activeDiverts = loadActive();

  // ── Auth helpers ───────────────────────────────────────────────────────
  const AUTH_LABEL = { 'R':'Regular','A':'Alternate','F':'Refueling','P':'Provisional','-':'Emergency Auth' };
  const AUTH_COLOR = { 'R':'var(--green)','A':'var(--green)','F':'var(--amber)','P':'var(--amber)','-':'var(--red)' };
  const AUTH_BG    = { 'R':'var(--green-l)','A':'var(--green-l)','F':'var(--amber-l)','P':'var(--amber-l)','-':'var(--red-l)' };

  // ── Popup shell ────────────────────────────────────────────────────────
  const pop = document.createElement('div'); pop.id = 'divert-pop';
  pop.style.cssText = 'position:fixed;top:51px;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;border-top:2px solid var(--amber)';

  // Header
  const bar = document.createElement('div');
  bar.style.cssText = 'display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0';

  const ttl = document.createElement('div');
  ttl.style.cssText = 'font-size:14px;font-weight:800;color:var(--amber);text-transform:uppercase;letter-spacing:0.5px;flex:1';

  const thSel = document.createElement('select');
  thSel.style.cssText = 'padding:5px 8px;border-radius:7px;border:1px solid var(--amber);background:var(--surf2);color:var(--amber);font-size:12px;font-weight:700';
  const blankOpt = document.createElement('option'); blankOpt.value=''; blankOpt.textContent='All Theatres';
  thSel.appendChild(blankOpt);
  THEATRES.forEach(t => {
    const o = document.createElement('option'); o.value=t.code; o.textContent=t.label;
    if (t.code === theatre) o.selected = true;
    thSel.appendChild(o);
  });

  const editBtn = document.createElement('button');
  editBtn.style.cssText = 'padding:6px 12px;border-radius:8px;border:1px solid var(--amber);background:var(--amber-l);color:var(--amber);font-size:12px;font-weight:700;cursor:pointer;display:none';

  const clearBtn = document.createElement('button');
  clearBtn.textContent = 'Clear All';
  clearBtn.style.cssText = 'padding:6px 12px;border-radius:8px;border:1px solid var(--red);background:var(--red-l);color:var(--red);font-size:12px;font-weight:700;cursor:pointer;display:none';

  const cls = document.createElement('button'); cls.textContent = 'Close';
  cls.style.cssText = 'padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer';
  cls.addEventListener('click', () => pop.remove());

  bar.appendChild(ttl); bar.appendChild(thSel); bar.appendChild(editBtn); bar.appendChild(clearBtn); bar.appendChild(cls);
  pop.appendChild(bar);

  // Body
  const body = document.createElement('div');
  body.style.cssText = 'flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;display:flex;flex-direction:column;gap:10px';
  pop.appendChild(body);
  document.body.appendChild(pop);

  // ── Build detail card (full-width, single view) ────────────────────────
  function buildDetailCard(ap, onClose) {
    const auth  = ap.b777 || '-';
    const color = AUTH_COLOR[auth] || 'var(--text3)';
    const bg    = AUTH_BG[auth]    || 'var(--surf2)';
    const label = AUTH_LABEL[auth] || auth;
    const isPinned = activeDiverts.includes(ap.icao);

    const card = document.createElement('div');
    card.style.cssText = 'border-radius:12px;border:2px solid var(--border2);background:var(--surf);overflow:hidden';

    // Card header
    const hdr = document.createElement('div');
    hdr.style.cssText = 'padding:10px 14px 8px;background:'+bg+';border-bottom:1px solid var(--border)';
    const nameRow = document.createElement('div');
    nameRow.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;gap:8px';
    const nameBlock = document.createElement('div');
    nameBlock.innerHTML = '<div style="font-size:28px;font-weight:800;color:var(--text)">'+ap.name+'</div>'
      +'<div style="font-size:22px;color:var(--text2);margin-top:4px">'+ap.loc+'</div>';
    const badges = document.createElement('div');
    badges.style.cssText = 'display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0';
    badges.innerHTML = '<span style="padding:5px 12px;border-radius:8px;background:'+color+';color:#fff;font-size:20px;font-weight:700">B777: '+label+'</span>'
      +(ap.medical ? '<span style="padding:5px 12px;border-radius:8px;background:var(--blue);color:#fff;font-size:20px;font-weight:700">Medical</span>'
                   : '<span style="padding:5px 10px;border-radius:8px;background:var(--surf2);color:var(--text3);font-size:20px;font-weight:700">No Medical</span>')
      +(ap.etops   ? '<span style="padding:5px 12px;border-radius:8px;background:var(--teal);color:#fff;font-size:20px;font-weight:700">ETOPS</span>' : '');
    nameRow.appendChild(nameBlock); nameRow.appendChild(badges);
    hdr.appendChild(nameRow); card.appendChild(hdr);

    // Stats row
    const stats = document.createElement('div');
    stats.style.cssText = 'display:flex;border-bottom:1px solid var(--border)';
    [['IATA',ap.iata||'—'],['ICAO',ap.icao||'—'],['Longest RWY',ap.rwy?ap.rwy.toLocaleString()+' ft':'—'],['Elev',ap.elev!=null?ap.elev.toLocaleString()+' ft':'—']].forEach(([k,v]) => {
      const c = document.createElement('div');
      c.style.cssText = 'flex:1;padding:8px 6px;border-right:1px solid var(--border);text-align:center';
      c.innerHTML = '<div style="font-size:16px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;font-weight:700">'+k+'</div>'
        +'<div style="font-size:22px;font-weight:700;color:var(--text);margin-top:4px;font-family:SF Mono,monospace">'+v+'</div>';
      stats.appendChild(c);
    });
    card.appendChild(stats);

    // Notes
    if (ap.notes) {
      const notes = document.createElement('div');
      notes.style.cssText = 'padding:14px 18px;font-size:22px;color:var(--text2);line-height:1.5';
      notes.textContent = ap.notes;
      card.appendChild(notes);
    }

    // Action row: pin + confirm + close
    const actRow = document.createElement('div');
    actRow.style.cssText = 'display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--surf2);flex-wrap:wrap';

    const pinBtn = document.createElement('button');
    const updatePin = () => {
      const pinned = activeDiverts.includes(ap.icao);
      pinBtn.textContent = pinned ? '\u2605 Remove from Active' : '\u2606 Add to Active';
      pinBtn.style.cssText = 'flex:1;padding:14px;border-radius:10px;font-size:22px;font-weight:700;cursor:pointer;border:1px solid '+(pinned?'var(--red)':'var(--amber)')+';background:'+(pinned?'var(--red-l)':'var(--amber-l)')+';color:'+(pinned?'var(--red)':'var(--amber)');
    };
    updatePin();
    pinBtn.addEventListener('click', () => {
      if (activeDiverts.includes(ap.icao)) {
        activeDiverts = activeDiverts.filter(x => x !== ap.icao);
      } else {
        activeDiverts.push(ap.icao);
      }
      saveActive();
      updatePin();
    });

    const confirmBtn = document.createElement('button');
    confirmBtn.textContent = 'Confirm Divert \u2192 ' + (ap.icao||ap.iata);
    confirmBtn.style.cssText = 'flex:2;padding:14px;border-radius:10px;border:none;background:var(--amber);color:#000;font-size:22px;font-weight:800;cursor:pointer';
    confirmBtn.addEventListener('click', () => {
      const city = ap.iata || ap.icao;
      setFlight('arrCity', city);
      ['arrRwy','arrRwyNum','arrRwyDir','arrAtis','arrAtisRaw','arrTemp','arrDew','arrQnh','arrWindDir','arrWindSpd','arrWindGust'].forEach(k => setFlight(k,''));
      pop.remove();
      const arrTab = document.querySelector('[data-tab="arrival"]') || document.querySelector('.nav-tab:nth-child(3)');
      if (arrTab) arrTab.click();
    });

    // Close card button — returns to active list
    if (onClose) {
      const closeCard = document.createElement('button');
      closeCard.textContent = '\u2715 Close';
      closeCard.style.cssText = 'padding:14px 18px;border-radius:10px;border:1px solid var(--border2);background:var(--surf);color:var(--text2);font-size:22px;font-weight:700;cursor:pointer';
      closeCard.addEventListener('click', onClose);
      actRow.appendChild(pinBtn); actRow.appendChild(confirmBtn); actRow.appendChild(closeCard);
    } else {
      actRow.appendChild(pinBtn); actRow.appendChild(confirmBtn);
    }
    card.appendChild(actRow);
    return card;
  }

  // ── Detail card used in selection list (inline, no close btn) ─────────
  let inlineDetail = null;
  let inlineAnchor = null;

  function showInlineDetail(ap, anchorEl) {
    if (inlineDetail) { inlineDetail.remove(); inlineDetail = null; }
    if (inlineAnchor === anchorEl) { inlineAnchor = null; return; } // toggle off
    inlineAnchor = anchorEl;
    inlineDetail = buildDetailCard(ap, null);
    anchorEl.after(inlineDetail);
    inlineDetail.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  // ── Active diverts view ────────────────────────────────────────────────
  const activeSec = document.createElement('div'); activeSec.id='active-sec';
  activeSec.style.cssText = 'display:flex;flex-direction:column;gap:10px';
  body.appendChild(activeSec);

  const selSec = document.createElement('div'); selSec.id='sel-sec';
  selSec.style.cssText = 'display:flex;flex-direction:column;gap:8px';
  body.appendChild(selSec);

  function renderActive() {
    activeSec.innerHTML = '';
    if (activeDiverts.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'font-size:13px;color:var(--text3);padding:8px 0;text-align:center';
      empty.textContent = 'No active diverts selected. Tap Edit Fields to add airports.';
      activeSec.appendChild(empty);
      return;
    }

    const chipWrap = document.createElement('div');
    chipWrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px';

    activeDiverts.forEach(icao => {
      const ap = (typeof DIVERT_AIRPORTS !== 'undefined') ? DIVERT_AIRPORTS.find(a => a.icao===icao||a.iata===icao) : null;
      if (!ap) return;

      const auth  = ap.b777 || '-';
      const chip  = document.createElement('button');
      chip.id     = 'achip-'+ap.icao;
      chip.style.cssText = 'padding:12px 20px;border-radius:10px;border:2px solid '+AUTH_COLOR[auth]+';background:'+AUTH_BG[auth]+';color:'+AUTH_COLOR[auth]+';font-size:15px;font-weight:800;cursor:pointer;white-space:nowrap;min-width:90px;text-align:center';
      chip.textContent = ap.icao || ap.iata;

      chip.addEventListener('click', () => {
        // Full-width single card view
        activeSec.innerHTML = '';
        const backBtn = document.createElement('button');
        backBtn.textContent = '\u2190 Back to Active Diverts';
        backBtn.style.cssText = 'padding:8px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;align-self:flex-start';
        backBtn.addEventListener('click', () => {
          renderActive();
        });
        activeSec.appendChild(backBtn);
        const card = buildDetailCard(ap, () => renderActive());
        activeSec.appendChild(card);
      });

      chipWrap.appendChild(chip);
    });

    activeSec.appendChild(chipWrap);
  }

  function renderSelection(th) {
    selSec.innerHTML = '';
    if (inlineDetail) { inlineDetail.remove(); inlineDetail = null; inlineAnchor = null; }

    const airports = (typeof DIVERT_AIRPORTS !== 'undefined')
      ? DIVERT_AIRPORTS.filter(a => !th || a.theatres.includes(th))
        .sort((a,b) => {
        const authOrder = {'R':0,'A':1,'F':2,'P':3,'-':4};
        const ao = authOrder[a.b777||'-'] ?? 4;
        const bo = authOrder[b.b777||'-'] ?? 4;
        if (ao !== bo) return ao - bo;
        return (a.icao||'').localeCompare(b.icao||'');
      })
      : [];

    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px';
    lbl.textContent = 'Select Divert Fields' + (th ? ' \u2014 ' + (THEATRES.find(t=>t.code===th)||{label:th}).label : ' \u2014 All Theatres');
    selSec.appendChild(lbl);

    // Manual lookup row
    const manRow = document.createElement('div'); manRow.style.cssText='display:flex;gap:8px;align-items:center';
    const manInp = document.createElement('input'); manInp.type='text'; manInp.placeholder='ICAO or IATA'; manInp.maxLength=4;
    manInp.style.cssText='padding:6px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:14px;font-weight:700;width:90px;text-transform:uppercase;font-family:SF Mono,monospace';
    manInp.addEventListener('input', e=>{ e.target.value=e.target.value.toUpperCase(); });
    const manBtn = document.createElement('button'); manBtn.textContent='Look Up';
    manBtn.style.cssText='padding:6px 12px;border-radius:7px;border:1px solid var(--amber);background:var(--amber-l);color:var(--amber);font-size:12px;font-weight:700;cursor:pointer';
    const lookupFn = () => {
      const val = manInp.value.trim().toUpperCase(); if (!val) return;
      const ap = (typeof DIVERT_AIRPORTS!=='undefined') ? DIVERT_AIRPORTS.find(a=>a.iata===val||a.icao===val) : null;
      const entry = ap || { iata:val.length===3?val:'', icao:val.length===4?val:'', name:val, loc:'Unknown', b777:'-', medical:false, etops:false, rwy:null, elev:null, notes:'Not in database.' };
      showInlineDetail(entry, manBtn);
    };
    manBtn.addEventListener('click', lookupFn);
    manInp.addEventListener('keydown', e=>{ if(e.key==='Enter') lookupFn(); });
    // Copy All Diverts button
    const copyAllBtn = document.createElement('button');
    copyAllBtn.textContent = 'Copy All Diverts to Clipboard';
    copyAllBtn.style.cssText = 'padding:6px 12px;border-radius:7px;border:1px solid var(--blue);background:var(--blue-ll);color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap';
    copyAllBtn.addEventListener('click', () => {
      const idents = airports.map(a => a.icao || a.iata).filter(Boolean).join(' ');
      navigator.clipboard.writeText(idents).then(() => {
        copyAllBtn.textContent = '✓ Copied!';
        setTimeout(() => { copyAllBtn.textContent = 'Copy All Diverts to Clipboard'; }, 2000);
      }).catch(() => {
        copyAllBtn.textContent = 'Copy failed';
        setTimeout(() => { copyAllBtn.textContent = 'Copy All Diverts to Clipboard'; }, 2000);
      });
    });

    // Copy Active button
    const copyActiveBtn = document.createElement('button');
    copyActiveBtn.textContent = 'Copy Active to Clipboard';
    copyActiveBtn.style.cssText = 'padding:6px 12px;border-radius:7px;border:1px solid var(--green);background:var(--green-l);color:var(--green);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap';
    copyActiveBtn.addEventListener('click', () => {
      if (!activeDiverts.length) {
        copyActiveBtn.textContent = 'No active diverts';
        setTimeout(() => { copyActiveBtn.textContent = 'Copy Active to Clipboard'; }, 2000);
        return;
      }
      const idents = activeDiverts.join(' ');
      navigator.clipboard.writeText(idents).then(() => {
        copyActiveBtn.textContent = '✓ Copied!';
        setTimeout(() => { copyActiveBtn.textContent = 'Copy Active to Clipboard'; }, 2000);
      }).catch(() => {
        copyActiveBtn.textContent = 'Copy failed';
        setTimeout(() => { copyActiveBtn.textContent = 'Copy Active to Clipboard'; }, 2000);
      });
    });

    manRow.appendChild(manInp); manRow.appendChild(manBtn);
    manRow.appendChild(copyAllBtn); manRow.appendChild(copyActiveBtn);
    selSec.appendChild(manRow);

    if (!airports.length) {
      const empty = document.createElement('div'); empty.style.cssText='font-size:13px;color:var(--text3);padding:8px 0';
      empty.textContent='No airports for this theatre.'; selSec.appendChild(empty); return;
    }

    const wrap = document.createElement('div'); wrap.style.cssText='display:flex;flex-wrap:wrap;gap:6px';
    airports.forEach(ap => {
      const auth  = ap.b777 || '-';
      const chip  = document.createElement('button');
      chip.id     = 'schip-'+ap.icao;
      const pinned = activeDiverts.includes(ap.icao);
      chip.style.cssText = 'padding:6px 12px;border-radius:8px;border:1px solid '+AUTH_COLOR[auth]+';background:'+AUTH_BG[auth]+';color:'+AUTH_COLOR[auth]+';font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap'+(pinned?';outline:2px solid var(--amber);outline-offset:2px':'');
      chip.textContent = (pinned?'\u2605 ':'')+(ap.icao||ap.iata);
      chip.addEventListener('click', () => showInlineDetail(ap, chip));
      wrap.appendChild(chip);
    });
    selSec.appendChild(wrap);
  }

  // ── Mode switching ────────────────────────────────────────────────────
  let mode = activeDiverts.length === 0 ? 'select' : 'active';

  function setMode(m) {
    mode = m;
    if (m === 'active') {
      ttl.textContent = 'Active Diverts';
      editBtn.textContent = 'Edit Fields';
      editBtn.style.display = 'inline-block';
      clearBtn.style.display = activeDiverts.length > 0 ? 'inline-block' : 'none';
      thSel.style.display = 'none';
      activeSec.style.display = 'flex';
      selSec.style.display = 'none';
      renderActive();
    } else {
      ttl.textContent = 'Select Divert Fields';
      editBtn.textContent = activeDiverts.length > 0 ? 'Done' : '';
      editBtn.style.display = activeDiverts.length > 0 ? 'inline-block' : 'none';
      clearBtn.style.display = 'none';
      thSel.style.display = 'inline-block';
      activeSec.style.display = 'none';
      selSec.style.display = 'flex';
      renderSelection(thSel.value);
    }
  }

  editBtn.addEventListener('click', () => setMode(mode === 'active' ? 'select' : 'active'));

  clearBtn.addEventListener('click', () => {
    // Inline confirm — replace clearBtn with Yes/No pair
    clearBtn.style.display = 'none';
    const confirmRow = document.createElement('span');
    confirmRow.style.cssText = 'display:inline-flex;gap:6px;align-items:center';
    const confirmLbl = document.createElement('span');
    confirmLbl.textContent = 'Clear all?';
    confirmLbl.style.cssText = 'font-size:12px;font-weight:700;color:var(--red)';
    const yesBtn = document.createElement('button');
    yesBtn.textContent = 'Yes';
    yesBtn.style.cssText = 'padding:4px 10px;border-radius:6px;border:1px solid var(--red);background:var(--red);color:#fff;font-size:12px;font-weight:700;cursor:pointer';
    const noBtn = document.createElement('button');
    noBtn.textContent = 'No';
    noBtn.style.cssText = 'padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer';
    confirmRow.appendChild(confirmLbl); confirmRow.appendChild(yesBtn); confirmRow.appendChild(noBtn);
    bar.insertBefore(confirmRow, cls);
    yesBtn.addEventListener('click', () => {
      activeDiverts = [];
      try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
      saveActive();
      confirmRow.remove();
      clearBtn.style.display = 'none';
      setMode('select');
    });
    noBtn.addEventListener('click', () => {
      confirmRow.remove();
      clearBtn.style.display = activeDiverts.length > 0 ? 'inline-block' : 'none';
    });
  });

  thSel.addEventListener('change', () => { if (mode === 'select') renderSelection(thSel.value); });

  setMode(mode);
}



function showDriftdown() {
  if (document.getElementById('driftdown-pop')) { document.getElementById('driftdown-pop').remove(); return; }
  const p = document.createElement('div'); p.id = 'driftdown-pop';
  p.style.cssText = 'position:fixed;top:40px;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;border-top:1px solid var(--border)';
  const bar = document.createElement('div');
  bar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0';
  const ttl = document.createElement('div');
  ttl.style.cssText = 'font-size:28px;font-weight:700;color:var(--text)';
  ttl.textContent = 'Enroute Engine Failure or Loss of Thrust';
  const cls = document.createElement('button');
  cls.textContent = '✕ Close';
  cls.style.cssText = 'padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer';
  cls.addEventListener('click', () => p.remove());
  bar.appendChild(ttl); bar.appendChild(cls); p.appendChild(bar);
  const body = document.createElement('div');
  body.style.cssText = 'flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:6px';
  const sub = document.createElement('div');
  sub.style.cssText = 'font-size:24px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;padding:4px 0 6px';
  sub.textContent = 'Oceanic Driftdown/Diversion Techniques Summary';
  body.appendChild(sub);
  const steps = [
    "On CDU press RTE, RTE OFFSET L or R 5, EXEC. Check LNAV in FMA.",
    "Set MCP altitude to 20,000' and Do Not Push.",
    "On CDU press VNAV. Select ENG OUT & EXEC. Check VNAV SPD in FMA.",
    "Exterior lights ON, SEATBELTS sign ON.",
    "When able: Advise ATC via CPDLC/HF/SATCOM. Alert other aircraft on 121.5, 123.45.",
    "When established on OFFSET, on CDU press VNAV and select CO SPD & EXEC.",
    "Reset MCP to descend to a flight level below MAX altitude that differs from those normally used by 500' until a new clearance is obtained.",
    "Consider using FLCH and set speed .85/310 to expedite descent below FL 290.",
    "PIC may proceed as required when:\n\u2022 Clearance received, or\n\u2022 Descent below FL290, or\n\u2022 PIC decision to ensure aircraft safety."
  ];
  steps.forEach((step, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--surf);border:1px solid var(--border);border-radius:8px';
    const num = document.createElement('div');
    num.style.cssText = "font-size:26px;font-weight:800;color:var(--blue);min-width:40px;flex-shrink:0;font-family:'SF Mono',monospace";
    num.textContent = (i + 1) + '.';
    const txt = document.createElement('div');
    txt.style.cssText = 'font-size:26px;color:var(--text);line-height:1.6;white-space:pre-line';
    txt.textContent = step;
    row.appendChild(num); row.appendChild(txt); body.appendChild(row);
  });
  const note = document.createElement('div');
  note.style.cssText = 'font-size:22px;color:var(--text3);line-height:1.5;padding:10px 12px;background:var(--surf2);border:1px solid var(--border);border-radius:8px;margin-top:2px';
  note.textContent = 'This technique summary may be used for non-radar continental driftdowns/diverts (over Russian and China only offset right).';
  body.appendChild(note);
  p.appendChild(body); document.body.appendChild(p);
}

function renderArrival(c) {
  c.style.cssText = '';
  const flightIdx  = state.flightIdx || 0;
  const totalFlights = state.flights ? state.flights.length : 1;
  const fl = state.flights ? (state.flights[flightIdx] || {}) : (state.flight || {});

  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const fmt = d => { const h=String(d.getHours()).padStart(2,'0'); const m=String(d.getMinutes()).padStart(2,'0'); return h+':'+m; };

  const toUTC = (localMin, offsetMin) => ((localMin - offsetMin) % 1440 + 1440) % 1440;

  const parseHHMM = v => { if (!v) return null; const p=v.split(':'); return p.length===2?parseInt(p[0])*60+parseInt(p[1]):null; };

function recalcArrWind() {
  const fl = state.flights ? (state.flights[state.flightIdx] || {}) : (state.flight || {});
  const el = document.getElementById('arr-xwind-display');
  if (!el) return;
  const rwy = parseInt(fl.arrRwyNum || fl.arrRwy) || 0;
  const dir = parseInt(fl.arrWindDir) || 0;
  const spd = parseInt(fl.arrWindSpd) || 0;
  if (!spd || !rwy) { el.innerHTML = '<div style="font-size:10px;color:var(--text3)">Enter RWY + Wind for crosswind calc</div>'; return; }
  const ang = (dir - (rwy * 10) % 360) * Math.PI / 180;
  const xw = Math.round(Math.abs(spd * Math.sin(ang)));
  const hw = Math.round(spd * Math.cos(ang));
  const xwC = xw > 25 ? 'var(--red)' : xw > 10 ? 'var(--amber)' : 'var(--green)';
  const twLimit = (fl.acType || '777-200ER') === '777-300ER' ? 15 : 10;
  const twExceeded = hw < 0 && Math.abs(hw) > twLimit;
  const hwC = hw >= 0 ? 'var(--green)' : twExceeded ? '#fff' : Math.abs(hw) >= 1 ? 'var(--amber)' : 'var(--green)';
  const bx = 'padding:4px 8px;border-radius:5px;border:1px solid var(--border2);background:var(--surf3);font-size:13px;font-weight:700;font-family:monospace;text-align:center;cursor:pointer';
  const hwBx = twExceeded ? bx.replace('background:var(--surf3)', 'background:var(--red);border-color:var(--red)') : bx;
  el.innerHTML = '<div style="display:flex;gap:8px;align-items:flex-end">'
    + '<div style="display:flex;flex-direction:column;gap:2px"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">X-Wind</div>'
    + '<div style="' + bx + ';color:' + xwC + '" onclick="showArrXwindPopup(' + xw + ')">' + String(xw).padStart(2, '0') + ' kt</div></div>'
    + '<div style="display:flex;flex-direction:column;gap:2px"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px">' + (hw >= 0 ? 'Headwind' : 'Tailwind') + '</div>'
    + '<div style="' + hwBx + ';color:' + hwC + '" onclick="showArrTailwindPopup(' + hw + ')">' + String(Math.abs(hw)).padStart(2, '0') + ' kt</div></div>'
    + '</div>';
}

function parseArrATIS(text) {
  const fl = state.flights ? (state.flights[state.flightIdx] || {}) : (state.flight || {});
  const atisSel = document.getElementById('arr-atis-sel');
  const tempInp = document.getElementById('arr-temp-inp');
  const dewInp  = document.getElementById('arr-dew-inp');
  const wdirInp = document.getElementById('arr-wdir-inp');
  const wspdInp = document.getElementById('arr-wspd-inp');
  const gustInpArr = document.getElementById('arr-gust-inp');
  const infoM = text.match(/INFORMATION\s+([A-Z])\b/i) || text.match(/\bINFO\s+([A-Z])\b/i);
  if (infoM && atisSel) { setFlight('arrAtis', infoM[1].toUpperCase()); Array.from(atisSel.options).forEach(o=>{ o.selected = o.value===infoM[1].toUpperCase(); }); }
  const windM = text.match(/(\d{3})(\d{2,3})(?:G(\d{2,3}))?KT/i) || text.match(/WIND\s+(\d{3})\/(\d{1,3})/i);
  if (windM) {
    const dir = windM[1].padStart(3,'0'), spd = String(parseInt(windM[2]));
    const gust = windM[3] ? String(parseInt(windM[3])) : '';
    setFlight('arrWindDir', dir); if(wdirInp) wdirInp.value = dir;
    setFlight('arrWindSpd', spd); if(wspdInp) wspdInp.value = spd;
    if(gust){ setFlight('arrWindGust', gust); if(gustInpArr) gustInpArr.value = gust; }
  }

    const parseC = s => s.startsWith('M') ? -parseInt(s.slice(1)) : parseInt(s);
    const tempVal = String(parseC(tdM[1]));
    const dewVal  = String(parseC(tdM[2]));
    setFlight('arrTemp', tempVal); if(tempInp){ tempInp.value=tempVal; tempInp.dispatchEvent(new Event('change')); }
    setFlight('arrDew',  dewVal);  if(dewInp)  dewInp.value=dewVal;
  }
  const qnhM = text.match(/\bA(\d{4})\b/) || text.match(/\bQ(\d{4})\b/);
  if (qnhM) { const qnh = qnhM[0][0]==='A' ? (parseInt(qnhM[1])/100).toFixed(2) : qnhM[1]; setFlight('arrQnh', qnh); const qnhEl=document.getElementById('arr-qnh-inp'); if(qnhEl) qnhEl.value=qnh; }
  recalcArrWind();
}
function fetchArrATIS() {
  const fl = state.flights ? (state.flights[state.flightIdx] || {}) : (state.flight || {});
  const rawDiv  = document.getElementById('arr-atis-raw');
  const atisSel = document.getElementById('arr-atis-sel');
  const tempInp = document.getElementById('arr-temp-inp');
  const dewInp  = document.getElementById('arr-dew-inp');
  const wdirInp = document.getElementById('arr-wdir-inp');
  const wspdInp = document.getElementById('arr-wspd-inp');
  const gustInpArr = document.getElementById('arr-gust-inp');
  if (!rawDiv) return;
  const icao = fl.arrCity || '';
  const ICAO_MAP = {PHX:'KPHX',LAX:'KLAX',DFW:'KDFW',CLT:'KCLT',JFK:'KJFK',MIA:'KMIA',LHR:'EGLL',NRT:'RJAA',HND:'RJTT',SYD:'YSSY',AKL:'NZAA',ICN:'RKSI'};
  const icaoCode = ICAO_MAP[icao] || icao;
  rawDiv.textContent = 'Fetching ATIS…';

  const proxy = url => 'https://corsproxy.io/?url=' + encodeURIComponent(url);
  const fetchT = (url, ms=4000) => { const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),ms); return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(t)); };

  const fill = (text) => {
    rawDiv.textContent = text;
    setFlight('arrAtisRaw', text);
    parseArrATIS(text);
    recalcArrWind();
  };

  const datisUrl  = 'https://datis.clowd.io/api/' + icaoCode;
  const guruUrl   = 'https://api.atis.guru/v1/stations/' + icaoCode;
  const metarUrl  = 'https://aviationweather.gov/api/data/metar?ids=' + icaoCode + '&format=json&taf=false';

  const tryMetar = () => {
    fetchT(proxy(metarUrl))
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const m=Array.isArray(data)?data[0]:data; const raw=m&&(m.rawOb||m.raw_text)||''; if(!raw) throw new Error(); fill('(METAR) '+raw); })
      .catch(() => {
        fetchT(metarUrl)
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(data => { const m=Array.isArray(data)?data[0]:data; const raw=m&&(m.rawOb||m.raw_text)||''; if(raw) fill('(METAR) '+raw); else throw new Error(); })
          .catch(() => { if(rawDiv) rawDiv.textContent = 'Could not fetch — enter manually'; });
      });
  };

  const tryGuru = () => {
    fetchT(proxy(guruUrl))
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const entry=Array.isArray(data)?data[0]:data; const text=entry.arr_atis||(Array.isArray(entry.atis_entries)?(entry.atis_entries.find(x=>/^ARR/i.test(x.type||''))||entry.atis_entries[0]||{}).atis:null)||entry.atis||entry.text||entry.atis_raw||''; if(!text) throw new Error(); fill(text); })
      .catch(() => tryMetar());
  };

  fetchT(proxy(datisUrl))
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => { const arr=Array.isArray(data)?data:[data]; const a=arr.find(x=>/^ARR/i.test(x.type||''))||arr[0]; const t=a&&(a.datis||a.text)||''; if(!t) throw new Error(); fill(t); })
    .catch(() => tryGuru());
}

function updateLayoverCountdown() {
  if (tab !== 'layover') return;
  const lay = state.layover || {};
  const el = document.getElementById('layover-countdown');
  if (!el) return;
  const pickupDate = lay.pickupDate || '';
  const pickupTime = lay.pickupTime || '';
  if (!pickupDate || !pickupTime) { el.textContent = '—'; return; }
  const pickupMs = new Date(pickupDate + 'T' + pickupTime + ':00').getTime();
  if (isNaN(pickupMs)) { el.textContent = '??'; return; }
  const diffMs = pickupMs - Date.now();
  if (diffMs <= 0) {
    el.textContent = diffMs > -3600000 ? 'NOW' : 'DEPARTED';
    el.style.color = 'var(--red)';
    return;
  }
  const totalSecs = Math.floor(diffMs / 1000);
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  const s = totalSecs % 60;
  el.textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  el.style.color = totalSecs < 3600 ? 'var(--red)' : totalSecs < 7200 ? 'var(--amber)' : 'var(--green)';
}
setInterval(updateLayoverCountdown, 1000);


function fmtTime(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 4) v = v.slice(0, 4);
  if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2);
  el.value = v;
  // Validate range
  if (v.length === 5) {
    const [h, m] = v.split(':').map(Number);
    el.style.borderColor = (h < 24 && m < 60) ? 'var(--border2)' : 'var(--red)';
  } else {
    el.style.borderColor = 'var(--border2)';
  }
}

function validTime(v) {
  if (!v || v.length !== 5 || v[2] !== ':') return false;
  const [h, m] = v.split(':').map(Number);
  return h >= 0 && h < 24 && m >= 0 && m < 60;
}


function updateDepInTimer() {
  const el = document.getElementById('dep-in-timer');
  if (!el) return;
  const fl = currentFlight();
  if (!fl.depDate || !fl.depTime) return;
  try {
    // depTime is entered as departure city local — convert to UTC using depOff
    const cityList = (typeof CITY_LIST !== 'undefined') ? CITY_LIST : [];
    const depOffMin = (cityList.find(x=>x.v===fl.depCity)||{off:-420}).off;
    const [dh, dm] = fl.depTime.split(':').map(Number);
    const depLocalMs = new Date(fl.depDate + 'T00:00:00Z').getTime() + dh*3600000 + dm*60000;
    const depMs = depLocalMs - depOffMin * 60000;  // UTC epoch
    const diff = depMs - Date.now();
    const abs = Math.abs(diff);
    const past = diff < 0;
    const h = Math.floor(abs / 3600000);
    const m = Math.floor((abs % 3600000) / 60000);
    const mins = diff / 60000;
    el.textContent = (past ? '-' : '') + (h > 0 ? h + 'h ' : '') + m + 'm';
    el.style.color = mins <= 0 ? 'var(--red)' : mins < 15 ? 'var(--amber)' : 'var(--green)';
  } catch(e) {}
}


// ── Takeoff timer ──────────────────────────────────────────────────────────
function elapsedStr(takeoffTime) {
  const secs = Math.floor((Date.now() - takeoffTime) / 1000);
  if (secs < 0) return '0:00:00';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function handleTakeoffTap() {
  const fl = currentFlight();
  if (fl.takeoffTime) {
    // Confirm reset
    if (!confirm('Reset takeoff timer?')) return;
    setFlight('takeoffTime', null);
  } else {
    const now = new Date();
    setFlight('takeoffTime', Date.now());
    // Auto-fill break calculator takeoff time with current UTC HH:MM
    const utcH = String(now.getUTCHours()).padStart(2,'0');
    const utcM = String(now.getUTCMinutes()).padStart(2,'0');
    setFlight('brkTakeoff', utcH + ':' + utcM);
  }
  render();
}

function updateElapsedDisplay() {
  const fl = currentFlight ? currentFlight() : (state.flight || {});
  if (!fl || !fl.takeoffTime) return;
  const el = document.getElementById('elapsed-display');
  if (el) el.textContent = elapsedStr(fl.takeoffTime);
}

function updateFlightRemaining() {
  const el = document.getElementById('flight-remaining');
  if (!el) return;
  const fl = currentFlight ? currentFlight() : (state.flight || {});
  if (!fl || !fl.arrTime) { el.textContent = '—:——'; return; }
  // Compute arrUTC from arrTime + arrCity offset
  const arrOff2 = cityOffset(fl.arrCity || '', 0);
  const arrParts = (fl.arrTime || '').split(':');
  if (arrParts.length !== 2) { el.textContent = '—:——'; return; }
  const arrLocalMin = parseInt(arrParts[0]) * 60 + parseInt(arrParts[1]);
  const arrUTC2 = ((arrLocalMin - arrOff2) % 1440 + 1440) % 1440;
  // Current UTC minutes from midnight
  const now = new Date();
  const nowUTC = now.getUTCHours() * 60 + now.getUTCMinutes();
  // Remaining: handle day wrap
  let rem = (arrUTC2 - nowUTC + 1440) % 1440;
  // If remaining > 20 hours it's probably in the past — show 0
  if (rem > 1200) rem = 0;
  if (rem === 0) { el.textContent = 'LANDED'; el.style.color = 'var(--green)'; return; }
  el.style.color = rem < 60 ? 'var(--amber)' : 'var(--text)';
  const h = Math.floor(rem / 60);
  const m = rem % 60;
  el.textContent = h + ':' + String(m).padStart(2, '0');
}

// ── CDI Parser ──────────────────────────────────────────────────────────────
function parseCDI(text) {
  const lines = text.split(/\r?\n/);
  const result = { crew: [] };

  // Header line: "784/05 83 N7AD FROM 3085/05 IN 0942/05 AS OF 08JUN26/0937"
  // Or: "CREW DEPARTURE INFORMATION" on line 1
  for (const l of lines) {
    // Flight number from "784/05" at start or from "AA 784"
    const fltM = l.match(/^\s*(\d{3,4})\/\d{2}\s/) || l.match(/\bAA\s*(\d{3,4})\b/i);
    if (fltM && !result.flightNum) result.flightNum = fltM[1];

    // Nose number: "N7AD" — strip N, validate side number
    const noseM = l.match(/\bN(7[A-L][A-Z])\b/i);
    if (noseM && !result.acftNose) result.acftNose = noseM[1].toUpperCase();

    // DEP row: "DEP CLT 1625/05 OUT 1617/05 A4X"
    const depM = l.match(/^\s*DEP\s+(\w{2,4})\s+(\d{2})(\d{2})\/(\d{2})(?:.*?(\w{1,5})\s*$)?/i);
    if (depM) {
      result.depCity = depM[1].toUpperCase();
      result.depTime = depM[2] + ':' + depM[3];
      result.depDay  = parseInt(depM[4]);
      if (depM[5] && /^[A-Z0-9]{2,5}$/.test(depM[5])) result.gate = depM[5];
    }

    // ARV row: "ARV MUC 0710/06 IN 0631/06 105 TCAS OPN"
    const arvM = l.match(/^\s*ARV\s+(\w{2,4})\s+(\d{2})(\d{2})\/(\d{2})/i);
    if (arvM) {
      result.arrCity = arvM[1].toUpperCase();
      result.arrTime = arvM[2] + ':' + arvM[3];
      result.arrDay  = parseInt(arvM[4]);
      // Arrival gate: first token after times that looks like a gate
      const arvRest = l.slice(l.indexOf(arvM[0]) + arvM[0].length).trim().split(/\s+/);
      const gateToken = arvRest.find(t => /^\d{1,4}$/.test(t) || /^[A-Z]\d{1,3}[A-Z]?$/.test(t));
      if (gateToken) result.arrGate = gateToken;
    }

    // Aircraft type + engine: "CLT MUC B772 2007 GE"
    const acM = l.match(/\b(B77[23]|B777|B772|B773)\b/i);
    if (acM && !result.acType) result.acType = acM[1].toUpperCase() === 'B772' ? '777-200ER' : '777-300ER';

    // Dispatcher: "DISP FD50 6823157150 DAVID JUNE LOAD L036 6823157336 ANDREA BARTON"
    const dispM = l.match(/DISP\s+(FD\d+)\s+(\d{7,12})\s+([A-Z][A-Z\s]+?)(?:\s+LOAD|\s*$)/i);
    if (dispM) {
      result.dispatchDesk = dispM[1].toUpperCase();
      result.dispPhone    = dispM[2];
      result.dispName     = dispM[3].trim();
    }

    // Crew rows: " DFW -CA 104 SMITH SCOTT 083696 00130/10"
    //            " DFW FFO 7208 PARIZEK JODY 580456 00130/10"
    //            " DFW -01 4812 MEADE GREG 153004 00318/10"   (FA #1)
    // Also legacy: "CLT *CA 1220 BRYAN NAP 332955 00102/05"
    const crewM = l.match(/^\s*\w{3}\s+[-*F]?(CA|FO|FB|FC|C\/O|\d{2})\s+(\d+)\s+([A-Z][A-Z\s]+?)\s+(\d{4,8})\s+\d{3,5}\/\d{2}/i);
    if (crewM) {
      const rawSeat = crewM[1].toUpperCase();
      const seatNum = parseInt(rawSeat);
      const isFa1  = !isNaN(seatNum) && seatNum === 1;
      const isCkpt = ['CA','FO','FB','FC','C/O'].includes(rawSeat);
      if (isCkpt || isFa1) {
        result.crew.push({
          seat: isFa1 ? '#1 FA' : rawSeat,
          sen:  crewM[2],
          name: crewM[3].trim(),
          emp:  crewM[4],
        });
      }
    }

    // Jetbridge code: "JETBRIDGE CODE 3894"
    const jbM = l.match(/JETBRIDGE\s+CODE\s+(\S+)/i);
    if (jbM && !result.jetbridge) result.jetbridge = jbM[1];

    // Frequencies and phones
    const opsFreqM  = l.match(/OPS\s+RADIO\s+FREQ\s+([\d.]+)/i);
    const opsPhM    = l.match(/OPS\s+PHONE\s+([\d\-]+)/i);
    const atisFreqM = l.match(/ATIS\s+FREQ\s+([\d.]+)/i);
    const atisPHM   = l.match(/ATIS\s+PHONE\s+([\d\-]+)/i);
    const maintFqM  = l.match(/MAINT\s+FREQ\s+([\d.]+)/i);
    const maintPhM  = l.match(/MAINT\s+PHONE\s+([\d\-]+)/i);
    if (opsFreqM)  result.opsFreq   = opsFreqM[1];
    if (opsPhM)    result.opsPhone  = opsPhM[1];
    if (atisFreqM) result.atisFreq  = atisFreqM[1];
    if (atisPHM)   result.atisPhone = atisPHM[1];
    if (maintFqM)  result.maintFreq = maintFqM[1];
    if (maintPhM)  result.maintPhone= maintPhM[1];
  }

  // Build dates from day numbers + current year/month
  if (result.depDay) {
    const now = new Date();
    const yr = now.getFullYear();
    const mo = String(now.getMonth()+1).padStart(2,'0');
    result.depDate = yr + '-' + mo + '-' + String(result.depDay).padStart(2,'0');
    if (result.arrDay) {
      const arrDayNum = result.arrDay;
      const depDayNum = result.depDay;
      const arrMo = arrDayNum < depDayNum ? String(now.getMonth()+2).padStart(2,'0') : mo;
      const arrYr  = parseInt(arrMo) > 12 ? yr+1 : yr;
      result.arrDate = arrYr + '-' + (parseInt(arrMo)>12?'01':arrMo) + '-' + String(arrDayNum).padStart(2,'0');
    }
  }

  if (!result.flightNum && !result.depCity) return null;
  return result;
}

// ── Crew Log (localStorage) ──────────────────────────────────────────────────
const CREW_LOG_KEY = 'aa777_crew_log';
function getCrewLog() {
  try { return JSON.parse(localStorage.getItem(CREW_LOG_KEY) || '{}'); } catch(e) { return {}; }
}
function saveCrewLog(log) {
  try { localStorage.setItem(CREW_LOG_KEY, JSON.stringify(log)); } catch(e) {}
}
function recordCrewFlight(emp, name, flightId) {
  const log = getCrewLog();
  if (!log[emp]) log[emp] = { name, notes: '', flights: [] };
  log[emp].name = name; // keep name current
  // Only record each unique flight once per emp
  if (flightId && !log[emp].flights.includes(flightId)) {
    log[emp].flights.push(flightId);
  }
  saveCrewLog(log);
}

function forceUpdate() {
  const base = location.origin + location.pathname.replace(/[^/]*$/, '');
  const hardReload = () => { window.location.replace(base); };

  // Preferred path: ask the active service worker to refetch the shell and reload us.
  const ctrl = navigator.serviceWorker && navigator.serviceWorker.controller;
  if (ctrl) {
    // The SW will post RELOAD_NOW back once it has fresh content cached
    let reloaded = false;
    const onMsg = (e) => {
      if (e.data && e.data.type === 'RELOAD_NOW' && !reloaded) {
        reloaded = true;
        navigator.serviceWorker.removeEventListener('message', onMsg);
        window.location.replace(base);
      }
    };
    navigator.serviceWorker.addEventListener('message', onMsg);
    ctrl.postMessage({ type: 'FORCE_UPDATE' });
    // Fallback if the SW never responds
    setTimeout(() => { if (!reloaded) { reloaded = true; clearAndReload(base); } }, 3000);
    return;
  }

  // No controller — clear caches directly and reload
  clearAndReload(base);
}

function clearAndReload(base) {
  const done = () => window.location.replace(base);
  if (window.caches && caches.keys) {
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(done).catch(done);
  } else { done(); }
  setTimeout(done, 2500);
}
