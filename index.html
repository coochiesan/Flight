<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flight">
<meta name="theme-color" content="#0a0c0f">
<title>Flight Plan</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0c0f;--surf:#111318;--surf2:#181c22;--surf3:#1e2530;
  --border:#1e2530;--border2:#2a3340;
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
  --blue:#3b82f6;--blue-l:#1e3a5f;--blue-ll:#0d1f35;
  --green:#10b981;--green-l:#0d3d2e;
  --amber:#f97316;--amber-l:#3d1f08;
  --purple:#a855f7;--purple-l:#2d1a4a;
  --red:#ef4444;--red-l:#3d1414;
  --teal:#14b8a6;--teal-l:#0d332f;
  --pink:#ec4899;--pink-l:#3d1229;
  --radius:10px;--radius-sm:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
body.light{
  --bg:#F5F4F0;--surf:#FFFFFF;--surf2:#F1EFE8;--surf3:#E8E6DF;
  --border:#E2DFD6;--border2:#D3D0C7;
  --text:#1A1A18;--text2:#5F5E5A;--text3:#9CA39A;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-ll:#B5D4F4;
  --green:#3B6D11;--green-l:#EAF3DE;
  --amber:#c2410c;--amber-l:#FDEBD4;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --teal:#0F6E56;--teal-l:#E1F5EE;
  --pink:#993556;--pink-l:#FBEAF0;
}
html,body{height:100%;height:100dvh;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:10px;overflow:hidden;position:fixed;width:100%}

/* ── Layout ── */
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,0px);padding-bottom:0;box-sizing:border-box;overflow:hidden}
#header{flex-shrink:0;padding:5px 12px 4px;background:var(--surf);border-bottom:1px solid var(--border)}
#content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:5px 8px 12px}
#nav{flex-shrink:0;display:flex;background:var(--surf);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0px)}

/* ── Portrait layout overrides ── */
@media (orientation:portrait){
  #content{padding:4px 6px 16px}
  .card{margin-bottom:6px}
  .hdr-title{font-size:15px}
  #clock-local{font-size:16px!important}
  #clock-pdt{font-size:13px!important}
  .mode-btn{font-size:12px;padding:5px 2px}
}

/* ── Header ── */
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.mode-row{display:flex;gap:5px;margin-top:5px}
.mode-btn{flex:1;padding:4px 4px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mode-btn.active{background:var(--blue-ll);border-color:var(--blue);color:var(--blue)}

/* ── Nav ── */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border:none;background:none;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;gap:3px;letter-spacing:0.3px;text-transform:uppercase}
.nav-btn svg{width:18px;height:18px}
.nav-btn.active{color:var(--blue)}

/* ── Cards ── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--border)}
.card-hdr-left{display:flex;align-items:center;gap:8px}
.card-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.card-title{font-size:13px;font-weight:600}
.card-time{font-size:13px;color:var(--text2);font-family:'SF Mono',monospace}

/* ── Task rows ── */
.task{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.task:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done svg{display:block}
.task-check svg{display:none;width:12px;height:12px}
.task-body{flex:1;min-width:0}
.task-label{font-size:13px;font-weight:500;line-height:1.3}
.task-label.done{opacity:.4;text-decoration:line-through}
.task-sub{font-size:13px;color:var(--text2);margin-top:2px;line-height:1.4}
.task-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;white-space:nowrap}

/* ── Progress bar ── */
.progress-wrap{padding:10px 14px 12px;background:var(--surf2)}
.progress-row{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-label{font-size:13px;color:var(--text2)}
.progress-val{font-size:13px;font-weight:600;color:var(--green)}
.progress-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* ── Workout ── */
.ex-group{margin-bottom:6px}
.ex-group-hdr{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:8px 14px 4px}
.ex-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-name{flex:1;font-size:13px;font-weight:500}
.ex-sets{font-size:10px;color:var(--blue);font-weight:600;font-family:'SF Mono',monospace;white-space:nowrap}
.ex-log{display:flex;gap:6px;align-items:center}
.ex-input{width:52px;padding:4px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:10px;text-align:center;font-family:'SF Mono',monospace}
.ex-x{font-size:13px;color:var(--text3)}
.ex-cue{font-size:10px;color:var(--text3);padding:2px 14px 6px;line-height:1.4}

/* ── Layover ── */
.tz-bar{display:flex;gap:1px;margin-bottom:8px}
.tz-block{flex:1;background:var(--surf2);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.tz-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.tz-time{font-family:'SF Mono',monospace;font-size:18px;font-weight:700}
.tz-body{font-size:10px;color:var(--text2);margin-top:2px}
.tz-bar .tz-block:first-child{border-top-right-radius:0;border-bottom-right-radius:0}
.tz-bar .tz-block:last-child{border-top-left-radius:0;border-bottom-left-radius:0}

.timeline-item{display:flex;gap:12px;padding:8px 0;position:relative}
.tl-time{width:80px;flex-shrink:0;text-align:right}
.tl-local{font-size:13px;font-weight:600;font-family:'SF Mono',monospace}
.tl-pdt{font-size:10px;color:var(--text3);font-family:'SF Mono',monospace}
.tl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:3px}
.tl-body{flex:1}
.tl-title{font-size:13px;font-weight:600;line-height:1.3}
.tl-sub{font-size:13px;color:var(--text2);margin-top:2px;line-height:1.4}
.tl-line{width:1px;background:var(--border2);position:absolute;left:92px;top:22px;bottom:-8px}
.timeline-item:last-child .tl-line{display:none}
.alert-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.alert-time-input{padding:4px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:12px;font-family:'SF Mono',monospace;width:90px}
.alert-label{font-size:12px;color:var(--text2);flex:1}
.alert-toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .15s}
.alert-toggle.on{background:var(--blue)}
.alert-toggle.off{background:var(--border2)}
.alert-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;transition:left .15s}
.alert-toggle.on::after{left:18px}
.alert-toggle.off::after{left:2px}

/* ── Bloodwork ── */
.bw-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)}
.bw-row:last-child{border-bottom:none}
.bw-name{flex:1;font-size:13px;font-weight:500}
.bw-range{font-size:13px;color:var(--text3);margin-right:8px}
.bw-val{font-family:'SF Mono',monospace;font-size:13px;font-weight:600;width:70px;text-align:right}
.bw-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:6px}
.bw-input{width:70px;padding:3px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:12px;font-family:'SF Mono',monospace;text-align:right}

/* ── Section label ── */
.section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 6px}

/* ── Macro bar ── */
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.macro-cell{background:var(--surf2);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.macro-val{font-size:16px;font-weight:700;font-family:'SF Mono',monospace}
.macro-label{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ── Notification banner ── */
#notif-banner{background:var(--blue-ll);border:1px solid var(--blue);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;display:none}
#notif-banner.show{display:block}
.notif-title{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:2px}
.notif-sub{font-size:13px;color:var(--text2)}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}

/* ── Utilities ── */
.flex-row{display:flex;align-items:center;gap:8px}
.spacer{flex:1}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.mt8{margin-top:8px}
/* Normalize select height to match text inputs across all browsers/iOS */
select{-webkit-appearance:none;appearance:none;height:auto;line-height:normal}

</style>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('Protocol app updated');
          }
        });
      });
    })
    .catch(err => console.log('SW registration failed:', err));

  // Listen for "new version fetched" messages from the service worker
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'SW_UPDATED') { showUpdateBanner(); }
  });
}

function showUpdateBanner() {
  if (document.getElementById('update-banner')) return;
  const b = document.createElement('div');
  b.id = 'update-banner';
  b.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#1e7f3c;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:sans-serif;font-size:15px;font-weight:700;box-shadow:0 -2px 12px rgba(0,0,0,0.4)';
  b.innerHTML = '<span>New version available</span>';
  const btn = document.createElement('button');
  btn.textContent = 'Reload now';
  btn.style.cssText = 'padding:8px 16px;border-radius:8px;border:none;background:#fff;color:#1e7f3c;font-size:15px;font-weight:800;cursor:pointer';
  btn.addEventListener('click', () => location.reload(true));
  b.appendChild(btn);
  document.body.appendChild(b);
}
</script>
</head>
<body>
<div id="app">
<div id="offline-bar" style="display:none;background:var(--amber-l);border-bottom:1px solid var(--amber);padding:6px 16px;font-size:13px;color:var(--amber);font-weight:600;text-align:center">
  OFFLINE MODE — all data saved locally
</div>
<div id="header">
  <div class="hdr-top">
    <div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="hdr-title">777 Flight</div>
        <div id="wt-restrict-badge" style="display:none"></div>
      </div>
      <div id="date-display" style="font-size:13px;color:var(--text2);margin-top:1px"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="theme-toggle" onclick="toggleTheme()" style="background:var(--surf2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap">Light</button>
      <button id="phone-mode-btn" onclick="togglePhoneMode()" style="background:var(--surf2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap">Phone</button>
      <div class="hdr-time">
        <div id="clock-local" style="font-size:18px;font-weight:700;font-family:'SF Mono',monospace"></div>
        <div id="clock-pdt" style="font-size:18px;color:var(--text3)"></div>
      </div>
    </div>
  </div>
  <div class="mode-row">
    <div class="mode-btn active" onclick="setMode('preflight')" id="btn-preflight">Preflight</div>
    <div class="mode-btn" onclick="setMode('flight')" id="btn-flight">Flight</div>
    <div class="mode-btn" onclick="setMode('arrival')" id="btn-arrival">Arrival</div>
  </div>
</div>

<div id="content"></div>

<div id="nav">
  <button class="nav-btn active" id="nav-flight" onclick="setTab('flight')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .99h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
    Flight
  </button>
  <button class="nav-btn" id="nav-layover" onclick="setTab('layover')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16l-9-9-9 9"/><path d="M12 7v14"/><path d="M5 21h14"/></svg>
    Layover
  </button>
</div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
// Numeric month lookup used by the CCI date parser
const MONTH_NUM = {JAN:'01',FEB:'02',MAR:'03',APR:'04',MAY:'05',JUN:'06',JUL:'07',AUG:'08',SEP:'09',OCT:'10',NOV:'11',DEC:'12'};

let mode = 'preflight';
let tab = 'flight';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem('protocol_state') || '{}'); } catch(e) { state = {}; }
  if (!state.checks) state.checks = {};
  if (!state.weights) state.weights = {};
  if (!state.alerts) state.alerts = {};
  if (!state.layover) state.layover = { tz: 'Europe/London', tzName: 'London BST' };
  if (!state.flight) state.flight = {};
  if (state.theme === 'light') applyTheme('light');
}

function toggleTheme() {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  applyTheme(next);
  state.theme = next;
  saveState();
}

function applyTheme(t) {
  const btn = document.getElementById('theme-toggle');
  if (t === 'light') {
    document.body.classList.add('light');
    if (btn) btn.textContent = 'Dark';
  } else {
    document.body.classList.remove('light');
    if (btn) btn.textContent = 'Light';
  }
}
function saveState() { localStorage.setItem('protocol_state', JSON.stringify(state)); }

// -- Protocol sync --
const APP_BUILD = '2026-07-17.26';
const PROTOCOL_SYNC_URL = 'https://protocol-sync.coochiesan.workers.dev';
const PROTOCOL_PIN = '3057';

// Resolve city offset (minutes from UTC) — checks CITY_LIST then state.customCities
function cityOffset(code, fallback) {
  if (!code) return fallback !== undefined ? fallback : 0;
  const inList = (typeof CITY_LIST !== 'undefined') ? CITY_LIST.find(x => x.v === code) : null;
  if (inList) return inList.off;
  const inCustom = (state.customCities || []).find(c => c.v === code || c.icao === code);
  if (inCustom) return inCustom.offset;
  return fallback !== undefined ? fallback : 0;
}
function cityTZ(code) {
  const inList = (typeof CITY_LIST !== 'undefined') ? CITY_LIST.find(x => x.v === code) : null;
  if (inList) return inList.tz;
  const inCustom = (state.customCities || []).find(c => c.v === code || c.icao === code);
  if (inCustom) return inCustom.tz;
  return 'UTC';
}

function setMode(m) {
  mode = m;
  const mr = document.querySelector('.mode-row');
  if (mr) mr.style.display = 'flex';
  render();
}

function setTab(t) {
  tab = t;
  const modeRow = document.querySelector('.mode-row');
  if (modeRow) modeRow.style.display = t === 'layover' ? 'none' : 'flex';
  ['flight', 'layover'].forEach(x => {
    const el = document.getElementById('nav-'+x); if(el) el.classList.toggle('active', x===t);
  });
  render();
}

// ── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const day = DAYS[now.getDay()];
  const mon = MONTHS[now.getMonth()];
  document.getElementById('date-display').textContent = `${day}, ${mon} ${now.getDate()}`;

  const localH = String(now.getHours()).padStart(2,'0');
  const localM = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-local').textContent = `${localH}:${localM}`;

  const pdtOffset = (state.layover && state.layover.bodyClockZone)
    ? (() => { try { const now=new Date(); const fmt=new Intl.DateTimeFormat('en-US',{timeZone:state.layover.bodyClockZone,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}); const p=fmt.formatToParts(now).reduce((a,x)=>{a[x.type]=x.value;return a},{}); return Math.round((Date.UTC(+p.year,+p.month-1,+p.day,p.hour==='24'?0:+p.hour,+p.minute,+p.second)-now.getTime())/60000); } catch(e){return -420;} })()
    : -7 * 60;
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const pdt = new Date(utc + pdtOffset * 60000);
  const pdtH = String(pdt.getHours()).padStart(2,'0');
  const pdtM = String(pdt.getMinutes()).padStart(2,'0');
  const isSameDay = pdt.getDate() === now.getDate();
  const bodyClockLabel = (state.layover && state.layover.bodyClockZone)
    ? (new Intl.DateTimeFormat('en-US',{timeZone:state.layover.bodyClockZone,timeZoneName:'short'}).formatToParts(now).find(p=>p.type==='timeZoneName')?.value || 'Body')
    : 'PDT';
  document.getElementById('clock-pdt').textContent = `${pdtH}:${pdtM} ${bodyClockLabel}${isSameDay ? '' : ' (+1)'}`;
}

// ── Protocol data ──────────────────────────────────────────────────────────
const LAYOVER_TIMELINE = [
  { bst:'13:50', pdt:'05:50', color:'#3b82f6', title:'Hotel check-in', sub:'Scenario A (aircraft sleep): horizontal rest only — do NOT attempt to sleep\nScenario B (no aircraft sleep): 90-min timed nap — set TWO alarms', alertKey:'checkin' },
  { bst:'~14:00', pdt:'~06:00', color:'#a855f7', title:'Arrival protocol', sub:'Hydrate aggressively · eat · see sleep stack below', alertKey:'waking_doses' },
  { bst:'~15:30', pdt:'~07:30', color:'#f59e0b', title:'[Scenario B] Force wake from nap', sub:'Get up immediately — do NOT snooze · cold water on face · stay upright · inertia clears in 10–15 min', alertKey:'nap_wake' },
  { bst:'17:00–18:00', pdt:'09:00–10:00', color:'#10b981', title:'Zone 2 outdoors 40–50 min', sub:'Optimal body-clock window · cortisol aligned · daylight exposure anchors home clock · NOT intervals', alertKey:'workout' },
  { bst:'~19:00', pdt:'~11:00', color:'#ec4899', title:'Hot shower 10–15 min', sub:'Core temp rebound targets 20:30 BST sleep onset · hot water drives core temp drop for sleep onset', alertKey:'shower' },
  { bst:'19:30–20:30', pdt:'11:30–12:30', color:'#14b8a6', title:'Protein meal + evening protocol', sub:'Glycine 3g · L-Theanine 200mg · Apigenin 50mg', alertKey:'eve_protocol' },
  { bst:'20:30', pdt:'12:30', color:'#7c3aed', title:'SLEEP — target 7+ hours', sub:'Mag glycinate 400mg · blackout + eye mask + earplugs · alarm 04:00–04:15 BST · three sleep drivers aligned', alertKey:'sleep' },
  { bst:'04:00–04:15', pdt:'20:00 (prev)', color:'#f59e0b', title:'Wake — departure prep', sub:'Light breakfast · leave hotel 06:00 BST', alertKey:'wake_depart' },
];

// ── Rendering ──────────────────────────────────────────────────────────────
function groupBy(arr, key) {
  const map = {};
  arr.forEach(item => {
    if (!map[item[key]]) map[item[key]] = [];
    map[item[key]].push(item);
  });
  return map;
}

// ── Init ────────────────────────────────────────────────────────────────────
function togglePhoneMode() {
  state.phoneMode = !state.phoneMode;
  saveState();
  const btn = document.getElementById('phone-mode-btn');
  if (btn) {
    btn.textContent = state.phoneMode ? 'iPad' : 'Phone';
    btn.style.background   = state.phoneMode ? 'var(--blue)'    : 'var(--surf2)';
    btn.style.color        = state.phoneMode ? '#fff'           : 'var(--text2)';
    btn.style.borderColor  = state.phoneMode ? 'var(--blue)'    : 'var(--border2)';
  }

function renderPhoneMode(c) {
  const fl = currentFlight();
  const cdi = (() => { try { return JSON.parse(fl.cdiData || '{}'); } catch(e) { return {}; } })();

  // Crew — cockpit + #1 FA, first names only
  const keyCrew = (cdi.crew || []).filter(cr => ['CA','FO','FB','FC','#1 FA'].includes(cr.seat));
  const crewName = name => {
    const parts = (name || '').trim().split(/\s+/);
    if (parts.length < 2) return parts[0] || '';
    // CDI format is LAST FIRST [MIDDLE...] — return First Last
    return parts[1] + ' ' + parts[0];
  };

  c.innerHTML = '';
  c.style.cssText = 'display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;padding:20px 24px;gap:0;overflow-y:auto;-webkit-overflow-scrolling:touch;height:100%';

  const mkBlock = (label, value, valueStyle) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;padding:16px 0;border-bottom:1px solid var(--border)';
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px';
    lbl.textContent = label;
    const val = document.createElement('div');
    val.style.cssText = 'font-size:42px;font-weight:800;color:var(--text);font-family:SF Mono,monospace;line-height:1.1;letter-spacing:1px' + (valueStyle ? ';' + valueStyle : '');
    val.textContent = value || '\u2014';
    wrap.appendChild(lbl); wrap.appendChild(val);
    return wrap;
  };

  // Flight number
  if (fl.flightNum) c.appendChild(mkBlock('Flight', 'AA\u00a0' + fl.flightNum, 'color:var(--blue)'));

  // Scheduled gate dep time
  const depTimeStr = fl.depTime ? fl.depTime.replace(':','') : null;
  if (depTimeStr) c.appendChild(mkBlock('Departure', depTimeStr.slice(0,2) + ':' + depTimeStr.slice(2), 'color:var(--green)'));

  // Gate
  if (fl.gate) c.appendChild(mkBlock('Gate', fl.gate));

  // Jetbridge code — amber, big
  if (cdi.jetbridge) c.appendChild(mkBlock('Jetbridge Code', cdi.jetbridge, 'color:var(--amber);letter-spacing:8px'));

  // OPS phone
  if (cdi.opsPhone) c.appendChild(mkBlock('OPS Phone', cdi.opsPhone, 'font-size:32px'));

  // Crew
  if (keyCrew.length) {
    const crewWrap = document.createElement('div');
    crewWrap.style.cssText = 'display:flex;flex-direction:column;padding:16px 0;border-bottom:1px solid var(--border);gap:12px';
    const crewLbl = document.createElement('div');
    crewLbl.style.cssText = 'font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px';
    crewLbl.textContent = 'Crew';
    crewWrap.appendChild(crewLbl);
    keyCrew.forEach(cr => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:baseline;gap:14px';
      const seat = document.createElement('div');
      seat.style.cssText = 'font-size:13px;font-weight:800;color:' + (['CA','FO','FB','FC'].includes(cr.seat) ? 'var(--blue)' : 'var(--teal)') + ';width:48px;flex-shrink:0';
      seat.textContent = cr.seat;
      const name = document.createElement('div');
      name.style.cssText = 'font-size:36px;font-weight:700;color:var(--text);font-family:SF Mono,monospace;line-height:1.1';
      name.textContent = crewName(cr.name);
      row.appendChild(seat); row.appendChild(name);
      crewWrap.appendChild(row);
    });
    c.appendChild(crewWrap);
  }
}

function render() {
  const c = document.getElementById('content');
  // Sync phone mode button state on every render
  const btn = document.getElementById('phone-mode-btn');
  if (btn) {
    btn.textContent = state.phoneMode ? 'iPad' : 'Phone';
    btn.style.background  = state.phoneMode ? 'var(--blue)'   : 'var(--surf2)';
    btn.style.color       = state.phoneMode ? '#fff'          : 'var(--text2)';
    btn.style.borderColor = state.phoneMode ? 'var(--blue)'   : 'var(--border2)';
  }
  if (state.phoneMode) { renderPhoneMode(c); return; }
  updateModeRow();
  if (tab === 'flight') {
    if (mode === 'preflight') renderPreflight(c);
    else if (mode === 'arrival') renderArrival(c);
    else if (mode === 'redispatch') { renderRedispatch(c); setTimeout(updateBreakCountdowns, 50); }
    else { renderFlight(c); setTimeout(updateBreakCountdowns, 50); }
  }
  else if (tab === 'layover') renderLayover(c);
}

// Dynamically rebuild the mode-row based on whether the current flight is an R/D plan
function updateModeRow() {
  const mr = document.querySelector('.mode-row');
  if (!mr) return;
  const fl = (typeof currentFlight === 'function') ? currentFlight() : (state.flight || {});
  const isRD = !!fl.rdPlan;

  // Weight-restricted badge next to "777 Flight"
  const wtBadge = document.getElementById('wt-restrict-badge');
  if (wtBadge) {
    if (fl.weightRestricted === 'true') {
      const lim = fl.weightRestrictLimit ? ' · ' + fl.weightRestrictLimit : '';
      wtBadge.style.display = 'inline-flex';
      wtBadge.style.cssText = 'display:inline-flex;align-items:center;padding:6px 16px;border-radius:8px;background:var(--red-l);border:1px solid var(--red);color:var(--red);font-size:24px;font-weight:800;letter-spacing:0.3px;white-space:nowrap';
      wtBadge.textContent = '\u26a0 WT RESTRICTED' + lim;
    } else {
      wtBadge.style.display = 'none';
      wtBadge.textContent = '';
    }
  }

  // Build button list
  const btns = [
    { id: 'btn-preflight', label: 'Preflight', m: 'preflight' },
    { id: 'btn-flight',    label: isRD ? 'Flight' : 'Flight', m: 'flight' },
    ...(isRD ? [{ id: 'btn-redispatch', label: fl.rdActive ? '\u26a1 R/D \u2714' : '\u26a1 Redispatch', m: 'redispatch', rd: true }] : []),
    { id: 'btn-arrival',   label: 'Arrival', m: 'arrival' },
  ];
  mr.innerHTML = '';
  btns.forEach(b => {
    const el = document.createElement('div');
    el.id = b.id;
    el.className = 'mode-btn' + (mode === b.m ? ' active' : '');
    if (b.rd) {
      el.style.cssText = 'border-color:var(--amber);' + (mode === b.m ? 'background:var(--amber-l);color:var(--amber)' : 'color:var(--amber)');
    }
    el.textContent = b.label;
    el.addEventListener('click', () => setMode(b.m));
    mr.appendChild(el);
  });
}

function renderLayover(c) {
  c.style.cssText = '';
  // Auto-sync layover city from the current flight's arrival airport
  if (!state.layover) state.layover = {};
  const activeFl = (typeof currentFlight === 'function') ? currentFlight() : (state.flight || {});
  const arrICAO  = (activeFl.arrCity || '').toUpperCase();
  const ICAO_TO_CITY = {
    LHR:'London', LGW:'London', MAN:'London',
    NRT:'Tokyo',  HND:'Tokyo',
    ICN:'Incheon',
    SYD:'Sydney',
    AKL:'Auckland',
    JFK:'New York', EWR:'New York',
    MIA:'Miami',
    DFW:'Dallas',
    LAX:'Los Angeles',
    PHX:'Phoenix',
    CLT:'Charlotte',
  };
  const mappedCity = ICAO_TO_CITY[arrICAO];
  // Sync whenever arrICAO has changed vs what we last synced from
  const lastSyncedICAO = state.layover._syncedFromICAO || '';
  if (arrICAO && arrICAO !== lastSyncedICAO) {
    state.layover._syncedFromICAO = arrICAO;
    if (mappedCity) {
      const presets = { 'London':{offset:60,tz:'BST'}, 'Sydney':{offset:600,tz:'AEST'}, 'Tokyo':{offset:540,tz:'JST'}, 'Incheon':{offset:540,tz:'KST'}, 'Auckland':{offset:720,tz:'NZST'}, 'New York':{offset:-240,tz:'EDT'}, 'Dallas':{offset:-300,tz:'CDT'}, 'Miami':{offset:-240,tz:'EDT'}, 'Los Angeles':{offset:-420,tz:'PDT'}, 'Phoenix':{offset:-420,tz:'MST'}, 'Charlotte':{offset:-240,tz:'EDT'}, 'Chicago':{offset:-300,tz:'CDT'}, 'Philadelphia':{offset:-240,tz:'EDT'} };
      state.layover.city = mappedCity;
      if (presets[mappedCity]) { state.layover.localOffsetMin = presets[mappedCity].offset; state.layover.tzLabel = presets[mappedCity].tz; }
    } else {
      state.layover.city = 'Other';
      state.layover.customCity = arrICAO;
    }
    saveState();
  }
  // Auto-populate check-in date from flight arrival date whenever it changes
  const arrDate = activeFl.arrDate || '';
  const lastSyncedDate = state.layover._syncedFromDate || '';
  if (arrDate && arrDate !== lastSyncedDate) {
    state.layover._syncedFromDate = arrDate;
    state.layover.checkinDate = arrDate;
    saveState();
  }
  const now = new Date();
  const lay = state.layover || {};
  // Auto-calculate current UTC offset for a named IANA timezone
  const tzOffset = (ianaZone) => {
    try {
      const now = new Date();
      const utcMs = now.getTime();
      const localStr = new Intl.DateTimeFormat('en-US', {timeZone: ianaZone, hour:'numeric', minute:'numeric', hour12:false, timeZoneName:'short'}).format(now);
      // Use Date to get the offset directly
      const fmt = new Intl.DateTimeFormat('en-US', {timeZone: ianaZone, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
      const parts = fmt.formatToParts(now).reduce((a,p)=>{a[p.type]=p.value;return a},{});
      const localMs = Date.UTC(+parts.year, +parts.month-1, +parts.day, parts.hour==='24'?0:+parts.hour, +parts.minute, +parts.second);
      return Math.round((localMs - utcMs) / 60000);
    } catch(e) { return 0; }
  };
  // Timezone abbreviation for display
  const tzAbbr = (ianaZone) => {
    try {
      return new Intl.DateTimeFormat('en-US', {timeZone: ianaZone, timeZoneName:'short'}).formatToParts(new Date()).find(p=>p.type==='timeZoneName')?.value || ianaZone;
    } catch(e) { return ianaZone; }
  };
  const bodyClockZones = [
    {id:'America/Los_Angeles', l:'Pacific'},
    {id:'America/Phoenix',     l:'Arizona'},
    {id:'America/Denver',      l:'Mountain'},
    {id:'America/Chicago',     l:'Central'},
    {id:'America/New_York',    l:'Eastern'},
    {id:'UTC',                 l:'UTC'},
    {id:'Europe/London',       l:'London'},
    {id:'Europe/Paris',        l:'Central European'},
    {id:'Europe/Moscow',       l:'Moscow'},
    {id:'Asia/Kolkata',        l:'India'},
    {id:'Asia/Shanghai',       l:'China/HKG/SGP'},
    {id:'Asia/Tokyo',          l:'Japan/Korea'},
    {id:'Australia/Sydney',    l:'Australia East'},
    {id:'Pacific/Auckland',    l:'New Zealand'},
  ];
  const savedBodyClockZone = lay.bodyClockZone || 'America/Los_Angeles';
  const currentBodyOffset = tzOffset(savedBodyClockZone);
  const pdtOffsetMin = currentBodyOffset;
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const pdt = new Date(utc + pdtOffsetMin * 60000);
  const localOffsetMin = lay.localOffsetMin !== undefined ? lay.localOffsetMin : 60;
  const cityName  = lay.city    || '';
  const displayCity = cityName === 'Other' ? (lay.customCity || 'Other') : cityName;
  const tzLabel   = lay.tzLabel || 'BST';
  const checkinTime = lay.checkinTime || '';
  const checkinDate = lay.checkinDate || '';
  const pickupTime  = lay.pickupTime  || '';
  const pickupDate  = lay.pickupDate  || '';
  const localNow = new Date(utc + localOffsetMin * 60000);
  const fmt  = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const fmtD = d => DAYS[d.getDay()];
  const parseHHMM = s => { if (!s) return null; const [h,m] = s.split(':').map(Number); return isNaN(h) ? null : h*60+(m||0); };
  const minToHHMM = m => { const n=((m%1440)+1440)%1440; return `${String(Math.floor(n/60)).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`; };
  const checkinMin = parseHHMM(checkinTime);
  const pickupMin  = parseHHMM(pickupTime);
  const pdtDiff = localOffsetMin - pdtOffsetMin;
  const layoverMins = (checkinMin!==null && pickupMin!==null && checkinDate && pickupDate)
    ? Math.round((new Date(`${pickupDate}T${pickupTime}`) - new Date(`${checkinDate}T${checkinTime}`))/60000)
    : (checkinMin!==null && pickupMin!==null ? ((pickupMin-checkinMin+1440)%1440) : null);
  const layoverHrs = layoverMins!==null ? (layoverMins/60).toFixed(1) : '—';
  const checkinPDT = checkinMin!==null ? minToHHMM(checkinMin-pdtDiff) : '—';
  const pickupPDT  = pickupMin !==null ? minToHHMM(pickupMin -pdtDiff) : '—';
  const pdtOf = lm => lm!==null ? minToHHMM(lm-pdtDiff) : '—';
  // ══════════════════════════════════════════════════════════════════════════
  // CIRCADIAN TIMING ENGINE — WOCL-first
  // Body clock reference: PDT (home timezone). pdtDiff = localOffset - homeOffset.
  // All sleep timing anchors to body clock, not local time.
  // WOCL = Window of Circadian Low = 02:00–06:00 PDT body clock.
  // Target sleep onset = 22:00 PDT body clock (enters WOCL ~4hrs later).
  // Target wake       = 06:00 PDT body clock (8hrs sleep).
  // These translate to local time via: localTime = pdtTime + pdtDiff.
  // ══════════════════════════════════════════════════════════════════════════

  const HOME_BED_PDT = 22 * 60;   // 22:00 PDT — WOCL-anchored sleep onset
  const HOME_WK_PDT  =  9 * 60;   // 09:00 PDT — peak cortisol/workout window
  const SLEEP_DUR    = 8  * 60;   // target 8hrs sleep
  const WAKE_PDT     = (HOME_BED_PDT + SLEEP_DUR) % 1440; // 06:00 PDT

  const isEastbound   = pdtDiff > 120;
  const isWestbound   = pdtDiff < -60;
  const isSameZone    = !isEastbound && !isWestbound;
  const phaseShiftHrs = pdtDiff / 60;

  // ── Pickup absolute minutes (from midnight of checkin day) ────────────────
  const pickupAbs = (pickupMin !== null && checkinMin !== null)
    ? (() => {
        if (pickupDate && checkinDate) {
          const diff = Math.round((new Date(pickupDate+'T'+pickupTime) - new Date(checkinDate+'T'+checkinTime))/60000);
          return checkinMin + diff;
        }
        return pickupMin < checkinMin ? pickupMin + 1440 : pickupMin;
      })()
    : null;

  // ── WOCL-first sleep target ───────────────────────────────────────────────
  const woclSleepLocal = HOME_BED_PDT + pdtDiff;
  const pickupCeiling  = pickupAbs !== null ? pickupAbs - 60 : null;

  const effSl = (() => {
    if (checkinMin === null) return ((woclSleepLocal % 1440) + 1440) % 1440;
    const earlyMin = checkinMin + 120;
    let s = woclSleepLocal;
    while (s < earlyMin) s += 1440;
    if (pickupCeiling !== null) {
      if (s + SLEEP_DUR <= pickupCeiling) return s;
      const sPrev = s - 1440;
      if (sPrev >= earlyMin && sPrev + SLEEP_DUR <= pickupCeiling) return sPrev;
      return Math.max(earlyMin, pickupCeiling - SLEEP_DUR);
    }
    return s;
  })();

  // Wake = 8hrs after sleep, capped at pickup-60
  const wakeMin = pickupCeiling !== null
    ? Math.min(effSl + SLEEP_DUR, pickupCeiling)
    : effSl + SLEEP_DUR;

  const actualSleepMins = wakeMin - effSl;
  const bodyClockAtSleep = ((effSl - pdtDiff) % 1440 + 1440) % 1440;
  const needsMelatonin   = bodyClockAtSleep < 20 * 60;

  // ── Workout: morning after wake, 30min after getting up ──────────────────
  const workoutStart   = wakeMin + 30;
  const prepAbs     = pickupAbs !== null ? pickupAbs - 60 : null;
  const workoutCeiling = prepAbs !== null ? prepAbs : (effSl > wakeMin ? effSl - 90 : null);
  const workoutFits    = workoutCeiling !== null && workoutStart + 40 <= workoutCeiling;
  const effWk          = workoutStart;

  // ── Caffeine cutoff: 6hrs before sleep (local) ───────────────────────────
  const caffeineStop = effSl - 360;

  // ── Melatonin: 30min before sleep, only if body clock says daytime ────────
  const melatoninDose = effSl - 30;

  // ── Meal: 60min after checkin ─────────────────────────────────────────────
  const mealLocal = checkinMin !== null ? checkinMin + 60 : null;

  const isMultiDay = layoverMins !== null && layoverMins > 28 * 60;

  const scenario = lay.scenario || 'awake';
  const dirLabel = isEastbound
    ? 'Eastbound +' + Math.round(phaseShiftHrs) + 'hrs'
    : isWestbound ? 'Westbound' : 'Same timezone';

  // ── Sleep quality note ────────────────────────────────────────────────────
  const sleepHrs = (wakeMin !== null ? wakeMin - effSl : SLEEP_DUR) / 60;
  const bodyClockSleepStr = pdtOf(effSl);
  const woclNote = sleepHrs >= 7.5
    ? `${sleepHrs.toFixed(1)}hrs · WOCL aligned (body clock ${bodyClockSleepStr})`
    : sleepHrs >= 5
    ? `${sleepHrs.toFixed(1)}hrs · partial WOCL (body clock ${bodyClockSleepStr}) · quality may be reduced`
    : `${sleepHrs.toFixed(1)}hrs · WOCL not reachable · rest as able`;

  // ── Helper: show shower/sleep-stack even if before checkin (informational) ─
  const afterCheckin = lm => checkinMin !== null && lm < checkinMin;
  const noteIfEarly  = lm => afterCheckin(lm) ? ' · NOTE: prep before hotel arrival if possible' : '';

  // ── Shared wind-down events (same for all scenarios) ─────────────────────
  const showerEvent = { key:'shower', lm: effSl-90, label:'Wind down · Hot shower · Screens off', color:'#ec4899',
    sub:'90 min before sleep · hot shower → core temp drop → speeds sleep onset · screens off · dim lights' + noteIfEarly(effSl-90) };
  const stackEvent  = { key:'eve_protocol', lm: effSl-60, label:'Pre-sleep stack', color:'#14b8a6',
    sub:'Mag glycinate 400mg · Glycine 3g · L-Theanine 200mg · Apigenin 50mg' +
        (needsMelatonin ? ' · 0.5mg melatonin (body clock '+pdtOf(effSl-60)+' — phase-shifting dose)' : ' · skip melatonin — body clock near sleep phase') +
        noteIfEarly(effSl-60) };
  const sleepEvent  = { key:'sleep', lm: effSl, label:'Sleep — target 8hrs · WOCL aligned', color:'#7c3aed',
    sub:'Body clock ' + bodyClockSleepStr + ' · ' + woclNote };
  const wakeEvent   = { key:'wake_depart', lm: wakeMin, label:'Wake', color:'#f59e0b',
    sub:'Light meal' };
  const prepEvent   = { key:'prepare', lm: prepAbs, label:'Prepare for pickup', color:'#f59e0b',
    sub:'Pack for departure · 60 min before pickup' };
  const pickupEvent = { key:'pickup', lm: pickupAbs, label:`Hotel pickup${pickupDate?' · '+pickupDate:''}`, color:'#ef4444', sub:'' };
  const cafEvent    = { key:'caffeine_stop', lm: caffeineStop, label:'Caffeine cutoff', color:'#84cc16',
    sub:'6 hrs before sleep · half-life 5–6 hrs · stopping here protects sleep onset and slow-wave depth' +
        (caffeineStop < (checkinMin||0) ? ' · NOTE: stop before hotel arrival' : '') };
  const workoutEvent = workoutFits
    ? { key:'workout', lm: effWk, label:'Zone 2 outdoors 40–50 min', color:'#10b981',
        sub:'Body clock ' + pdtOf(effWk) + ' · cortisol peak window · builds adenosine for tonight · NOT intervals' }
    : null;
  const mealEvent   = { key:'meal', lm: mealLocal, label:'First meal — eat now', color:'#f97316',
    sub:'Meal timing signals local time to gut clock · protein + complex carbs · avoid alcohol' };

  // ── Sun exposure event ────────────────────────────────────────────────────
  // Goal: reinforce home body clock — get sun when body clock says morning.
  // Best window: body clock 06:00–10:00 PDT (reinforces clock, cortisol peak).
  // Avoid sun: body clock 18:00–22:00 PDT (light-sensitive phase — delays clock).
  // Only show if local time is daylight (07:00–19:00 local).
  // Placed right after wake (or nap-wake) — first thing outside.
  const sunTime = wakeMin + 15; // 15min after wake, step outside immediately
  const sunBodyClock = ((sunTime - pdtDiff) % 1440 + 1440) % 1440;
  const sunLocalMod  = ((sunTime % 1440) + 1440) % 1440;
  const sunIsDaylight = sunLocalMod >= 7*60 && sunLocalMod <= 19*60;
  const sunBodyClockMorning  = sunBodyClock >= 6*60  && sunBodyClock <= 10*60; // reinforce
  const sunBodyClockEvening  = sunBodyClock >= 18*60 && sunBodyClock <= 22*60; // avoid
  const sunBodyClockMidday   = sunBodyClock > 10*60  && sunBodyClock < 18*60;  // neutral
  const sunEvent = sunIsDaylight ? (() => {
    if (sunBodyClockMorning) return { key:'sun', lm: sunTime, label:'Get outside · morning sun', color:'#f59e0b',
      sub:'Body clock ' + pdtOf(sunTime) + ' — morning light window · strongest signal to hold home clock · 20–30 min direct outdoor light · face the sky' };
    if (sunBodyClockEvening) return { key:'sun', lm: sunTime, label:'Avoid bright light · stay indoors', color:'#8892a4',
      sub:'Body clock ' + pdtOf(sunTime) + ' — light-sensitive phase · outdoor light now delays your clock further · wear sunglasses if going out' };
    return { key:'sun', lm: sunTime, label:'Outdoor light — neutral window', color:'#8892a4',
      sub:'Body clock ' + pdtOf(sunTime) + ' — midday body clock · light exposure now has minimal phase-shifting effect · go out for fresh air but no urgency' };
  })() : null;

  // ── Scenario event arrays ─────────────────────────────────────────────────
  let events;
  if (scenario === 'nap') {
    const napFeasible = layoverMins === null || layoverMins >= 960;
    if (!napFeasible) {
      // Short layover — nap not viable
      events = [
        cafEvent,
        { key:'checkin', lm: checkinMin, label:'Hotel check-in — stay awake · layover too short for nap', color:'#f59e0b',
          sub:'Under 16hrs — nap risks N3 inertia and delays main sleep. Stay awake, get outside, push to WOCL sleep window.' },
        mealEvent,
        workoutEvent,
        showerEvent, stackEvent, sleepEvent, wakeEvent, sunEvent, prepEvent, pickupEvent,
      ].filter(Boolean);
    } else {
      const napWakeMin = checkinMin !== null ? checkinMin + 90 : null;
      const effWkNap = napWakeMin !== null ? napWakeMin + 30 : null;
      const napWorkoutCeiling = effSl - 90;
      const napWorkoutFits = effWkNap !== null && effWkNap + 40 <= napWorkoutCeiling;
      events = [
        cafEvent,
        { key:'checkin', lm: checkinMin, label:'Hotel check-in — go horizontal · 90-min nap', color:'#3b82f6',
          sub:'Lie flat · eye mask + earplugs · TWO alarms · controlled 90-min N1/N2 rest only · do NOT sleep past alarm' },
        { key:'nap_wake', lm: napWakeMin, label:'NAP ALARM — up immediately', color:'#ef4444',
          sub:'No snooze · cold water · stand outside · sleeping longer risks N3 inertia + circadian misalignment' },
        mealEvent,

        <div style="display:flex;align-items:center;gap:3px"><div style="width:11px;height:11px;border-radius:50%;background:#f97316"></div><span style="font-size:11px;color:var(--text3)">Meal</span></div>
        <div style="display:flex;align-items:center;gap:3px"><div style="width:11px;height:11px;border-radius:50%;background:#10b981"></div><span style="font-size:11px;color:var(--text3)">Workout</span></div>
        <div style="display:flex;align-items:center;gap:3px"><div style="width:11px;height:11px;border-radius:50%;background:#7c3aed"></div><span style="font-size:11px;color:var(--text3)">Sleep</span></div>
        <div style="display:flex;align-items:center;gap:3px"><div style="width:11px;height:11px;border-radius:50%;background:#f59e0b"></div><span style="font-size:11px;color:var(--text3)">Wake</span></div>
        <div style="display:flex;align-items:center;gap:3px"><div style="width:11px;height:11px;border-radius:50%;background:#ef4444"></div><span style="font-size:11px;color:var(--text3)">PU</span></div>
      </div>
    </div>`;
  }

  html += `<div class="section-label">Timeline · ${displayCity} ${tzLabel} ↔ PDT · ${dirLabel}${isMultiDay?' · Multi-day':''} · ${scenario==='nap'?'Nap on arrival':scenario==='sleep'?'Go right to sleep':'Stay awake'}</div><div class="card">`;
  // Keys that get a Clock button — these map to computed local times
  const CLOCK_EVENTS = {
    nap_wake:    { label: 'Nap alarm' },
    wake_depart: { label: 'Wake' },
    sleep:       { label: 'Bedtime' },
    workout:     { label: 'Zone 2 Outdoor Exercise' },
    shower:      { label: 'Wind down' },
  };

  // Clamp all events to pickupAbs (nothing after pickup); enforce wake = pickupAbs-60
  // Also drop any event that falls during a sleep or nap window
  const napWakeForFilter = (scenario === 'nap' && checkinMin !== null) ? checkinMin + 90 : null;
  const sleepEnd = wakeMin;
  const duringNap  = lm => napWakeForFilter !== null && lm > checkinMin && lm < napWakeForFilter;
  const duringSleep = lm => lm > effSl && lm < sleepEnd;
  const inBlockedWindow = lm => lm !== null && (duringNap(lm) || duringSleep(lm));

  if (pickupAbs !== null) {
    events = events
      .map(item => {
        if (item.lm === null) return item;
        if (item.key === 'pickup') return item;
        if (item.lm >= pickupAbs) return null;
        if (inBlockedWindow(item.lm)) return null;
        return item;
      })
      .filter(Boolean);
  } else {
    events = events.filter(item => (item.lm !== null && !inBlockedWindow(item.lm)) || item.key === 'pickup');
  }
  // Sort chronologically so pre-checkin events (e.g. caffeine cutoff) appear first
  events.sort((a, b) => {
    if (a.lm === null && b.lm === null) return 0;
    if (a.lm === null) return 1;
    if (b.lm === null) return -1;
    return a.lm - b.lm;
  });

  events.forEach(item => {
    const localStr = item.lm!==null ? minToHHMM(item.lm) : '—';
    const pdtStr   = item.lm!==null ? pdtOf(item.lm)+' PDT' : '—';
    const hasClockBtn = item.lm !== null && CLOCK_EVENTS[item.key];
    const clockLabel  = hasClockBtn ? CLOCK_EVENTS[item.key].label : '';

    // Convert lm (local minutes) to HH:MM for the Clock URL
    const localHHMM = item.lm !== null ? minToHHMM(item.lm) : '';
    const [lHour, lMin] = localHHMM.split(':').map(Number);

    html += `<div class="timeline-item">
      <div class="tl-line"></div>
      <div class="tl-time"><div class="tl-local" style="color:${item.lm!==null?'var(--text)':'var(--text3)'}">${localStr}</div><div class="tl-pdt">${pdtStr}</div></div>
      <div class="tl-dot" style="background:${item.color};opacity:${item.lm!==null?1:0.3}"></div>
      <div class="tl-body">
        <div class="tl-title">${item.label}</div>
        ${item.sub?`<div class="tl-sub">${item.sub}</div>`:''}
        ${hasClockBtn ? `<div style="margin-top:6px">
          <button onclick="openClockAlarm(${lHour},${lMin},'${clockLabel}')"
            style="padding:5px 12px;border-radius:6px;border:1px solid ${item.color};background:transparent;color:${item.color};font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Set ${clockLabel} alarm · ${localHHMM} ${tzLabel}
          </button>
        </div>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';
  const hint = checkinMin!==null
    ? `Check-in ${checkinTime} local = ${checkinPDT} PDT. Workout window ${minToHHMM(effWk)} local = ${pdtOf(effWk)} PDT (09:00 PDT body clock — peak cortisol/testosterone). Sleep ${minToHHMM(effSl)} local = ${pdtOf(effSl)} PDT (12:30 PDT — adenosine + melatonin window). Wake = pickup − 60 min.`
    : 'Enter check-in and pickup times above to see your circadian-based timeline.';
  html += `<div class="section-label">Circadian analysis</div><div class="card"><div class="task" style="border:none"><div class="task-body"><div class="task-sub" style="font-size:12px;color:var(--text2);line-height:1.6">${hint}</div></div></div></div>`;
  c.innerHTML = html;
}

function lookupCityTZ(cityName) {
  if (!cityName || cityName.length < 2) return;
  const statusEl = document.getElementById('tz-lookup-status');
  if (statusEl) statusEl.textContent = 'Looking up ' + cityName + '...';
  const fetchT = (url, ms=4000) => { const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),ms); return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(t)); };

  // Try to find timezone using the worldtimeapi
  fetchT('https://worldtimeapi.org/api/timezone')
    .then(r => r.json())
    .then(zones => {
      // Search for a zone matching the city name
      const q = cityName.toLowerCase().replace(/\s+/g, '_');
      const match = zones.find(z => z.toLowerCase().includes('/' + q)) ||
                    zones.find(z => z.toLowerCase().includes(q));
      if (!match) {
        // Fall back to Intl-based offset detection for the city
        return lookupCityTZFallback(cityName);
      }
      return fetchT('https://worldtimeapi.org/api/timezone/' + match)
        .then(r => r.json())
        .then(data => {
          const rawOffset = data.utc_offset || '+00:00';
          const sign = rawOffset[0] === '-' ? -1 : 1;
          const parts = rawOffset.replace(/[+-]/, '').split(':');
          const offsetMin = sign * (parseInt(parts[0]) * 60 + parseInt(parts[1] || 0));
          const abbrev = data.abbreviation || rawOffset;
          setLayover('localOffsetMin', offsetMin);
          setLayover('tzLabel', abbrev);
          setLayover('tzLookupStatus', match + ' · ' + abbrev + ' UTC' + rawOffset);
          saveState(); render();
        });
    })
    .catch(() => lookupCityTZFallback(cityName));
}

function lookupCityTZFallback(cityName) {
  // Use Intl to detect offset — try common IANA zone guesses
  const guesses = [
    'Asia/' + cityName.replace(/ /g,'_'),
    'Europe/' + cityName.replace(/ /g,'_'),
    'America/' + cityName.replace(/ /g,'_'),
    'Pacific/' + cityName.replace(/ /g,'_'),
    'Australia/' + cityName.replace(/ /g,'_'),
    'Africa/' + cityName.replace(/ /g,'_'),
  ];
  for (const tz of guesses) {
    try {
      const now = new Date();
      const fmt = new Intl.DateTimeFormat('en', { timeZone: tz, timeZoneName: 'short', hour: 'numeric', hour12: false });
      const parts = fmt.formatToParts(now);
      const tzName = (parts.find(p => p.type === 'timeZoneName') || {}).value || '';
      const offsetMs = now.getTime() - new Date(now.toLocaleString('en-US', { timeZone: tz })).getTime();
      const offsetMin = -Math.round(offsetMs / 60000);
      setLayover('localOffsetMin', offsetMin);
      setLayover('tzLabel', tzName);
      setLayover('tzLookupStatus', tz + ' · ' + tzName);
      saveState(); render(); return;
    } catch(e) {}
  }
  // Nothing found
  const el = document.getElementById('tz-lookup-status');
  if (el) el.textContent = 'City not found — set TZ and offset manually';
}

function lookupTZByICAO(code, cityLabel) {
  if (!code || code.length < 2) return;
  const raw = code.trim().toUpperCase();
  const statusEl = document.getElementById('tz-lookup-status');
  if (statusEl) statusEl.textContent = '🌐 Looking up ' + raw + '...';
  const proxy = url => 'https://corsproxy.io/?url=' + encodeURIComponent(url);
  const fetchT = (url, ms=4000) => { const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),ms); return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(t)); };
  const applyTZ = (lat, lon, resolvedIcao, resolvedName) => {
    const tzUrl = 'https://timeapi.io/api/timezone/coordinate?latitude=' + lat + '&longitude=' + lon;
    const doFetch = url => fetchT(url)
      .then(r => { if(!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        const tz = data.timeZone || '';
        const offset = data.currentUtcOffset && data.currentUtcOffset.seconds ? Math.round(data.currentUtcOffset.seconds/60) : 0;
        const abbr = data.abbreviation || tz.split('/').pop() || 'UTC';
        if (typeof setLayover === 'function') {
          setLayover('localOffsetMin', offset);
          setLayover('tzLabel', abbr);
          setLayover('tzLookupStatus', tz + ' · ' + abbr + ' UTC' + (offset>=0?'+':'') + (offset/60).toFixed(1) + 'h');
        }
        const displayName = cityLabel || resolvedName || raw;
        const utcHrs = offset / 60;
        const utcStr = 'UTC' + (utcHrs>=0?'+':'') + (Number.isInteger(utcHrs)?utcHrs:utcHrs.toFixed(1));
        // Determine IATA: if user typed 3-char code use it, else reverse-lookup from table
        const _iata = raw.length === 3 ? raw : Object.keys(IATA_TO_ICAO).find(k => IATA_TO_ICAO[k] === resolvedIcao) || raw;
        const newC = { v: displayName, label: displayName + ' · ' + abbr + ' (' + utcStr + ')', offset, tz: abbr, icao: resolvedIcao, iata: _iata };
        if (!state.customCities) state.customCities = [];
        const ei = state.customCities.findIndex(c => c.icao === resolvedIcao || c.v === displayName);
        if (ei >= 0) state.customCities[ei] = newC;
        else state.customCities.push(newC);
        if (state.layover) { state.layover.city = displayName; state.layover.localOffsetMin = offset; state.layover.tzLabel = abbr; }
        saveState(); render();
      });
    doFetch(tzUrl).catch(() => doFetch(proxy(tzUrl)).catch(() => {
      if (statusEl) statusEl.textContent = 'Timezone lookup failed — set manually';
    }));
  };
  const IATA_TO_ICAO = {
    'LAX':'KLAX','DFW':'KDFW','PHX':'KPHX','CLT':'KCLT','JFK':'KJFK','MIA':'KMIA',
    'LHR':'EGLL','LGW':'EGKK','MAN':'EGCC','CDG':'LFPG','ORY':'LFPO','AMS':'EHAM',
    'FRA':'EDDF','MUC':'EDDM','DUS':'EDDL','HAM':'EDDH','BER':'EDDB','ZRH':'LSZH',
    'GVA':'LSGG','FCO':'LIRF','MXP':'LIMC','VCE':'LIPZ','NAP':'LIRN','BCN':'LEBL',
    'MAD':'LEMD','AGP':'LEMG','PMI':'LEPA','BIO':'LEBB','OPO':'LPPR','LIS':'LPPT',
    'SNN':'EINN','DUB':'EIDW','NCE':'LFMN','ATH':'LGAV','CMN':'GMMN','SVQ':'LEZL',
    'NRT':'RJAA','HND':'RJTT','ICN':'RKSI','PEK':'ZBAA','PVG':'ZSPD','HKG':'VHHH',
    'SYD':'YSSY','MEL':'YMML','AKL':'NZAA','NAN':'NFFN','PPT':'NTAA',
    'GRU':'SBGR','GIG':'SBGL','EZE':'SAEZ','SCL':'SCEL','BOG':'SKBO','LIM':'SPJC',
    'NAS':'MYNN','SJU':'TJSJ','MBJ':'MKJS','KIN':'MKJP','BDA':'TXKF','STT':'TIST',
    'TER':'LPLA','KEF':'BIKF','OSL':'ENGM','ARN':'ESSA','CPH':'EKCH','HEL':'EFHK',
    'ANC':'PANC','FAI':'PAFA','HNL':'PHNL','OGG':'PHOG','KOA':'PHKO','SFO':'KSFO',
    'SEA':'KSEA','PDX':'KPDX','BOS':'KBOS','IAD':'KIAD','EWR':'KEWR','ORD':'KORD',
  };
  const icaoCode = (raw.length === 3 && IATA_TO_ICAO[raw]) ? IATA_TO_ICAO[raw] : raw;
  const airportUrl = 'https://aviationweather.gov/api/data/airport?ids=' + icaoCode + '&format=json';
  fetchT(airportUrl)
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(data => { const ap=Array.isArray(data)?data[0]:data; if(!ap||ap.lat==null) throw new Error(); applyTZ(ap.lat, ap.lon, icaoCode, ap.name||icaoCode); })
    .catch(() => fetchT(proxy(airportUrl))
      .then(r => { if(!r.ok) throw new Error(); return r.json(); })
      .then(data => { const ap=Array.isArray(data)?data[0]:data; if(!ap||ap.lat==null) throw new Error(); applyTZ(ap.lat, ap.lon, icaoCode, ap.name||icaoCode); })
      .catch(() => { if(statusEl) statusEl.textContent = 'Airport not found — check ICAO/IATA'; })
    );
}

function selectCity(cityVal) {
  const presets = {
    'London':      { offset: 60,   tz: 'BST'  },
    'Sydney':      { offset: 600,  tz: 'AEST' },
    'Tokyo':       { offset: 540,  tz: 'JST'  },
    'Incheon':     { offset: 540,  tz: 'KST'  },
    'Auckland':    { offset: 720,  tz: 'NZST' },
    'New York':    { offset: -240, tz: 'EDT'  },
    'Dallas':      { offset: -300, tz: 'CDT'  },
    'Miami':       { offset: -240, tz: 'EDT'  },
    'Charlotte':   { offset: -240, tz: 'EDT'  },
    'Chicago':     { offset: -300, tz: 'CDT'  },
    'Los Angeles': { offset: -420, tz: 'PDT'  },
    'Philadelphia':{ offset: -240, tz: 'EDT'  },
    'Phoenix':     { offset: -420, tz: 'MST'  },
  };
  if (!state.layover) state.layover = {};
  state.layover.city = cityVal;
  if (presets[cityVal]) {
    state.layover.localOffsetMin = presets[cityVal].offset;
    state.layover.tzLabel = presets[cityVal].tz;
  } else {
    // Check custom saved cities
    const custom = state.customCities || [];
    const found = custom.find(c => c.v === cityVal);
    if (found) {
      state.layover.localOffsetMin = found.offset;
      state.layover.tzLabel = found.tz;
    }
  }
  saveState();
  render();
}

function showDeleteCityPopup() {

  ttl.textContent = 'Delete a City'; pop.appendChild(ttl);

    while (pop.children.length > 1) pop.removeChild(pop.lastChild);
    (state.customCities || []).forEach((c, i) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)';
      const name = document.createElement('div');

      const delBtn = document.createElement('button');
      delBtn.textContent = 'Delete';
      delBtn.style.cssText = 'padding:4px 10px;border-radius:6px;border:1px solid var(--red);background:var(--red-l);color:var(--red);font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;margin-left:8px';
      delBtn.addEventListener('click', () => {
        delBtn.textContent = 'Confirm?';
        delBtn.style.background = 'var(--red)'; delBtn.style.color = '#fff';
        delBtn.addEventListener('click', () => {
          state.customCities.splice(i, 1);
          saveState();
          if (!state.customCities.length) { pop.remove(); render(); return; }
          renderRows();
        }, { once: true });
      });
      row.appendChild(name); row.appendChild(delBtn); pop.appendChild(row);
    });
    const cls = document.createElement('button'); cls.textContent = 'Done';
    cls.style.cssText = 'width:100%;margin-top:12px;padding:9px;border-radius:8px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer';
    cls.addEventListener('click', () => { pop.remove(); render(); });
    pop.appendChild(cls);
  };
  renderRows();
  document.body.appendChild(pop);
}


function captureLocalTime(prefix) {
  const lay = state.layover || {};
  const localOffsetMin = lay.localOffsetMin !== undefined ? lay.localOffsetMin : 60;
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const ln = new Date(utc + localOffsetMin * 60000);
  const h = String(ln.getHours()).padStart(2,'0');
  const m = String(ln.getMinutes()).padStart(2,'0');
  const yyyy = ln.getFullYear();
  const mm   = String(ln.getMonth()+1).padStart(2,'0');
  const dd   = String(ln.getDate()).padStart(2,'0');
  setLayover(prefix+'Time', `${h}:${m}`);
  setLayover(prefix+'Date', `${yyyy}-${mm}-${dd}`);
}

function toggleAlert(key) {
  state.alerts[key] = state.alerts[key] === false ? true : false;
  saveState();
  scheduleNotifications();
  render();
}
function setAlertTime(key, val) {
  state.alerts[key+'_time'] = val;
  saveState();
  scheduleNotifications();
}

function scheduleNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    // Web notifications require service worker for delayed delivery
    // Show a confirmation that alerts are set
    const count = Object.keys(state.alerts).filter(k => !k.endsWith('_time') && state.alerts[k] !== false && state.alerts[k+'_time']).length;
    if (count > 0) {
      const b = document.getElementById('notif-banner');
      if (b) { b.classList.add('show'); b.querySelector('.notif-sub').textContent = `${count} alert${count>1?'s':''} configured · times set in BST`; }
    }
  }
  // Note: requestPermission() removed — triggered iOS popup on every app resume.
}

// ── Theatre detection ────────────────────────────────────────────────────────
function detectTheatre(depCity, arrCity) {
  const EUROPEAN = ['LHR','CDG','FCO','DUB','MAD','AMS','FRA','BCN','ZRH','BRU','MAN','OSL','ARN','LGW'];
  const NPAC     = ['NRT','HND','ICN'];
  const SPAC     = ['SYD','AKL'];
  // Determine which end is not LAX to find the route endpoint
  const endpoint = (arrCity === 'LAX' || !arrCity) ? depCity : arrCity;
  if (!endpoint) return null;
  if (EUROPEAN.includes(endpoint)) return 'NATL';
  if (NPAC.includes(endpoint))     return 'NPAC';
  if (SPAC.includes(endpoint))     return 'SPAC';
  return null;
}

// ── Divert entry parser ──────────────────────────────────────────────────────
// Call parseDivertEntry(pastedText) to convert raw PDF text to a DIVERT_AIRPORTS entry
function parseDivertEntry(text) {
  const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
  const result = {};
  // IATA is first line (3 letters), ICAO is second (4 letters)
  if (/^[A-Z]{3}$/.test(lines[0])) result.iata = lines[0];
  if (/^[A-Z]{4}$/.test(lines[1])) result.icao = lines[1];
  // Name + location — last non-empty line before end
  const lastLine = lines[lines.length - 1];
  if (lastLine && !/^\d/.test(lastLine) && !/^(Adequate|Emergency|Provisional)$/i.test(lastLine)) {
    result.loc = lastLine;
  }
  // Category (second to last meaningful line)
  const catLine = lines.find(l => /^(Adequate|Emergency|Provisional)$/i.test(l));
  result.category = catLine || '';
  // Medical
  const medLine = lines.find(l => /Medical:/i.test(l));
  result.medical = medLine ? /Yes/i.test(medLine) : false;
  // ETOPS
  result.etops = lines.some(l => /ET/i.test(l) && l.includes('ET'));
  // Runway
  const rwyLine = lines.find(l => /Longest RWY/i.test(l));
  if (rwyLine) { const m = rwyLine.match(/([\d,]+)\s*ft/); if (m) result.rwy = parseInt(m[1].replace(/,/g,'')); }
  // Elevation
  const elevLine = lines.find(l => /Elevation/i.test(l));
  if (elevLine) { const m = elevLine.match(/([\d,]+)\s*ft/); if (m) result.elev = parseInt(m[1].replace(/,/g,'')); }
  // B777 auth
  let b777 = '-';
  let inB777 = false;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i] === 'B777') { inB777 = true; continue; }
    if (inB777) { b777 = lines[i] || '-'; break; }
  }
  result.b777 = b777;
  // Notes
  const notesIdx = lines.findIndex(l => /^Notes:/i.test(l));
  if (notesIdx >= 0) {
    let notes = lines[notesIdx].replace(/^Notes:\s*/i, '');
    for (let i = notesIdx+1; i < lines.length; i++) {
      if (/^(A319|A320|B737|B777|Elevation|Medical|Longest|Jepp)/.test(lines[i])) break;
      notes += ' ' + lines[i];
    }
    result.notes = notes.trim();
  }
  return result;
}

// Silently fetches all 7 pages of the correct guide based on arrival city
// so they are browser-cached and available offline when the user opens the popup.
function preloadRefGuide() {
  try {
    const fl = currentFlight ? currentFlight() : (state.flights ? (state.flights[state.flightIdx||0]||{}) : (state.flight||{}));
    const dep = (fl.depCity||'').toUpperCase();
    const arr = (fl.arrCity||'').toUpperCase();
    const atlanticPorts=['LHR','FCO','DUB','MAD','CDG','LGW','AMS','FRA','BCN','ZRH','BRU','MAN','OSL','ARN'];
    const pacificPorts=['ICN','NRT','HND','AKL','SYD','PEK','PVG','HKG','NAN','PPT'];
    const isAtlantic=atlanticPorts.some(p=>dep===p||arr===p);
    const isPacific =pacificPorts.some(p=>dep===p||arr===p);
    const pages = isAtlantic ? EUROPE_PAGES : (isPacific ? PACIFIC_PAGES : EUROPE_PAGES);
    const allPages = [...pages, ...TPS_PAGES];
    allPages.forEach(url => {
      const img = new Image();
      img.src = url; // browser caches the image silently
    });
  } catch(e) {}
}

// â”€â”€ METAR fetch â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function fetchMETAR(icao, atisSel, wdSel, wsSel, tempInp, gustInp, qnhInp, rawDiv) {
  if (!icao) { alert('Select a departure city first'); return; }
  const ICAO_MAP = {PHX:'KPHX',LAX:'KLAX',DFW:'KDFW',CLT:'KCLT',JFK:'KJFK',MIA:'KMIA',LHR:'EGLL',NRT:'RJAA',HND:'RJTT',SYD:'YSSY',AKL:'NZAA',ICN:'RKSI'};
  const icaoCode = ICAO_MAP[icao] || icao;
  rawDiv.textContent = 'Fetching ATIS…';

  const proxy = url => 'https://corsproxy.io/?url=' + encodeURIComponent(url);
  const fetchT = (url, ms=4000) => { const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),ms); return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(t)); };

  const fill = (text) => {
    rawDiv.textContent = text;
    setFlight('atisRaw', text);
    const infoM = text.match(/INFORMATION\s+([A-Z])\b/i) || text.match(/\bINFO\s+([A-Z])\b/i);
    if (infoM && atisSel) { setFlight('atis', infoM[1].toUpperCase()); Array.from(atisSel.options).forEach(o=>{ o.selected=o.value===infoM[1].toUpperCase(); }); }
    const windMatch = text.match(/(\d{3})(\d{2,3})(?:G(\d{2,3}))?KT/i) || text.match(/WIND\s+(\d{3})\/(\d{1,3})/i);
    if (windMatch) {
      const dir=windMatch[1].padStart(3,'0'), spd=String(parseInt(windMatch[2])), gust=windMatch[3]?String(parseInt(windMatch[3])):'';
      setFlight('windDir',dir); Array.from(wdSel.options).forEach(o=>{ o.selected=o.value===dir; });
      setFlight('windSpd',spd); Array.from(wsSel.options).forEach(o=>{ o.selected=o.value===spd; });
      if (gust) { setFlight('windGust',gust); gustInp.value=gust; }
    }
    // Temp/dew: METAR format "10/03" or "M02/M05"
    const tdDepM = text.match(/\b(M?\d{1,2})\/(M?\d{1,2})\b(?!\d)/);
    if (tdDepM) {
      const parseC = s => s.startsWith('M') ? -parseInt(s.slice(1)) : parseInt(s);
      setFlight('temp', String(parseC(tdDepM[1]))); tempInp.value=String(parseC(tdDepM[1]));
    }
    const qnhM = text.match(/\bA(\d{4})\b/) || text.match(/\bQ(\d{4})\b/);
    if (qnhM) { const qnh=qnhM[0][0]==='A'?(parseInt(qnhM[1])/100).toFixed(2):qnhM[1]; setFlight('qnh',qnh); qnhInp.value=qnh; }
    if (typeof recalcWind === 'function') recalcWind();
  };

  // Source 1: datis.clowd.io — FAA D-ATIS, US airports only
  const datisUrl  = 'https://datis.clowd.io/api/' + icaoCode;
  // Source 2: atis.guru — broader international coverage
  const guruUrl   = 'https://api.atis.guru/v1/stations/' + icaoCode;
  // Source 3: aviationweather.gov METAR — always works, labeled as METAR
  const metarUrl  = 'https://aviationweather.gov/api/data/metar?ids=' + icaoCode + '&format=json&taf=false';

  const tryMetar = () => {
    fetchT(proxy(metarUrl))
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const m=Array.isArray(data)?data[0]:data; const raw=m&&(m.rawOb||m.raw_text)||''; if(!raw) throw new Error(); fill('(METAR) '+raw); })
      .catch(() => {
        fetchT(metarUrl)
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(data => { const m=Array.isArray(data)?data[0]:data; const raw=m&&(m.rawOb||m.raw_text)||''; if(raw) fill('(METAR) '+raw); else throw new Error(); })
          .catch(() => { rawDiv.textContent = 'Could not fetch — paste ATIS manually'; });
      });
  };

  const tryGuru = () => {
    fetchT(proxy(guruUrl))
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const entry=Array.isArray(data)?data[0]:data; const text=entry.dep_atis||(Array.isArray(entry.atis_entries)?(entry.atis_entries.find(x=>/^DEP/i.test(x.type||''))||entry.atis_entries[0]||{}).atis:null)||entry.atis||entry.text||entry.atis_raw||''; if(!text) throw new Error(); fill(text); })
      .catch(() => tryMetar());
  };

  fetchT(proxy(datisUrl))
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => { const arr=Array.isArray(data)?data:[data]; const a=arr.find(x=>/^DEP/i.test(x.type||''))||arr[0]; const t=a&&(a.datis||a.text)||''; if(!t) throw new Error(); fill(t); })
    .catch(() => tryGuru());
}
function renderFlight(c) {

  const wakeTime   = fl.wakeTime   || '';
  const break2Time  = fl.break2Time  || '';
  const break3Time  = fl.break3Time  || '';
  const break4Time  = fl.break4Time  || '';

  const depObj = CITY_LIST.find(x=>x.v===depCity) || { off: cityOffset(depCity, -240), tz: cityTZ(depCity) };
  const arrObj = CITY_LIST.find(x=>x.v===arrCity) || { off: cityOffset(arrCity, depObj.off), tz: cityTZ(arrCity) };
  const depOff = depObj.off;
  const arrOff = arrObj.off;
  const arrTZ  = arrObj.tz;
  const pdtOff  = -7 * 60;

  const parseHHMM = s => { if (!s) return null; const [h,m]=s.split(':').map(Number); return isNaN(h)?null:h*60+(m||0); };

  const fromUTC = (utcMin, offsetMin) => ((utcMin + offsetMin) % 1440 + 1440) % 1440;

  const depMin  = parseHHMM(depTime);

  const arrUTC  = arrMin  !== null ? toUTC(arrMin,  arrOff) : null;

  // ── Timers card ───────────────────────────────────────────────────────────
  const breakAlarmLocal = (utcStr) => {

// ── Break Calculator popup ────────────────────────────────────────────────────
function showBreakCalc() {

  const toHM      = m => { if(m===null||m===undefined)return '--:--'; const n=((m%1440)+1440)%1440; return String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0'); };
  const enrtToMin = s => { if(!s)return null; const s2=s.trim(); const m4=s2.match(/^(\d{1,2})(\d{2})$/); if(m4) return parseInt(m4[1])*60+parseInt(m4[2]); const mf=s2.match(/^(\d+)[+:](\d{2})$/); return mf?parseInt(mf[1])*60+parseInt(mf[2]):null; };

    const localMin3=toMin(toInp.value.includes(':')?toInp.value:toInp.value.replace(/[+]/,':'));
    const toMin2=localMin3;
    const enrtM=enrtToMin(enrtInp.value);
    if(toMin2===null||enrtM===null) return;
    const ldg=(toMin2+enrtM)%1440;
    const winStart=(toMin2+curStartOff)%1440;
    const winEnd=(ldg-curEndOff+1440)%1440;
    const winLen=(winEnd-winStart+1440)%1440;
    const lockedTotal=[...Array(curCount).keys()].filter(j=>locked[j]).reduce((s,j)=>s+curDurs[j],0);
    const free=winLen-lockedTotal;
    const unlocked=[...Array(curCount).keys()].filter(j=>!locked[j]);
    if(unlocked.length===0) return;
    const each=Math.max(1,Math.floor(free/unlocked.length));
    unlocked.forEach(j=>{ curDurs[j]=each; setFlight('brkDur'+(j+1),each); durSels[j].value=each; });
  };

  // ── Equal split — clears all locks ────────────────────────────────────────
  const equalSplit=()=>{
    const localMin2=toMin(toInp.value.includes(':')?toInp.value:toInp.value.replace(/[+]/,':'));
    const toMin2=localMin2;
    const enrtM=enrtToMin(enrtInp.value);
    if(toMin2===null||enrtM===null) return;
    const ldg=(toMin2+enrtM)%1440;
    const winStart=(toMin2+curStartOff)%1440;
    const winEnd=(ldg-curEndOff+1440)%1440;
    const winLen=(winEnd-winStart+1440)%1440;
    if(winLen<=0) return;
    const each=Math.floor(winLen/curCount);
    for(let i=0;i<4;i++){ locked[i]=false; applyLockStyle(lockBtns[i],false); }
    for(let i=0;i<curCount;i++){ curDurs[i]=each; setFlight('brkDur'+(i+1),each); durSels[i].value=each; }
  };

  // ── calcEnds ──────────────────────────────────────────────────────────────
  const calcEnds=()=>{
    const localMin=toMin(toInp.value.includes(':')?toInp.value:toInp.value.replace(/[+]/,':'));
    const toMin2=localMin;
    const enrtM=enrtToMin(enrtInp.value);
    if(toMin2===null||enrtM===null) return [null,null,null,null];
    const ldg=(toMin2+enrtM)%1440;
    const winStart=(toMin2+curStartOff)%1440;
    const ends=[]; let cursor=winStart;
    for(let i=0;i<curCount;i++){ cursor=(cursor+curDurs[i])%1440; ends.push(cursor); }
    for(let i=curCount;i<4;i++) ends.push(null);
    return ends;
  };

  // ── recalc ────────────────────────────────────────────────────────────────
  const recalc=()=>{
    for(let i=0;i<4;i++){ if(curDurs[i]>0) durSels[i].value=curDurs[i]; }
    for(let i=0;i<4;i++) durRows[i].style.display=i<curCount?'flex':'none';
    const localMin4=toMin(toInp.value.includes(':')?toInp.value:toInp.value.replace(/[+]/,':'));
    const toMin2=localMin4;
    const enrtM=enrtToMin(enrtInp.value);
    if(toMin2!==null&&enrtM!==null){
      const ldg=(toMin2+enrtM)%1440;
      ldgDisp.textContent=toHM(ldg);
      toUTCDisp.textContent=toHM(toMin2)+' UTC';
      const winStart=(toMin2+curStartOff)%1440;
      const winEnd=(ldg-curEndOff+1440)%1440;
      const winLen=(winEnd-winStart+1440)%1440;
      const usedMin=curDurs.slice(0,curCount).reduce((a,b)=>a+b,0);
      const leftMin=winLen-usedMin;
      winDisp.textContent='Window: '+toHM(winStart)+' \u2192 '+toHM(winEnd)+
        ' ('+Math.floor(winLen/60)+'h '+String(winLen%60).padStart(2,'0')+'m)'+
        (leftMin!==0?' \u00b7 '+(leftMin>0?'+':'')+Math.floor(Math.abs(leftMin)/60)+'h '+String(Math.abs(leftMin)%60).padStart(2,'0')+'m '+(leftMin>0?'free':'over'):'');
      winDisp.style.color=leftMin<0?'var(--red)':leftMin>0?'var(--green)':'var(--text3)';
    } else { ldgDisp.textContent='--:--'; winDisp.textContent=''; }
    const ends=calcEnds();
    const nowMin=new Date().getUTCHours()*60+new Date().getUTCMinutes();
    ends.forEach((e,i)=>{
      if(e===null){ endDisps[i].textContent=''; remDisps[i].textContent=''; return; }
      endDisps[i].textContent=toHM(e)+' UTC';
      const rem=(e-nowMin+1440)%1440;
      remDisps[i].textContent=rem<720?Math.floor(rem/60)+'h '+String(rem%60).padStart(2,'0')+'m rem':'';
    });
  };

  // ── Wire live inputs ──────────────────────────────────────────────────────
  toInp.addEventListener('input',  ()=>recalc());
  toInp.addEventListener('change', ()=>{ setFlight('brkTakeoff',toInp.value); recalc(); });
  // enrtInp events handled by drum picker _syncEnrt()

  // ── Set Alarms + Dismiss ──────────────────────────────────────────────────
  const btnRow=document.createElement('div'); btnRow.style.cssText='display:flex;gap:10px';

  const setAlarmsBtn=document.createElement('button'); setAlarmsBtn.textContent='Set Alarms \u2193';
  setAlarmsBtn.style.cssText='flex:1;padding:12px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:700;cursor:pointer';
  setAlarmsBtn.addEventListener('click',()=>{
    const ends=calcEnds();
    const keys=['wakeTime','break2Time','break3Time','break4Time'];
    ends.forEach((e,i)=>{ if(e!==null) setFlight(keys[i],toHM(e)); });
    setAlarmsBtn.textContent='\u2713 Alarms Set';
    setAlarmsBtn.style.background='var(--green)';
    setTimeout(()=>{ setAlarmsBtn.textContent='Set Alarms \u2193'; setAlarmsBtn.style.background='var(--blue)'; },2000);
  });

  const dismissBtn=document.createElement('button'); dismissBtn.textContent='Dismiss';
  dismissBtn.style.cssText='flex:1;padding:12px;border-radius:10px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:15px;font-weight:600;cursor:pointer';
  dismissBtn.addEventListener('click',()=>pop.remove());

  btnRow.appendChild(setAlarmsBtn); btnRow.appendChild(dismissBtn);
  pop.appendChild(btnRow);

  // ── Init ──────────────────────────────────────────────────────────────────
  let hasSavedDurs=false;
  for(let i=0;i<4;i++){ if(fl2['brkDur'+(i+1)]){ curDurs[i]=parseInt(fl2['brkDur'+(i+1)]); hasSavedDurs=true; } }
  if(!hasSavedDurs) equalSplit();
  recalc();
  document.body.appendChild(pop);
}
// ── Flight state helpers ───────────────────────────────────────────────────
// Centralised flight accessor — avoids repeating the three-line guard everywhere.
function currentFlight() {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  if (state.flightIdx >= state.flights.length) state.flightIdx = state.flights.length - 1;
  return state.flights[state.flightIdx] || {};
}

// Break-alarm key maps — single source of truth
const BREAK_TIME_KEY = { wake:'wakeTime', break2:'break2Time', break3:'break3Time', break4:'break4Time' };
const BREAK_DATE_KEY = { wake:'wakeDate', break2:'break2Date', break3:'break3Date', break4:'break4Date' };

function setFlight(key, val) {
  if (!state.flights) state.flights = [{}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  if (!state.flights[state.flightIdx]) state.flights[state.flightIdx] = {};
  state.flights[state.flightIdx][key] = val;
  state.flight = state.flights[state.flightIdx]; // keep legacy ref in sync
  saveState();
  if (key === 'arrCity') setTimeout(preloadRefGuide, 200);
  render();
}

// -- Push current flight to Protocol --
function protocolPushLabel(fl) {
  if (!fl.protocolPushedAt) return 'Not pushed yet';
  const mins = Math.round((Date.now() - new Date(fl.protocolPushedAt).getTime()) / 60000);
  if (mins < 1) return 'Pushed just now';
  if (mins < 60) return 'Pushed ' + mins + 'm ago';
  const hrs = Math.round(mins / 60);
  return 'Pushed ' + hrs + 'h ago';
}

function setPushStatus(msg, kind) {
  const el = document.getElementById('protocol-push-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = kind === 'error' ? 'var(--red)' : kind === 'pending' ? 'var(--text3)' : 'var(--purple)';
}

function pushFlightToProtocol() {
  const fl = currentFlight();
  if (!fl.depDate) { setPushStatus('Set a departure date first', 'error'); return; }

  const tripId = (fl.flightNum || ((fl.depCity||'XXX') + (fl.arrCity||'XXX'))) + '_' + fl.depDate;
  const theatre = (typeof detectTheatre === 'function') ? detectTheatre(fl.depCity || '', fl.arrCity || '') : null;

  let direction = null;
  if (fl.depCity && fl.arrCity && typeof cityOffset === 'function') {
    const dOff = cityOffset(fl.depCity), aOff = cityOffset(fl.arrCity);
    if (typeof dOff === 'number' && typeof aOff === 'number' && dOff !== aOff) {
      direction = (aOff > dOff) ? 'eastbound' : 'westbound';
    }
  }

  const myBreaks = ['wake','break2','break3','break4']
    .map(k => ({ label: k, date: fl[BREAK_DATE_KEY[k]] || null, time: fl[BREAK_TIME_KEY[k]] || null }))
    .filter(b => b.date || b.time);

  const record = {
    trip_id: tripId,
    dep_date: fl.depDate,
    arr_date: fl.arrDate || null,
    flight_num: fl.flightNum || null,
    dep_airport: fl.depCity || null,
    arr_airport: fl.arrCity || null,
    cities: (fl.depCity||'?') + '-' + (fl.arrCity||'?'),
    dep_time_local: fl.depTime || null,
    arr_time_local: fl.arrTime || null,
    theatre: theatre,
    direction: direction,
    my_breaks: myBreaks,
  };

  setPushStatus('Pushing\u2026', 'pending');
  fetch(PROTOCOL_SYNC_URL + '/flight', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-PIN': PROTOCOL_PIN },
    body: JSON.stringify({ record: record }),
  })
    .then(r => r.json().then(d => ({ ok: r.ok, d: d })))
    .then(res => {
      if (!res.ok) { setPushStatus((res.d.error || 'Push failed'), 'error'); return; }
      setFlight('protocolPushedAt', new Date().toISOString());
    })
    .catch(() => setPushStatus('Network error', 'error'));
}

  // Break timer — identical to flight page, below route card ─────────────────
  {
