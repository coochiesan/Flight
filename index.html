// ── ORV table renderer — top-level so renderPreflight can call it too ─────────
function renderORVTable(rows, container, legsData) {
  // container: a DOM element to render into (required — no body fallback)
  // legsData: optional parsed legs array for FL/MK cross-reference
  if (!container || !rows || !rows.length) return;
  // Build legs lookup
  const legsLookup = {};
  if (legsData && Array.isArray(legsData)) {
    legsData.forEach(l => { if (l.ident) legsLookup[l.ident.toUpperCase()] = { flmk: l.flmk||'', fl: l.fl||'' }; });
  }
  rows.forEach(row => { const m=legsLookup[row.ident]; row._flmk=m?m.flmk:''; row._fl=m?m.fl:''; });
  // Altitude-change detection
  const orvFls = rows.map(r => r._fl);
  const orvFlCount={};
  orvFls.forEach(f=>{if(f) orvFlCount[f]=(orvFlCount[f]||0)+1;});
  const cruiseFl = Object.keys(orvFlCount).sort((a,b)=>orvFlCount[b]-orvFlCount[a])[0]||'';
  const firstCruise=orvFls.indexOf(cruiseFl), lastCruise=orvFls.lastIndexOf(cruiseFl);
  const altChanges=new Set();
  for(let j=1;j<orvFls.length;j++){if(orvFls[j]&&orvFls[j-1]&&orvFls[j]!==orvFls[j-1]&&j>firstCruise&&j<=lastCruise) altChanges.add(j);}

  const COLS = ['TO IDENT','LAT','LONG','FL/MK','TC','MC','MH','DIST'];
  const tbl = document.createElement('table');
  tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:11px;font-family:SF Mono,monospace';
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  hr.style.cssText = 'background:var(--surf2,#1e2229)';
  COLS.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c;
    th.style.cssText = 'padding:6px 8px;text-align:center;color:var(--text3,#8899aa);font-size:10px;font-weight:700;letter-spacing:0.5px;white-space:nowrap;border-bottom:1px solid var(--border,#2a3040)';
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  tbl.appendChild(thead);
  const tbody = document.createElement('tbody');
  rows.forEach((row, i) => {
    const isAlt = altChanges.has(i);
    const tr = document.createElement('tr');
    tr.style.cssText = 'background:' + (isAlt ? 'var(--teal-l,#0d332f)' : (i%2===0 ? 'var(--surf,#161b22)' : 'var(--surf2,#1e2229)'));
    // TO IDENT
    const tdIdent = document.createElement('td');
    tdIdent.textContent = row.ident || '—';
    tdIdent.style.cssText = 'padding:6px 8px;text-align:center;color:' + (isAlt?'var(--teal,#14b8a6)':'var(--text,#e6edf3)') + ';font-weight:700;white-space:nowrap;border-bottom:1px solid var(--border,#2a3040)';
    tr.appendChild(tdIdent);
    // LAT + LONG (tighter padding)
    ['lat','lon'].forEach(k => {
      const td = document.createElement('td');
      td.textContent = row[k] || '—';
      td.style.cssText = 'padding:6px 4px;text-align:center;color:var(--text2,#cdd9e5);white-space:nowrap;border-bottom:1px solid var(--border,#2a3040)';
      tr.appendChild(td);
    });
    // FL/MK
    const tdFl = document.createElement('td');
    tdFl.textContent = row._flmk || '—';
    tdFl.style.cssText = 'padding:6px 8px;text-align:center;color:' + (isAlt?'var(--teal,#14b8a6)':'var(--blue,#3b82f6)') + ';font-weight:700;white-space:nowrap;border-bottom:1px solid var(--border,#2a3040)';
    tr.appendChild(tdFl);
    // Remaining columns
    ['tc','mc','mh','dist'].forEach(k => {
      const td = document.createElement('td');
      td.textContent = row[k] || '—';
      td.style.cssText = 'padding:6px 8px;text-align:center;color:var(--text2,#cdd9e5);white-space:nowrap;border-bottom:1px solid var(--border,#2a3040)';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  container.innerHTML = '';
  container.appendChild(tbl);
}

function parseCCIFlightPlan(text) {
  const result = {};
  const lines = text.split(/\r?\n/);
  const get = (pattern, group) => { for (const l of lines) { const m = l.match(pattern); if (m) return m[group || 1].trim(); } return null; };

  // ── Flight number: "AAL195" or leading 4-digit fallback "0195/12APR" ──────
  // Prefer the explicit AAL designation anywhere in the plan
  const fltLine = get(/\bAAL(\d+)\b/i);
  if (fltLine) result.flightNum = fltLine;
  else { const m2 = get(/\b(\d{4})\/\d{2}[A-Z]{3}/); if (m2) result.flightNum = m2; }

  // ── Date: "12APR" → "YYYY-MM-DD" ─────────────────────────────────────────
  for (const l of lines) {
    const m = l.match(/\b(\d{1,2})(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\b/i);
    if (m) {
      result.depDate = `${new Date().getFullYear()}-${MONTH_NUM[m[2].toUpperCase()]}-${m[1].padStart(2,'0')}`;
      break;
    }
  }

  // ── Dep time: NS page DEP row (local) then ETD/STD/ATD (UTC) fallback ───────
  // NS format: "DEP LAX 0805/27" or "DEP LAX 0805/27 SKD 0820/27"
  // Times on NS page are LOCAL. Convert to UTC using depCity offset.
  {
    let found = false;
    // Primary: NS DEP row
    for (const l of lines) {
      const m = l.match(/^\s*DEP\s+\w+\s+(\d{2})(\d{2})\/(\d{2})(?:\s+SKD\s+(\d{2})(\d{2}))?/i);
      if (m) {
        // Prefer SKD time if present, else planned time
        const hh = m[4] || m[1];
        const mm = m[5] || m[2];
        // Convert local → UTC using depCity offset (minutes east of UTC)
        const cityList = (typeof CITY_LIST !== 'undefined') ? CITY_LIST : [];
        const depCityKey = result.depCity || '';
        const depOff2 = (cityList.find(x => x.v === depCityKey) || {off: 0}).off;
        const localMin = parseInt(hh) * 60 + parseInt(mm);
        const utcMin = ((localMin - depOff2) % 1440 + 1440) % 1440;
        result.depTime = String(Math.floor(utcMin/60)).padStart(2,'0') + ':' + String(utcMin%60).padStart(2,'0');
        found = true; break;
      }
    }
    // Fallback: ETD/STD/ATD HHMMZ (already UTC)
    if (!found) {
      const timeRe = /\b([01]\d|2[0-3])([0-5]\d)Z\b/;
      for (const l of lines) {
        if (/\b(?:ETD|STD|ATD|SCHED(?:ULED)?\s+DEP)/i.test(l)) {
          const m = l.match(timeRe);
          if (m) { result.depTime = m[1]+':'+m[2]; found = true; break; }
        }
      }
      if (!found) {
        for (let i=0; i<Math.min(60, lines.length); i++) {
          const m = lines[i].match(timeRe);
          if (m) { result.depTime = m[1]+':'+m[2]; break; }
        }
      }
    }
  }

  // ── Airports: EGLL→LHR, KPHX→PHX etc ────────────────────────────────────
  const ICAO_MAP = {'EGLL':'LHR','KPHX':'PHX','KLAX':'LAX','KDFW':'DFW','KCLT':'CLT','KJFK':'JFK','KMIA':'MIA','RJAA':'NRT','RJTT':'HND','YSSY':'SYD','NZAA':'AKL','RKSI':'ICN','KIWA':'AZA','KLAS':'LAS','KELP':'ELP','KSLC':'SLC','KDEN':'DEN','KORD':'ORD','KATL':'ATL','KSFO':'SFO'};
  for (const l of lines) {
    const m = l.match(/IFR\s+AAL\d+\/\d+[^-]+-\s+(\w{4})\s+(\w{3,4})\s+ALTN/i) ||
              l.match(/(\w{4})-(\w{4})\s+AAL/i);
    if (m) {
      result.depCity = ICAO_MAP[m[1]] || m[1].replace(/^K/,'').replace(/^E/,'');
      result.arrCity = ICAO_MAP[m[2]] || m[2].replace(/^K/,'').replace(/^E/,'');
      break;
    }
  }

  // ── A/C Type: 777-200 or 777-300 ─────────────────────────────────────────
  const acRaw = get(/\*\*\*\s*(777-\d00(?:ER)?)\s*\*\*\*/i);
  if (acRaw) result.acType = acRaw.includes('300') ? '777-300ER' : '777-200ER';

  // ── ACFT Nose number: two sources ────────────────────────────────────────
  // Source A: NS page line 3 has N-number e.g. "73/27 82 N7LC"
  //   → reverse-lookup in AA_FLEET to get side number
  // Source B: AIRPL header on THRUST page: "AIRPL  7AK" or "AIRPL" then "7AK"
  {
    // Inline reverse map: N-number → side number (AA_FLEET not in parser scope)
    const N_TO_SIDE = {
      'N770AN':'7AA','N771AN':'7AB','N772AN':'7AC','N773AN':'7AD','N774AN':'7AE',
      'N775AN':'7AF','N776AN':'7AG','N777AN':'7AH','N778AN':'7AJ','N779AN':'7AK',
      'N780AN':'7AL','N781AN':'7AM','N782AN':'7AN','N783AN':'7AP','N784AN':'7AR',
      'N785AN':'7AS','N786AN':'7AT','N787AN':'7AU','N788AN':'7AV','N789AN':'7AW',
      'N790AN':'7AX','N791AN':'7AY','N792AN':'7BA','N793AN':'7BB','N794AN':'7BC',
      'N795AN':'7BD','N796AN':'7BE','N797AN':'7BF','N798AN':'7BG','N799AN':'7BH',
      'N750AN':'7BJ','N751AN':'7BK','N752AN':'7BL','N753AN':'7BM','N754AN':'7BN',
      'N755AN':'7BP','N756AM':'7BR','N757AN':'7BS','N758AN':'7BT','N759AN':'7BU',
      'N760AN':'7BV','N761AN':'7BW','N762AN':'7BX','N763AN':'7BY','N766AN':'7CA',
      'N767AJ':'7CB','N768AA':'7CC',
      'N717AN':'7LA','N718AN':'7LB','N719AN':'7LC','N720AN':'7LD','N721AN':'7LE',
      'N722AN':'7LF','N723AN':'7LG','N724AN':'7LH','N725AN':'7LJ','N726AN':'7LK',
      'N727AN':'7LL','N728AN':'7LM','N729AN':'7LN','N730AN':'7LP','N731AN':'7LR',
      'N732AN':'7LS','N733AR':'7LT','N734AR':'7LU','N735AT':'7LV','N736AT':'7LW',
    };
    // Source A: NS page line 3 format "73/27 82 N7LC" — N is line prefix, not FAA N-number.
    // Strip leading N, extract side number e.g. "7LC", validate ^7[A-L][A-Z]$.
    // Scan ALL lines (weight-restricted headers can push the data past line 10).
    for (let i = 0; i < lines.length; i++) {
      const nm = lines[i].match(/\bN(7[A-L][A-Z])\b/i);
      if (nm) { result.acftNose = nm[1].toUpperCase(); break; }
      // Fallback: full FAA N-number reverse lookup (e.g. "N779AN")
      const nmFull = lines[i].match(/\b(N7[A-Z0-9]{2,4})\b/i);
      if (nmFull) {
        const nNum = nmFull[1].toUpperCase();
        const side = N_TO_SIDE[nNum];
        if (side) { result.acftNose = side; break; }
        // If not in lookup, store the N-number itself as fallback
        result.acftNose = nNum;
        break;
      }
    }
    // Source A2: AIRPL column value — "STA PRES ALT FLT/DTE AIRPL DTE/TIME" header
    // followed by a data line "LAX 120 0073/05 7LW 06/0441Z" where 7LW is the nose.
    if (!result.acftNose) {
      for (let i = 0; i < lines.length; i++) {
        if (/\bAIRPL\b/i.test(lines[i]) && /\bFLT\/DTE\b/i.test(lines[i])) {
          // Data row is the next non-blank line; nose is the 7XX token in it
          for (let j = i+1; j < Math.min(i+4, lines.length); j++) {
            const dl = lines[j];
            if (!dl.trim()) continue;
            const sm = dl.match(/\b(7[A-Z][A-Z0-9])\b/i);
            if (sm) { result.acftNose = sm[1].toUpperCase(); break; }
            break;
          }
          if (result.acftNose) break;
        }
      }
    }
    // Source B: AIRPL header (overrides if found — more explicit)
    let foundAirpl = false;
    for (const l of lines) {
      if (/\bAIRPL\b/i.test(l)) {
        const sameLine = l.match(/\b(7[A-Z]{2})\b/i);
        if (sameLine) { result.acftNose = sameLine[1].toUpperCase(); break; }
        foundAirpl = true; continue;
      }
      if (foundAirpl) {
        const nm = l.trim().match(/^(7[A-Z]{2})\b/i);
        if (nm) { result.acftNose = nm[1].toUpperCase(); break; }
        if (l.trim()) break;
      }
    }
  }

  // ── Weights (in thousands, e.g. "604.3") ─────────────────────────────────
  // PTOW ATOW ZFW FUEL line: "12C 604.3 607.3 403.6 203.0P"
  for (const l of lines) {
    const m = l.match(/(\d+)C\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)P/);
    if (m) {
      result.temp      = m[1];
      result.ptow      = m[2];
      result.atow      = m[3]; // RMP/ATOW
      // m[4] = ZFW — not filled
      result.fuelBlock = m[5]; // flight planned fuel → Block field
      break;
    }
  }

  // ── Temp ─────────────────────────────────────────────────────────────────
  if (!result.temp) { const t = get(/\bTEMP\s+(-?\d+)C/i); if (t) result.temp = t; }

  // ── EPR (MAX line) ────────────────────────────────────────────────────────
  const eprMax = get(/\*MAX\*\s+EPR.*?([\d.]{5})/);
  if (eprMax) result.epr = eprMax;

  // ── Runway / V-speed data fully captured in THRUST/V-SPEED section below ──

  // ── Performance mode: MAX power if "*MAX*" present ────────────────────────
  if (text.includes('*MAX*')) result.perf1 = 'MAX';

  // ── WBD header block: power setting, runway condition, planned temp, PTOW, ATOW ──
  // Format:  *** 777-200 *** TO1 DRY ***
  //          TEMP PTOW ATOW ZFW FUEL
  //          12C  604.3 607.3 403.6 203.0P
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    // Power setting + runway condition line: e.g. "*** 777-200 *** TO1 DRY ***"
    const powerMatch = l.match(/\*\*\*\s*[\w-]+\s*\*\*\*\s+(TO\d?)\s+(DRY|WET)\s*\*\*\*/i);
    if (powerMatch) {
      result.perf1 = powerMatch[1].toUpperCase().replace('TO', 'TO-').replace('TO-0','TO').replace('TO-1','TO-1').replace('TO-2','TO-2');
      // Normalize: TO stays TO, TO1→TO-1, TO2→TO-2
      const raw = powerMatch[1].toUpperCase();
      if (raw === 'TO') result.perf1 = 'TO';
      else if (raw === 'TO1') result.perf1 = 'TO-1';
      else if (raw === 'TO2') result.perf1 = 'TO-2';
      result.perf2 = powerMatch[2].charAt(0).toUpperCase() + powerMatch[2].slice(1).toLowerCase(); // Dry/Wet
    }
    // Planned temp from WBD data line: "TEMP PTOW ATOW ZFW FUEL" header then values
    if (/^\s*TEMP\s+PTOW\s+ATOW\s+ZFW/i.test(l) && lines[i+1]) {
      const vals = lines[i+1].trim().split(/\s+/);
      // vals: [temp, ptow, atow, zfw, fuel...]  e.g. 12C 604.3 607.3 403.6 203.0P
      if (vals.length >= 3) {
        const tempRaw = vals[0].replace(/C$/i,'');
        if (!isNaN(parseFloat(tempRaw))) result.plannedTemp = tempRaw;
        const ptowVal = parseFloat(vals[1]);
        if (!isNaN(ptowVal)) result.ptow = ptowVal.toFixed(1);
        const atowVal = parseFloat(vals[2]);
        if (!isNaN(atowVal)) result.atow = atowVal.toFixed(1);
        if (vals[3]) { const zfwVal = parseFloat(vals[3]); if (!isNaN(zfwVal)) result.zfw = zfwVal.toFixed(1); }
      }
    }
  }

  // ── THRUST / V-SPEED section: collect ALL runway rows ────────────────────
  // Header: "RWY FLAP A/C EPR V1 VR V2 AT MTOW"
  // Data:   "27R 05 ON 1.456 160 164 167 MAX-WT 631.6T"
  // AT: "MAX-WT" → weight-limited max power; "34C" → assumed temp numeric
  const runways = [];
  let inThrustSection = false;
  for (const l of lines) {
    if (/THRUST\s*\/\s*V[-\s]?SPEED/i.test(l)) { inThrustSection = true; console.log('[THRUST] section start'); continue; }
    if (inThrustSection) {
      const t = l.trim();
      console.log('[THRUST] line:', JSON.stringify(t));
      if (!t || /^[-*=]+$/.test(t)) continue;
      if (/^[*]{3,}\s*[A-Z]/.test(t) && !/THRUST|RWY|FLAP|EPR|MAX|N1/i.test(t)) break;
      // Skip column header rows (RWY FLAP A/C EPR V1 VR V2 AT MTOW)
      if (/^\s*RWY\s+FLAP/i.test(t)) continue;
      // Match: RWY FLAP ON/OFF EPR/N1 ...V-speeds... AT MTOW
      // EPR: 1.456 or 1.542 — N1: 93.4 or 93.4% (strip %)
      const dm = t.match(/^(\S+)\s+(\d{1,2})\s+(ON|OFF)\s+([\d.]+)%?\s+(.+)/i);
      if (dm) {
        const tokens = dm[5].trim().split(/\s+/).filter(Boolean);
        if (tokens.length >= 2) {
          const atField   = tokens[tokens.length - 2];
          const mtowField = tokens[tokens.length - 1];
          // V-speeds: all tokens except last two
          const vTokens = tokens.slice(0, tokens.length - 2).filter(t => /^\d{2,3}$/.test(t));
          let perf3Val = '';
          if (/^MAX-WT$/i.test(atField)) {
            perf3Val = 'MAX-WT';
          } else if (/^\d{1,3}C$/i.test(atField)) {
            perf3Val = atField.replace(/C$/i,'');
          }
          let mtow1Val = '', mtow2Val = '';
          const mtowMatch = mtowField.match(/^([\d.]+)([A-Z]?)$/i);
          if (mtowMatch) {
            mtow1Val = parseFloat(mtowMatch[1]).toFixed(1);
            mtow2Val = mtowMatch[2] ? mtowMatch[2].toUpperCase() : '';
          }
          runways.push({
            rwy:    dm[1],
            flaps:  dm[2].replace(/^0/,'') || dm[2],
            acPack: dm[3].toUpperCase(),
            epr:    dm[4],
            v1:     vTokens[0] || '',
            vr:     vTokens[1] || '',
            v2:     vTokens[2] || '',
            perf3:  perf3Val,
            mtow1:  mtow1Val,
            mtow2:  mtow2Val,
          });
        }
      }
      if (/^={3,}/.test(t) || /^PAGE\s+\d+/i.test(t)) break;
    }
  }
  // Populate top-level fields from first runway for backward compatibility
  if (runways.length) {
    const r0 = runways[0];
    result.rwy    = r0.rwy;
    result.flaps  = r0.flaps;
    result.acPack = r0.acPack;
    result.epr    = r0.epr;
    result.v1     = r0.v1;
    result.vr     = r0.vr;
    result.v2     = r0.v2;
    result.perf3  = r0.perf3;
    if (r0.mtow1) result.mtow1 = r0.mtow1;
    if (r0.mtow2) result.mtow2 = r0.mtow2;
    result.runways = JSON.stringify(runways);
  }


  // NS page: "DEP LHR 1005/12 PLN 1005/12  22" — gate is trailing number on dep line
  // Also handles: "GATE 22", "GATE B25", "DEP GATE 22"
  let gateFound = null;
  for (const l of lines) {
    // NS page format: "DEP <ICAO> <time> PLN <time> <gate>"
    const nsm = l.match(/^\s*DEP\s+\w{3,4}\s+\d{4}\/\d{2}\s+PLN\s+\d{4}\/\d{2}\s+([A-Z]?\d{1,3}[A-Z]?)\s*$/i);
    if (nsm) { gateFound = nsm[1].toUpperCase(); break; }
    // Generic: "GATE 22" / "GATE B25" / "DEP GATE 22"
    const gm = l.match(/(?:DEP(?:ARTURE)?\s+)?GATE[:\s]+([A-Z]?\d{1,3}[A-Z]?)\b/i);
    if (gm) { gateFound = gm[1].toUpperCase(); break; }
  }
  if (gateFound) result.gate = gateFound;

  // ── Weight-restricted flight detection ────────────────────────────────────
  // Header banner: "*** WEIGHT RESTRICTED FLIGHT ***"
  // "* LIMITING RESTRICTION -- MTOW-S *"
  {
    for (const l of lines) {
      if (/WEIGHT\s+RESTRICTED\s+FLIGHT/i.test(l)) {
        result.weightRestricted = 'true';
      }
      const lim = l.match(/LIMITING\s+RESTRICTION\s*[-–]{1,2}\s*([A-Z0-9\-]+)/i);
      if (lim) result.weightRestrictLimit = lim[1].toUpperCase();
    }
  }

  // ── Redispatch plan detection ─────────────────────────────────────────────
  // "PLANNED REDISPATCH - 19S70 AS FILED TO SYD"
  {
    const rdLine = get(/PLANNED\s+REDISPATCH\s*[-–]\s*(\S+)/i);
    if (rdLine) {
      result.rdPlan = true;
      result.rdPt   = rdLine.toUpperCase();
    }
  }

  // ── Redispatch summary block ──────────────────────────────────────────────
  // "PLANNED FUEL AT 19S70 077790"
  // "MINIMUM FUEL REQUIRED AT 19S70 072789"
  // "SPREAD BETWEEN PLANNED AND MIN 005001"
  // All values are whole lbs — always divide by 1000 for klbs display.
  // Use full-text search on the extracted REDISPATCH SUMMARY block to avoid
  // false matches from line-wrapping or other sections.
  if (result.rdPlan) {
    const fullText = lines.join('\n');
    const rdBlock = fullText.match(/REDISPATCH\s+SUMMARY[\s\S]*?(?=ON\s+TIME\s+ANALYSIS|-{20,}\s*\n[A-Z])/i);
    const rdSearch = rdBlock ? rdBlock[0] : fullText;

    // PLANNED FUEL AT <waypoint> <number>
    // PDF may merge/wrap lines — use positional search allowing \s and cross-line matching
    const pfM = fullText.match(/PLANNED\s+FUEL\s+AT\s+\S+[\s\S]{0,10}(\d{5,6})/i);
    if (pfM) result.rdFuelPlan = (parseFloat(pfM[1]) / 1000).toFixed(1);

    // MINIMUM FUEL + SPREAD — the PDF extractor merges the two label lines and
    // stacks the numbers, e.g.:
    //   "MINIMUM FUEL REQUIRED AT 19S70 SPREAD BETWEEN PLANNED AND MIN 072789"
    //   "005001"
    // Strategy: find the MINIMUM FUEL line, join it with the next 3 lines,
    // collect all 5-6 digit numbers → FIRST is min fuel, LAST is spread.
    // This also works for the unmerged layout (two separate label+number lines).
    {
      for (let mi = 0; mi < lines.length; mi++) {
        if (/MINIMUM\s+FUEL/i.test(lines[mi])) {
          const joined = [lines[mi], lines[mi+1]||'', lines[mi+2]||'', lines[mi+3]||''].join(' ');
          const nums = joined.match(/\d{5,6}/g);
          if (nums && nums.length >= 1) {
            result.rdFuelMin = (parseFloat(nums[0]) / 1000).toFixed(1);
            result.fuelRedispatch = result.rdFuelMin;
          }
          if (nums && nums.length >= 2) {
            result.rdFuelSpread = (parseFloat(nums[nums.length - 1]) / 1000).toFixed(1);
          }
          break;
        }
      }
    }

    // ENRT BRN line → time and dist TO the R/D point (not the full flight)
    // "ENRT BRN 19S70 222140 1045 5210"
    for (const l of lines) {
      const m = l.match(/ENRT\s+BRN\s+\S+\s+\d+\s+(\d{4})\s+(\d+)/i);
      if (m) {
        result.rdTimeToRD = m[1].slice(0,2) + '+' + m[1].slice(2); // "10+45"
        result.rdDistToRD = m[2];                                    // "5210"
        break;
      }
    }
    // DEST table: "DEST BNE 037171 0239 1074  SYD 048722 0325 1374"
    // First airport = R/D airport (BNE), second = final destination (SYD)
    for (const l of lines) {
      const m = l.match(/^\s*DEST\s+([A-Z]{3,4})\s+(\d+)\s+(\d{4})\s+(\d+)\s+([A-Z]{3,4})\s+(\d+)\s+(\d{4})\s+(\d+)/i);
      if (m) {
        result.rdAirport      = m[1].toUpperCase();                    // BNE
        result.rdArrFuelRdApt = (parseFloat(m[2]) / 1000).toFixed(1); // 37.2 klbs
        result.rdDistRdToDest = m[8];                                  // 1374 nm R/D→SYD
        // NOTE: do NOT set fuelArrPlanned here — the DEST-table figure (m[6]) is a
        // burn/other value, not the planned arrival fuel. The "PLAN ARR FUEL" scraper
        // below correctly reads the real arrival fuel (e.g. 029067 = 29.1 klbs).
        // Full trip dist = dist to R/D + dist R/D to dest
        const fullDist = parseInt(result.rdDistToRD||0) + parseInt(m[8]||0);
        if (fullDist > 0) result.totalDist = String(fullDist);
        break;
      }
    }

    // ── R/D routing: parse the "ROUTING FROM R/D TO INTERMEDIATE AIRPORT" section ──
    // Each waypoint is a multi-line block: first line is "IDENT [optional(BC)*] FL",
    // then ~18 data lines (LAT, WIND, LON, WCP, MC, MH, MK, TRR, GS, TAS, TD, I, SD,
    // TLDR, ST, TTLT, SB, TTLB, TH). We extract: ident, FL, and TLDR (dist remaining).
    // Also grab the route string from the ORIGINAL RELEASE line.
    {
      // Route string — line-by-line to handle multi-line routes and varied PDF extraction
      {
        let rdRouteStr = '';
        let inRoute = false;
        for (const l of lines) {
          const t = l.trim();
          if (/ORIGINAL\s+RELEASE/i.test(t) && /AS\s+FILED\s+TO/i.test(t)) {
            const m = t.match(/AS\s+FILED\s+TO\s+(.+)/i);
            if (m) rdRouteStr = m[1].trim();
            inRoute = true;
            continue;
          }
          if (inRoute) {
            if (!t || /^(TO$|IDENT|RE-DISPATCH|STEP\s+CLIMB|PAGE\s+\d|\d{8}-|\-{10,})/i.test(t)) break;
            rdRouteStr += ' ' + t;
          }
        }
        if (rdRouteStr) result.rdRouteStr = rdRouteStr.replace(/\s+/g,' ').trim();
      }

      // Find the ROUTING FROM R/D section
      const rdRouteStart = fullText.search(/ROUTING\s+FROM\s+R\/D\s+TO\s+INTERMEDIATE/i);
      if (rdRouteStart >= 0) {
        // Take a generous slice — the routing table spans page breaks, so we do NOT
        // stop at PAGE markers. The waypoint walker below stops at the destination
        // airport row (e.g. "YBBN 15FT ...") instead.
        const rdText = fullText.slice(rdRouteStart, rdRouteStart + 25000);
        const rdLines = rdText.split(/\r?\n/);

        // Skip labels: section headers, column headers, step-climb/TOC/TOD markers,
        // and page-break junk (timestamps, WBD headers, asterisk rows, PAGE n)
        const skipLabels = /^(RE-DISPATCH|STEP\s+CLIMB|TOP\s+OF\s+CLIMB|TOP\s+OF\s+DESCENT|TOC\b|TOD\b|SC\b|RWY|ROUTING|ORIGINAL|TO\s*$|IDENT|LAT|LONG|WIND|WCP|MC|MH|MK|TRR|GS|TAS|TD|I\s*$|SD|TLDR|ST|TTLT|SB|TTLB|TH|\-{3,}|_{3,}|={3,}|PAGE\s+\d|\*{2,}|WBD\b|\d{8}-\d{4}|RELEASE\s+\d)/i;

        const rdWaypoints = [];
        // Lat/lon tokens (S26557, E153561, S19000) must never be treated as idents
        const isLatLon = s => /^[NSEW]\d+$/i.test(s);
        let i = 0;
        while (i < rdLines.length) {
          const t = rdLines[i].trim();
          // Form 1 — merged: "IDENT FL ..." or "IDENT* FL ..." or "IDENT (BC)* FL ..."
          const identM = t.match(/^((?=[A-Z0-9]*[A-Z])[A-Z0-9]{3,8})\*?(?:\s+\(BC\)\*?)?\s+(\d{2,3})\b/i);
          // Airport row merged: "YBBN 15FT ..." — destination; push and stop.
          const arptM = !identM ? t.match(/^([A-Z]{4})\*?\s+(\d{1,3})FT\b/i) : null;
          if (arptM) {
            rdWaypoints.push({ ident: arptM[1].toUpperCase(), fl: '', mc: '', mh: '', ttlb: '', eta: '' });
            break;
          }
          // Form 2 — split: ident alone on one line, FL (3 digits) on the next.
          // Page-2 of the routing table puts every token on its own line.
          let splitM = null;
          if (!identM) {
            const identOnly = t.match(/^((?=[A-Z0-9]*[A-Z])[A-Z0-9]{3,8})\*?$/i);
            if (identOnly && !skipLabels.test(t) && !/^[A-Z]\d{2}$/i.test(identOnly[1]) && !isLatLon(identOnly[1])) {
              // find next non-blank line
              let nb = i + 1;
              while (nb < rdLines.length && !rdLines[nb].trim()) nb++;
              const nextT = (rdLines[nb]||'').trim();
              const flOnly = nextT.match(/^(\d{2,3})\b/);
              if (flOnly) splitM = { ident: identOnly[1], fl: flOnly[1], dataStart: nb + 1 };
              else {
                // Airport split form: "YBBN" then "15FT 0"
                const ftNext = nextT.match(/^(\d{1,3})FT\b/i);
                if (ftNext && /^[A-Z]{4}\*?$/i.test(t)) {
                  rdWaypoints.push({ ident: identOnly[1].toUpperCase(), fl: '', mc: '', mh: '', ttlb: '', eta: '' });
                  break;
                }
              }
            }
          }
          if ((identM && !skipLabels.test(t) && !/^[A-Z]\d{2}$/i.test(identM[1]) && !isLatLon(identM[1])) || splitM) {
            const ident  = (splitM ? splitM.ident : identM[1]).toUpperCase();
            const fl_val = splitM ? splitM.fl : identM[2];
            // Collect subsequent data lines (skip blanks, stop at next ident-like line)
            const dataLines = [];
            let j = splitM ? splitM.dataStart : i + 1;
            while (j < rdLines.length && dataLines.length < 20) {
              const d = rdLines[j].trim();
              if (!d) { j++; continue; }
              // Stop at next merged ident+FL row or merged airport row
              if (d.match(/^((?=[A-Z0-9]*[A-Z])[A-Z0-9]{3,8})\*?(?:\s+\(BC\)\*?)?\s+(\d{2,3})\b/i) && !isLatLon(d.split(/[\s*]/)[0])) break;
              if (d.match(/^([A-Z]{4})\*?\s+(\d{1,3})FT\b/i)) break;
              // Stop at split ident: ident-only line (with letter, not latlon/data-token)
              const dIdent = d.match(/^((?=[A-Z0-9]*[A-Z])[A-Z0-9]{3,8})\*?$/i);
              if (dIdent && !skipLabels.test(d) && !/^[A-Z]\d{2}$/i.test(dIdent[1]) && !isLatLon(dIdent[1])) {
                const nb2 = rdLines[j+1] ? rdLines[j+1].trim() : '';
                if (/^\d{3}\b/.test(nb2) || /^\d{1,3}FT\b/i.test(nb2)) break;
              }
              if (skipLabels.test(d)) { j++; continue; }
              dataLines.push(d);
              j++;
            }
            // Field positions after ident/FL:
            // lat=0,wind=1,lon=2,wcp=3,mc=4,mh=5,mk=6,trr=7,gs=8,tas=9,td=10,i=11,sd=12,tldr=13,st=14,ttlt=15,sb=16,ttlb=17,th=18
            const flat = dataLines.join(' ').trim().split(/\s+/);
            const mc    = flat[4]  || '';
            const mh    = flat[5]  || '';
            const ttlt  = flat[15] || ''; // total time so far (HHMM)
            const ttlb  = flat[17] ? flat[17].replace(/\s.*$/,'') : ''; // total burn so far (lbs)
            const eta   = ttlt ? ttlt.slice(0,2)+'+'+ttlt.slice(2) : '';
            rdWaypoints.push({ ident, fl: fl_val, mc, mh, ttlb, eta });
            i = j;
          } else {
            i++;
          }
        }
        if (rdWaypoints.length) result.rdOrv = JSON.stringify(rdWaypoints);
      }
    }
  } // end if (result.rdPlan)

  // ── Enroute time ─────────────────────────────────────────────────────────
  // Real CCI format: "ENRT BRN PHX 171553 1031 4693"  → 4-digit field after airport+burn
  // On REDISPATCH plans, ENRT BRN gives time to R/D point, NOT full flight time.
  // In that case skip ENRT BRN and use FLIPLN (full block time from ON TIME ANALYSIS).
  // Also: "FLIPLN 0033 1031 0011 1115" → 2nd 4-digit group on FLIPLN line
  // Converts to "HH+MM"
  const toHHMM = raw => {
    const pre = raw.match(/^(\d{1,2})[+:](\d{2})$/);
    if (pre) return pre[1].padStart(2,'0') + '+' + pre[2];
    const dig = raw.match(/^(\d{4})$/);
    if (dig) return dig[1].slice(0,2) + '+' + dig[1].slice(2);
    return null;
  };
  const etPatterns = result.rdPlan ? [
    // R/D plan: skip ENRT BRN (it's time to R/D point), use FLIPLN for full flight
    /^\s*FLIPLN\s+\d+\s+(\d{4})\s+/i,                      // FLIPLN 0023 1411 0009 1443
    /^\s*ETIME\s+(\d{1,2}[+:]\d{2}|\d{4})\b/i,
    /^\s*ELAPSE\s*TIME[:\s]+(\d{1,2}[+:]\d{2}|\d{4})\b/i,
    /^\s*ETE\s+(\d{1,2}[+:]\d{2}|\d{4})\b/i,
    /ELAPSED\s+TIME[:\s]+(\d{1,2}[+:]\d{2}|\d{4})/i,
    /FLIGHT\s+TIME[:\s]+(\d{1,2}[+:]\d{2}|\d{4})/i,
  ] : [
    /ENRT\s+BRN\s+\w+\s+\d+\s+(\d{4})\s+\d+/i,           // ENRT BRN PHX 171553 1031 4693
    /^\s*FLIPLN\s+\d+\s+(\d{4})\s+/i,                      // FLIPLN 0033 1031 0011 ...
    /^\s*ETIME\s+(\d{1,2}[+:]\d{2}|\d{4})\b/i,
    /^\s*ELAPSE\s*TIME[:\s]+(\d{1,2}[+:]\d{2}|\d{4})\b/i,
    /^\s*ETE\s+(\d{1,2}[+:]\d{2}|\d{4})\b/i,
    /^\s*TIME\s+(\d{4})\b/i,
    /ELAPSED\s+TIME[:\s]+(\d{1,2}[+:]\d{2}|\d{4})/i,
    /FLIGHT\s+TIME[:\s]+(\d{1,2}[+:]\d{2}|\d{4})/i,
  ];
  for (const pat of etPatterns) {
    if (result.enrouteTime) break;
    for (const l of lines) {
      const m = l.match(pat);
      if (m) { const fmt = toHHMM(m[1]); if (fmt) { result.enrouteTime = fmt; break; } }
    }
  }

  // ── Block Fuel from CCI "RLS FUEL 301451" line ──────────────────────────
  if (!result.fuelBlock) {
    const rlsM = get(/RLS\s+FUEL\s+(\d+)/i);
    if (rlsM) {
      const n = parseFloat(rlsM);
      result.fuelBlock = n > 9999 ? (n / 1000).toFixed(1) : n.toFixed(1);
    }
  }

  // ── Min Takeoff Fuel (fuelTrip) ───────────────────────────────────────────
  // Real CCI: "MIN T/O FUEL 197919" (whole lbs) and "MIN T/O 197919" (summary line)
  // Stored as-is (whole lbs string) to match the numInp field which takes raw numbers
  const minFuelPatterns = [
    /MIN\s+T\/O\s+FUEL\s+(\d+)/i,          // "MIN T/O FUEL 197919"  — header line
    /^\s*MIN\s+T\/O\s+(\d+)\s*$/i,         // "MIN T/O 197919"       — summary line
    /MIN\s+(?:TKOF|TAKEOFF)\s+FUEL\s+(\d+)/i,
    /MINIMUM\s+(?:T\/O|TAKEOFF)\s+FUEL\s+(\d+)/i,
    /TRIP\s+FUEL\s+(\d+)/i,
  ];
  for (const pat of minFuelPatterns) {
    if (result.fuelTrip) break;
    const v = get(pat);
    // Convert whole lbs → thousands with 1 decimal (e.g. 197919 → 197.9)
    if (v) {
      const n = parseFloat(v);
      result.fuelTrip = n > 9999 ? (n / 1000).toFixed(1) : n.toFixed(1);
    }
  }

  // ── Planned Arrival Fuel (fuelArrPlanned) ────────────────────────────────
  // Real CCI: "TOT BRN 173918 PLAN ARR FUEL 29077 02HR/16MIN"
  // Also standalone: "PLAN ARR FUEL 029077 0216"
  const arrFuelPatterns = [
    /PLAN\s+ARR\s+FUEL\s+0*(\d+)/i,        // "PLAN ARR FUEL 29077" or "029077"
    /PLN\s+ARR\s+FUEL\s+0*(\d+)/i,
    /PLANNED?\s+ARRIV\w*\s+FUEL\s+0*(\d+)/i,
    /DEST(?:INATION)?\s+FUEL\s+0*(\d+)/i,
  ];
  for (const pat of arrFuelPatterns) {
    if (result.fuelArrPlanned) break;
    const v = get(pat);
    if (v) {
      const n = parseFloat(v);
      result.fuelArrPlanned = n > 9999 ? (n / 1000).toFixed(1) : n.toFixed(1);
    }
  }

  // ── Arr Fuel Min: "02HR/22MIN" or "0222" → "02+22" ─────────────────────
  for (const l of lines) {
    const m = l.match(/(\d{2})HR\/(\d{2})MIN/i) || l.match(/PLAN\s+ARR\s+FUEL\s+\d+\s+(\d{2})(\d{2})\b/i);
    if (m) { result.fuelArrMin = m[1] + '+' + m[2]; break; }
  }

  // ── Cost Index ────────────────────────────────────────────────────────────
  const ci = get(/COST\s*INDEX[:\s]+(\d+)/i);
  if (ci) result.costIndex = ci;

  // ── Route string (truncated to fit) ──────────────────────────────────────
  let routeText = '';
  let inRoute = false;
  for (const l of lines) {
    if (/^ROUTE:/i.test(l.trim())) { routeText = l.replace(/^ROUTE:\s*/i,'').trim(); inRoute = true; continue; }
    if (inRoute) {
      if (/^ALTN\s+RTE/i.test(l.trim()) || /^---/.test(l.trim()) || l.trim() === '') { inRoute = false; continue; }
      routeText += ' ' + l.trim();
    }
  }
  if (routeText) result.route = routeText.trim();

  // ── Oceanic Route Verification ────────────────────────────────────────────
  // Starts at "OCEANIC ROUTE VERIFICATION", stops at the first of:
  //   - a line of 3+ dashes or equals (hard rule separator)
  //   - any line containing "RELEASE" (e.g. "PAGE 1 RELEASE 1.0 ...")
  //   - the CCI footer ID line (e.g. "41410040-9000-...")
  //   - a new "PAGE N" header line
  // Each data line is expected to have 7 space-separated tokens:
  //   TO_IDENT  LAT  LONG  TC  MC  MH  DIST
  // Any line that doesn't parse to exactly 7 numeric/coord tokens is skipped
  // (this removes the stray +1 trailing line that isn't waypoint data).
  let orvRows = [];
  let inORV = false;
  // Regex: ident  lat  lon  TC  MC  MH  dist
  // Lat/lon can be either:
  //   CCI format:  N59000  W010000  (letter-first, e.g. N59000, W010000, N65543, W058350)
  //   Classic fmt: 59N000  010W000  (digits-first, e.g. 59N, 010W)
  // TC/MC/MH can be digits OR "---" (e.g. BALIX entry point has no prior segment)
  // DIST can be digits OR "----"
  const latRe  = '[NS]\\d{2,5}|\\d{1,3}[NS]\\d*';
  const lonRe  = '[EW]\\d{3,6}|\\d{1,3}[EW]\\d*';
  const degRe  = '(?:\\d{1,3}|---)';           // bearing: digits or ---
  const distRe = '(?:\\d{1,4}|-{3,4})';        // distance: digits or ----
  const orvRowRe = new RegExp(
    '^(\\S+)\\s+(' + latRe + ')\\s+(' + lonRe + ')\\s+(' + degRe + ')\\s+(' + degRe + ')\\s+(' + degRe + ')\\s+(' + distRe + ')$',
    'i'
  );
  for (const l of lines) {
    if (/OCEANIC\s+ROUTE\s+VERIF/i.test(l)) { inORV = true; continue; }
    if (inORV) {
      const t = l.trim();
      if (
        /^={3,}/.test(t) ||
        /RELEASE/i.test(t) ||
        /^PAGE\s+\d+/i.test(t) ||
        /^\d{8}-\d{4}-/.test(t)
      ) { inORV = false; continue; }
      if (!t) continue;
      // Skip the column-header line (contains non-numeric labels like "TO" or "IDENT")
      if (/\b(TO|IDENT|LAT|LONG|LON|TRUE|MAG|DIST)\b/i.test(t)) continue;
      // Only keep lines that match the 7-token waypoint pattern
      const m = t.match(orvRowRe);
      if (m) {
        orvRows.push({
          ident: m[1].toUpperCase(),
          lat:   m[2].toUpperCase(),
          lon:   m[3].toUpperCase(),
          tc:    m[4],
          mc:    m[5],
          mh:    m[6],
          dist:  m[7]
        });
      }
    }
  }

  // ── Total distance (TLDR) from ENRT BRN line: last number ────────────────
  // Format: "ENRT BRN PHX 171553 1031 4693" — last token is total dist nm
  // On R/D plans, totalDist was already computed from rdDistToRD + rdDistRdToDest above.
  if (!result.rdPlan) {
    for (const l of lines) {
      const m = l.match(/ENRT\s+BRN\s+\w+\s+\d+\s+\d+\s+(\d+)/i);
      if (m) { result.totalDist = m[1]; break; }
    }
  }

  // ── Dispatch desk + phone: "DESK: FD49  PHONE: 310-555-1234" (same line) ───
  for (const l of lines) {
    const dm = l.match(/DESK:\s*(FD\d+)/i);
    if (dm) {
      result.dispatchDesk = dm[1];
      const pm = l.match(/PHONE:\s*([\d\s().+-]{7,})/i);
      if (pm) result.dispPhone = pm[1].trim();
      break;
    }
  }

  // ── Release version: "PAGE 1 RELEASE 1.0" or "RELEASE 1.2" ──────────────
  for (const l of lines) {
    const m = l.match(/RELEASE\s+(\d+\.\d+)/i);
    if (m) { result.releaseVer = m[1]; break; }
  }

  // ── Dispatcher name: "DISP SIGNED BY: JOHN SMITH" ────────────────────────
  for (const l of lines) {
    const prefix = /(?:DISP(?:ATCHE[DR])?\s+(?:SIGNED\s+)?BY|DISPATCHER|SIGNED\s+BY)\s*:\s*/i;
    if (!prefix.test(l)) continue;
    result.dispName = l.replace(prefix, '').trim();
    break;
  }

  // ── Crew names from release signature block (PAGE with CAPT*/F/O/F/B) ─────
  // Format: "CAPT* STEPHEN PRITZKER" / "F/O PAUL LUISI" / "F/B CHAD MINGO"
  // Skip any line where last name is MINGO; fill crewN1, crewN2, crewN3 in order
  {
    const crewSlots = [];
    const crewRe = /^\s*(CAPT\*?|F\/O|F\/B|RO\s*\d?)\s+([A-Z]+)\s+([A-Z]+)/i;
    for (const l of lines) {
      const m = l.match(crewRe);
      if (m) {
        const firstName = m[2].charAt(0).toUpperCase() + m[2].slice(1).toLowerCase();
        const lastName  = m[3].toUpperCase();
        if (lastName === 'MINGO') continue;  // skip Chad
        crewSlots.push(firstName);
        if (crewSlots.length === 3) break;
      }
    }
    if (crewSlots[0]) result.crewN1 = crewSlots[0];
    if (crewSlots[1]) result.crewN2 = crewSlots[1];
    if (crewSlots[2]) result.crewN3 = crewSlots[2];
  }

  // ── Arrival time + date from NS page: "ARV PHX 1305/12 SKD 1320/12 B25" ──
  // Primary: use planned time and date directly from the NS page
  // Format: ARV <city> <HHMM>/<DD> SKD <HHMM>/<DD> [gate]
  let arrParsedFromPlan = false;
  for (const l of lines) {
    const m = l.match(/^\s*ARV\s+\w+\s+(\d{2})(\d{2})\/(\d{2})(?:\s+SKD\s+(\d{2})(\d{2})\/(\d{2}))?(?:\s+([A-Z]\d{1,3}[A-Z]?))?/i);
    if (m) {
      // Prefer SKD time (groups 4-6) if available, else planned (groups 1-3)
      const arrHH = m[4] || m[1];
      const arrMM = m[5] || m[2];
      const arrDD = parseInt(m[6] || m[3]);
      result.arrTime = arrHH + ':' + arrMM;
      if (m[7]) result.arrGate = m[7].toUpperCase();
      // Build arrDate: same month/year as depDate, but day from plan
      if (result.depDate) {
        const depD = new Date(result.depDate + 'T00:00:00Z');
        const depDay = depD.getUTCDate();
        let arrDateMs = depD.getTime();
        // If arrDD < depDay, must have crossed into next month
        // If arrDD > depDay, same month (or crossed date line backward — rare)
        const dayDiff = arrDD - depDay;
        arrDateMs += dayDiff * 86400000;
        // Sanity: if dayDiff is very negative (e.g. dep=30, arr=01), add one month
        if (dayDiff < -20) arrDateMs += 31 * 86400000;
        result.arrDate = new Date(arrDateMs).toISOString().slice(0, 10);
      }
      arrParsedFromPlan = true;
      break;
    }
  }

  // ── Fallback: calculate arrDate from depDate + enrouteTime + tz offsets ──
  // Used when NS page ARV line is not present or not parseable
  if (!arrParsedFromPlan && result.depDate && result.depTime && result.enrouteTime) {
    const cityList = (typeof CITY_LIST !== 'undefined') ? CITY_LIST : [];
    const arrOffMin = (cityList.find(x=>x.v===result.arrCity)||{off:0}).off;
    const [dh, dm] = result.depTime.split(':').map(Number);
    const [eh, em] = result.enrouteTime.split(':').map(Number);
    const depUtcMin = dh * 60 + dm;  // depTime is Zulu
    const arrUtcMin = depUtcMin + eh * 60 + em;
    const arrLocalMin = arrUtcMin + arrOffMin;
    const dayOffset = Math.floor(arrLocalMin / 1440);
    const depMs = new Date(result.depDate + 'T00:00:00Z').getTime();
    result.arrDate = new Date(depMs + dayOffset * 86400000).toISOString().slice(0, 10);
    const mod = ((arrLocalMin % 1440) + 1440) % 1440;
    result.arrTime = String(Math.floor(mod/60)).padStart(2,'0') + ':' + String(mod%60).padStart(2,'0');
  }

  // ── Alternate airport from leg pages: "DESTINATION ALTERNATE ROUTE TO KIWA" ─
  for (const l of lines) {
    const m = l.match(/DESTINATION\s+ALTERNATE\s+ROUTE\s+TO\s+(\w{3,4})/i);
    if (m) {
      const icao = m[1].toUpperCase();
      result.altCity = ICAO_MAP[icao] || icao.replace(/^K/,'').replace(/^E/,'');
      break;
    }
  }

  // ── Legs table from NS page ───────────────────────────────────────────────
  // NS page format (after OUT/OFF header):
  // "UMLAT 0946 060/420 195.2"  — IDENT  ETA  FL/MK  FUEL
  // We also need MC/MH which is NOT on the NS page — it's on the detailed leg pages.
  // Parse MC/MH from the detailed leg pages (pages 4-7).
  // Detailed leg row pattern (simplified):
  //   IDENT  FL
  //   LAT  WIND/WCP
  //   LONG
  //   MC  MH/MK  TRR/GS  ...
  // We'll parse the NS leg rows first for ETA+FL+fuel, then patch in MC/MH from detail pages.

  const legsMap = {};  // keyed by ident

  // NS leg rows: "IDENT HHMM FL/MK FUEL" (fuel is nnn.n)
  // Also handle special rows: "OUT 0905 203.0", "OFF 0938 200.6", "ON 2009 ...", "IN 2020 ..."
  // Skip those — only capture waypoint rows
  let inNS = false;
  const nsSkip = /^\s*(OUT|OFF|ON|IN)\s+\d{4}/i;
  for (const l of lines) {
    if (/^\s*-\s*FLT\s+AAL/i.test(l)) { inNS = true; continue; }
    if (inNS) {
      if (/^\s*41\d{6}-/.test(l.trim()) || /^PAGE\s+\d+/i.test(l.trim())) { inNS = false; continue; }
      if (nsSkip.test(l)) continue;
      // Match: IDENT  HHMM  FL/MK  FUEL
      const m = l.match(/^\s*(\S+)\s+(\d{4})\s+(\d{3}\/(\d{3}))\s+([\d.]+)\s*$/);
      if (m) {
        const ident = m[1].toUpperCase();
        legsMap[ident] = { ident, eta: m[2], flmk: m[3], fl: m[3].split('/')[0], mach: m[4], fuel: m[5], mc: '---', mh: '---' };
      }
    }
  }

  // ── Parse detail pages: single pass, positional field reading ────────────
  // Format per waypoint block (each value on its own line, blank lines stripped):
  //   0: IDENT FL        e.g. "DARRK 76" or "DONKS 280"
  //   1: LAT             e.g. "N33550"
  //   2: WIND            e.g. "246014"  — skip
  //   3: LON             e.g. "W118500"
  //   4: WCP             e.g. "M13"     — skip
  //   5: MK              e.g. "459"
  //   6: GS              — skip
  //   7: TAS             — skip
  //   8: TD              — skip (P15 format)
  //   9: SD              — skip (0009 format)
  //  10: TLDR            e.g. "6562" — dist remaining
  //  11: ST              — skip
  //  12: TTLT            — skip
  //  13: SB              — skip
  //  14: TTLB            — total burn lbs
  //  15: TH              — skip
  // MC and MH are absent for some waypoints — their presence shifts fields.
  // We read LAT (pos 1), WIND (pos 2 skip), LON (pos 3) positionally since
  // those are always the first 4 fields. For MK we scan forward.
  // Stop at DESTINATION ALTERNATE ROUTE.
  {
    const skipIdents = /^(SC|TOC|TOD|RWY|PAGE|IDENT|LAT|LONG|WIND|WCP|MC|MH|MK|TRR|GS|TAS|TD|SD|TLDR|ST|SB|TTLT|TTLB|TH|FROM|DEST|ALTN|ENRT|DISP|LOAD|NONE|END|STEP|TOP|ROUTING|ORIGINAL|RELEASE|CRITICAL|OCEANIC|ETOPS|PAYLOAD|RAMP|BASE|SEAT|SEN|NAME|EMP|SEQ|RE)$/i;

    // Collect non-blank lines after first PAGE RELEASE marker.
    // Filter out page-break header lines (41410040-... PAGE N RELEASE...) that
    // appear between pages and would shift positional field reads.
    const fpLines = [];
    let pastRelease = false;
    for (const l of lines) {
      if (/DESTINATION\s+ALTERNATE\s+ROUTE/i.test(l)) break;
      if (!pastRelease) {
        if (/PAGE\s+\d+\s+RELEASE\s+[\d.]+/i.test(l)) pastRelease = true;
        continue;
      }
      const t = l.trim();
      if (!t) continue;
      // Skip page-break lines: long ID string + PAGE N RELEASE
      if (/^4141\d+.*PAGE\s+\d+\s+RELEASE/i.test(t)) continue;
      // Stop collecting at RWY line (destination runway = end of main flight plan)
      if (/^RWY\s+\d/.test(t) || t === 'RWY') break;
      fpLines.push(t);
    }

    let i = 0;
    while (i < fpLines.length) {
      const l = fpLines[i];
      // Waypoint line: "IDENT FL" where FL is 1-3 digits
      const wptM = l.match(/^([A-Z0-9]{3,8})\s+(\d{1,3})\s*$/);
      if (!wptM || !/[A-Z]/i.test(wptM[1]) || skipIdents.test(wptM[1])) { i++; continue; }

      const ident = wptM[1].toUpperCase();
      const fl_val = wptM[2];

      // Hard confirmation: next line must be LAT (N/S + 4+ digits)
      if (i+1 >= fpLines.length || !/^[NS]\d{4,}/.test(fpLines[i+1])) { i++; continue; }

      // Read fixed positional fields (always present)
      const lat = fpLines[i+1] || '';  // pos 1
      // pos 2 = WIND — skip
      const lon = fpLines[i+3] || '';  // pos 3
      // pos 4 = WCP — skip
      const mk  = fpLines[i+5] || '';  // pos 5

      // Validate lon looks correct — if not, block may be malformed, skip
      if (!/^[EW]\d+/.test(lon)) { i++; continue; }

      // Look backward for a place name — only for short (3-letter) idents like LTO, GCK
      // Longer idents are self-describing (DARRK, VESUN etc) or coord-based (06W75)
      const skipNameRe = /^(RE-DISPATCH|STEP\s+CLIMB|TOP\s+OF\s+CLIMB|TOP\s+OF\s+DESCENT|TOC|TOD|SC|RWY|PAGE|RELEASE|ROUTING|ORIGINAL|TO|IDENT|LAT|LONG|WIND|WCP|MC|MH|MK|TRR|GS|TAS|TD|SD|TLDR|ST|TTLT|SB|TTLB|TH|\d.*)$/i;
      let name = '';
      if (ident.length === 3 && i > 0) {
        const prev = fpLines[i-1];
        if (/^[A-Z][A-Z\s]{2,}$/.test(prev) && !skipNameRe.test(prev.trim()) && prev.trim().length >= 4) {
          name = prev.trim();
        }
      }

      // Add to legsMap — update if exists (NS data preserved), create skeleton if not
      if (!legsMap[ident]) {
        legsMap[ident] = { ident, eta: '', flmk: '', fl: '', mach: '', fuel: '', mc: '', mh: '' };
      }
      legsMap[ident].fl  = fl_val;
      legsMap[ident].lat = lat;
      legsMap[ident].lon = lon;
      if (mk && /^\d+$/.test(mk)) legsMap[ident].mk = mk;
      if (name && !legsMap[ident].name) legsMap[ident].name = name;

      // Advance past this block: find the next waypoint line (IDENT FL with LAT following)
      i++;
      while (i < fpLines.length) {
        const nl = fpLines[i];
        const nm = nl.match(/^([A-Z0-9]{3,8})\s+(\d{1,3})\s*$/);
        if (nm && /[A-Z]/i.test(nm[1]) && !skipIdents.test(nm[1]) &&
            i+1 < fpLines.length && /^[NS]\d{4,}/.test(fpLines[i+1])) break;
        i++;
      }
    }
  }

  const legsArr = Object.values(legsMap);
  if (legsArr.length) result.legs = JSON.stringify(legsArr);

  // DEBUG: expose fpLines and legsMap for in-app inspection
  {
    const fpLinesDebug = [];
    let pastReleaseDbg = false;
    for (const l of lines) {
      if (/DESTINATION\s+ALTERNATE\s+ROUTE/i.test(l)) break;
      if (!pastReleaseDbg) {
        if (/PAGE\s+\d+\s+RELEASE\s+[\d.]+/i.test(l)) pastReleaseDbg = true;
        continue;
      }
      const t = l.trim();
      if (!t) continue;
      if (/^4141\d+.*PAGE\s+\d+\s+RELEASE/i.test(t)) continue;
      if (/^RWY\s+\d/.test(t) || t === 'RWY') break;
      fpLinesDebug.push(t);
    }
    result._debugFpLines = JSON.stringify(fpLinesDebug.slice(0, 200));
    result._debugLegsKeys = JSON.stringify(Object.keys(legsMap));
  }

  // ── EO ACCEL MSL from Airport Analysis Data section ───────────────────────
  // Format (two consecutive rows):
  //   E/O ACCEL /AFL/ FT   [rwy_values...]
  //   /MSL/ FT             [rwy_values...]   ← we want leftmost value
  {
    let inAirportAnalysis = false;
    let eoAccelAflFound = false;
    for (let i = 0; i < lines.length; i++) {
      const l = lines[i];
      // Enter section
      if (/AIRPORT\s+ANALYSIS\s+DATA/i.test(l)) { inAirportAnalysis = true; continue; }
      // Exit section at next major header
      if (inAirportAnalysis && /^\*{3,}/.test(l.trim()) && !/AIRPORT|ANALYSIS/i.test(l)) break;
      if (!inAirportAnalysis) continue;
      // Look for E/O ACCEL /AFL/ FT row
      if (/E\/O\s+ACCEL.*AFL.*FT/i.test(l)) { eoAccelAflFound = true; continue; }
      // Next row after AFL is /MSL/ FT — grab leftmost numeric value
      if (eoAccelAflFound) {
        if (/\/MSL\/\s*FT/i.test(l)) {
          // Strip the row label, get remaining tokens, first numeric is leftmost RWY
          const rest = l.replace(/\/MSL\/\s*FT/i, '').trim();
          const tokens = rest.split(/\s+/).filter(Boolean);
          const firstNum = tokens.find(t => /^\d{3,5}$/.test(t));
          if (firstNum) result.eoAccelMsl = firstNum;
          break;
        }
        // If we hit a non-blank non-MSL line, AFL row was probably a false match
        if (l.trim() && !/^-+$/.test(l.trim())) eoAccelAflFound = false;
      }
    }
  }

  // ── Crossing ALT: first ORV waypoint's FL from legs table ────────────────
  if (orvRows.length) {
    const entryIdent = orvRows[0].ident.toUpperCase();
    const entryLeg   = legsMap[entryIdent];
    if (entryLeg && entryLeg.fl) {
      result.crossingAlt = 'FL' + entryLeg.fl;
    }
  }

  if (orvRows.length) result.orv = JSON.stringify(orvRows);

  // ── Airport Analysis Data: Climb Limit and per-Runway limit weights ─────────
  // Format:
  //   FLAP A/C LIMIT C  27R  27RX  27L  ...   ← runway column header row
  //    05  ON  631.6 12 633.8 621.3 629.8 ...  ← first data row; LIMIT C is climb limit,
  //                                               each subsequent value maps to runway column
  // Also scrape STRUCT WT LIMIT as climbLimitWt fallback.
  {
    let inAA = false;
    let rwyHeaders = [];   // ordered runway IDs from the header row
    const rwyLimitMap = {};
    let climbLimitFound = false;

    for (const l of lines) {
      if (/AIRPORT\s+ANALYSIS\s+DATA/i.test(l)) { inAA = true; continue; }
      if (inAA && /^\*{3,}/.test(l.trim()) && !/AIRPORT|ANALYSIS/i.test(l)) { inAA = false; continue; }
      if (!inAA) continue;

      // STRUCT WT LIMIT as fallback climb limit
      if (!climbLimitFound) {
        const sM = l.match(/STRUCT(?:URAL)?\s+WT\s+LIMIT\s+([\d.]+)/i);
        if (sM) { result.climbLimitWt = parseFloat(sM[1]).toFixed(1); }
      }

      // Runway column header row:
      // "FLAP A/C LIMIT C  27R  27RX  27L ..."
      // Identified by containing "LIMIT" and at least one runway-like token (digits + L/R/C/X)
      if (/\bLIMIT\b/i.test(l) && /\b\d{2}[LRC]?X?\b/.test(l)) {
        // Extract all runway-like tokens after "LIMIT C" or "LIMIT"
        // Tokens look like: 27R, 27RX, 27L, 09R etc.
        const rwyTokenRe = /\b(\d{2}[LRC]?X?)\b/g;
        rwyHeaders = [];
        let m;
        while ((m = rwyTokenRe.exec(l)) !== null) rwyHeaders.push(m[1].toUpperCase());
        continue;
      }

      // Data row — only process if we have runway headers
      // Format: (flap?) ON  climbLimit  temp  rwyVal1  rwyVal2 ...
      // e.g.: " 05 ON 631.6 12 633.8 621.3 629.8 624.3 620.1"
      // or:   " ON 631.6 12 633.8 ..."  (flap on previous line)
      if (rwyHeaders.length && /(?:^|\s)ON(?:\s|$)/i.test(l)) {
        const tokens = l.trim().split(/\s+/).filter(Boolean);
        // Find index of "ON" token (exact match only)
        const onIdx = tokens.findIndex(t => t.toUpperCase() === 'ON');
        if (onIdx >= 0) {
          // After ON: climbLimit  temp  rwyVal1  rwyVal2 ...
          const afterOn = tokens.slice(onIdx + 1).filter(t => /^[\d.]+$/.test(t));
          // afterOn[0] = climb limit weight, afterOn[1] = temp (integer), afterOn[2..] = per-runway weights
          if (afterOn.length >= 2) {
            const climbLim = parseFloat(afterOn[0]);
            if (!isNaN(climbLim) && !climbLimitFound) {
              result.climbLimitWt = climbLim.toFixed(1);
              climbLimitFound = true;
            }
            // Map runway values — afterOn[2] onwards align with rwyHeaders[0], [1], ...
            const rwyVals = afterOn.slice(2);
            rwyHeaders.forEach((rwy, i) => {
              if (i < rwyVals.length && !rwyLimitMap[rwy]) {
                const v = parseFloat(rwyVals[i]);
                if (!isNaN(v)) rwyLimitMap[rwy] = v.toFixed(1);
              }
            });
            // Stop after first data row (flap 05 / first ON row has the primary values)
            if (climbLimitFound && Object.keys(rwyLimitMap).length) break;
          }
        }
      }
    }

    // Attach runway limit weights back to each runway object
    if (Object.keys(rwyLimitMap).length && runways.length) {
      runways.forEach(r => {
        // Match exact rwy ID, then try base without X suffix (e.g. 27RX → 27R)
        const val = rwyLimitMap[r.rwy] || rwyLimitMap[r.rwy.replace(/X$/,'')];
        if (val) r.rwyLimitWt = val;
      });
      result.runways = JSON.stringify(runways);
    }
  }

  return result;
}

</script>
