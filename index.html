<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flight">
<meta name="theme-color" content="#0a0c0f">
<title>Flight Plan</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0c0f;--surf:#111318;--surf2:#181c22;--surf3:#1e2530;
  --border:#1e2530;--border2:#2a3340;
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
  --blue:#3b82f6;--blue-l:#1e3a5f;--blue-ll:#0d1f35;
  --green:#10b981;--green-l:#0d3d2e;
  --amber:#f59e0b;--amber-l:#3d2a08;
  --purple:#a855f7;--purple-l:#2d1a4a;
  --red:#ef4444;--red-l:#3d1414;
  --teal:#14b8a6;--teal-l:#0d332f;
  --pink:#ec4899;--pink-l:#3d1229;
  --radius:10px;--radius-sm:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
body.light{
  --bg:#F5F4F0;--surf:#FFFFFF;--surf2:#F1EFE8;--surf3:#E8E6DF;
  --border:#E2DFD6;--border2:#D3D0C7;
  --text:#1A1A18;--text2:#5F5E5A;--text3:#9CA39A;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-ll:#B5D4F4;
  --green:#3B6D11;--green-l:#EAF3DE;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --teal:#0F6E56;--teal-l:#E1F5EE;
  --pink:#993556;--pink-l:#FBEAF0;
}
html,body{height:100%;height:100dvh;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:10px;overflow:hidden;position:fixed;width:100%}

/* ── Layout ── */
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,0px);padding-bottom:0;box-sizing:border-box;overflow:hidden}
#header{flex-shrink:0;padding:5px 12px 4px;background:var(--surf);border-bottom:1px solid var(--border)}
#content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:5px 8px 12px}
#nav{flex-shrink:0;display:flex;background:var(--surf);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0px)}

/* ── Portrait layout overrides ── */
@media (orientation:portrait){
  #content{padding:4px 6px 16px}
  .card{margin-bottom:6px}
  .hdr-title{font-size:15px}
  #clock-local{font-size:16px!important}
  #clock-pdt{font-size:13px!important}
  .mode-btn{font-size:12px;padding:5px 2px}
}

/* ── Header ── */
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.mode-row{display:flex;gap:5px;margin-top:5px}
.mode-btn{flex:1;padding:4px 4px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mode-btn.active{background:var(--blue-ll);border-color:var(--blue);color:var(--blue)}

/* ── Nav ── */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border:none;background:none;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;gap:3px;letter-spacing:0.3px;text-transform:uppercase}
.nav-btn svg{width:18px;height:18px}
.nav-btn.active{color:var(--blue)}

/* ── Cards ── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--border)}
.card-hdr-left{display:flex;align-items:center;gap:8px}
.card-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.card-title{font-size:13px;font-weight:600}
.card-time{font-size:13px;color:var(--text2);font-family:'SF Mono',monospace}

/* ── Task rows ── */
.task{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.task:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done svg{display:block}
.task-check svg{display:none;width:12px;height:12px}
.task-body{flex:1;min-width:0}
.task-label{font-size:13px;font-weight:500;line-height:1.3}
.task-label.done{opacity:.4;text-decoration:line-through}
.task-sub{font-size:13px;color:var(--text2);margin-top:2px;line-height:1.4}
.task-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;white-space:nowrap}

/* ── Progress bar ── */
.progress-wrap{padding:10px 14px 12px;background:var(--surf2)}
.progress-row{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-label{font-size:13px;color:var(--text2)}
.progress-val{font-size:13px;font-weight:600;color:var(--green)}
.progress-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* ── Workout ── */
.ex-group{margin-bottom:6px}
.ex-group-hdr{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:8px 14px 4px}
.ex-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-name{flex:1;font-size:13px;font-weight:500}
.ex-sets{font-size:10px;color:var(--blue);font-weight:600;font-family:'SF Mono',monospace;white-space:nowrap}
.ex-log{display:flex;gap:6px;align-items:center}
.ex-input{width:52px;padding:4px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:10px;text-align:center;font-family:'SF Mono',monospace}
.ex-x{font-size:13px;color:var(--text3)}
.ex-cue{font-size:10px;color:var(--text3);padding:2px 14px 6px;line-height:1.4}

/* ── Layover ── */
.tz-bar{display:flex;gap:1px;margin-bottom:8px}
.tz-block{flex:1;background:var(--surf2);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.tz-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.tz-time{font-family:'SF Mono',monospace;font-size:18px;font-weight:700}
.tz-body{font-size:10px;color:var(--text2);margin-top:2px}
.tz-bar .tz-block:first-child{border-top-right-radius:0;border-bottom-right-radius:0}
.tz-bar .tz-block:last-child{border-top-left-radius:0;border-bottom-left-radius:0}

.timeline-item{display:flex;gap:12px;padding:8px 0;position:relative}
.tl-time{width:80px;flex-shrink:0;text-align:right}
.tl-local{font-size:13px;font-weight:600;font-family:'SF Mono',monospace}
.tl-pdt{font-size:10px;color:var(--text3);font-family:'SF Mono',monospace}
.tl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:3px}
.tl-body{flex:1}
.tl-title{font-size:13px;font-weight:600;line-height:1.3}
.tl-sub{font-size:13px;color:var(--text2);margin-top:2px;line-height:1.4}
.tl-line{width:1px;background:var(--border2);position:absolute;left:92px;top:22px;bottom:-8px}
.timeline-item:last-child .tl-line{display:none}
.alert-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.alert-time-input{padding:4px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:12px;font-family:'SF Mono',monospace;width:90px}
.alert-label{font-size:12px;color:var(--text2);flex:1}
.alert-toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .15s}
.alert-toggle.on{background:var(--blue)}
.alert-toggle.off{background:var(--border2)}
.alert-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;transition:left .15s}
.alert-toggle.on::after{left:18px}
.alert-toggle.off::after{left:2px}

/* ── Bloodwork ── */
.bw-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)}
.bw-row:last-child{border-bottom:none}
.bw-name{flex:1;font-size:13px;font-weight:500}
.bw-range{font-size:13px;color:var(--text3);margin-right:8px}
.bw-val{font-family:'SF Mono',monospace;font-size:13px;font-weight:600;width:70px;text-align:right}
.bw-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:6px}
.bw-input{width:70px;padding:3px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:12px;font-family:'SF Mono',monospace;text-align:right}

/* ── Section label ── */
.section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 6px}

/* ── Macro bar ── */
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.macro-cell{background:var(--surf2);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.macro-val{font-size:16px;font-weight:700;font-family:'SF Mono',monospace}
.macro-label{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ── Notification banner ── */
#notif-banner{background:var(--blue-ll);border:1px solid var(--blue);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;display:none}
#notif-banner.show{display:block}
.notif-title{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:2px}
.notif-sub{font-size:13px;color:var(--text2)}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}

/* ── Utilities ── */
.flex-row{display:flex;align-items:center;gap:8px}
.spacer{flex:1}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.mt8{margin-top:8px}
/* Normalize select height to match text inputs across all browsers/iOS */
select{-webkit-appearance:none;appearance:none;height:auto;line-height:normal}

</style>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('Protocol app updated');
          }
        });
      });
    })
    .catch(err => console.log('SW registration failed:', err));
}
</script>
</head>
<body>
<div id="app">
<div id="offline-bar" style="display:none;background:var(--amber-l);border-bottom:1px solid var(--amber);padding:6px 16px;font-size:13px;color:var(--amber);font-weight:600;text-align:center">
  OFFLINE MODE — all data saved locally
</div>
<div id="header">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">777 Flight</div>
      <div id="date-display" style="font-size:13px;color:var(--text2);margin-top:1px"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="theme-toggle" onclick="toggleTheme()" style="background:var(--surf2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap">Light</button>
      <div class="hdr-time">
        <div id="clock-local" style="font-size:18px;font-weight:700;font-family:'SF Mono',monospace"></div>
        <div id="clock-pdt" style="font-size:18px;color:var(--text3)"></div>
      </div>
    </div>
  </div>
  <div class="mode-row">
    <div class="mode-btn active" onclick="setMode('preflight')" id="btn-preflight">Preflight</div>
    <div class="mode-btn" onclick="setMode('flight')" id="btn-flight">Flight</div>
    <div class="mode-btn" onclick="setMode('arrival')" id="btn-arrival">Arrival</div>
  </div>
</div>

<div id="content"></div>

<div id="nav">
  <button class="nav-btn active" id="nav-flight" onclick="setTab('flight')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .99h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
    Flight
  </button>
  <button class="nav-btn" id="nav-layover" onclick="setTab('layover')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16l-9-9-9 9"/><path d="M12 7v14"/><path d="M5 21h14"/></svg>
    Layover
  </button>
</div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
// Numeric month lookup used by the CCI date parser
const MONTH_NUM = {JAN:'01',FEB:'02',MAR:'03',APR:'04',MAY:'05',JUN:'06',JUL:'07',AUG:'08',SEP:'09',OCT:'10',NOV:'11',DEC:'12'};

let mode = 'preflight';
let tab = 'flight';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem('protocol_state') || '{}'); } catch(e) { state = {}; }
  if (!state.checks) state.checks = {};
  if (!state.weights) state.weights = {};
  if (!state.alerts) state.alerts = {};
  if (!state.layover) state.layover = { tz: 'Europe/London', tzName: 'London BST' };
  if (!state.flight) state.flight = {};
  if (state.theme === 'light') applyTheme('light');
}

function toggleTheme() {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  applyTheme(next);
  state.theme = next;
  saveState();
}

function applyTheme(t) {
  const btn = document.getElementById('theme-toggle');
  if (t === 'light') {
    document.body.classList.add('light');
    if (btn) btn.textContent = 'Dark';
  } else {
    document.body.classList.remove('light');
    if (btn) btn.textContent = 'Light';
  }
}
function saveState() { localStorage.setItem('protocol_state', JSON.stringify(state)); }

function setMode(m) {
  mode = m;
  const mr = document.querySelector('.mode-row');
  if (mr) mr.style.display = 'flex';
  ['preflight','flight','arrival'].forEach(x => {
    const el = document.getElementById('btn-'+x); if(el) el.classList.toggle('active', x === m);
  });
  render();
}

function setTab(t) {
  tab = t;
  const modeRow = document.querySelector('.mode-row');
  if (modeRow) modeRow.style.display = t === 'layover' ? 'none' : 'flex';
  ['flight', 'layover'].forEach(x => {
    const el = document.getElementById('nav-'+x); if(el) el.classList.toggle('active', x===t);
  });
  render();
}

// ── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const day = DAYS[now.getDay()];
  const mon = MONTHS[now.getMonth()];
  document.getElementById('date-display').textContent = `${day}, ${mon} ${now.getDate()}`;

  const localH = String(now.getHours()).padStart(2,'0');
  const localM = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-local').textContent = `${localH}:${localM}`;

  const pdtOffset = -7 * 60;
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const pdt = new Date(utc + pdtOffset * 60000);
  const pdtH = String(pdt.getHours()).padStart(2,'0');
  const pdtM = String(pdt.getMinutes()).padStart(2,'0');
  const isSameDay = pdt.getDate() === now.getDate();
  document.getElementById('clock-pdt').textContent = `${pdtH}:${pdtM} PDT${isSameDay ? '' : ' (+1)'}`;
}

// ── Protocol data ──────────────────────────────────────────────────────────
const LAYOVER_TIMELINE = [
  { bst:'13:50', pdt:'05:50', color:'#3b82f6', title:'Hotel check-in', sub:'Scenario A (aircraft sleep): horizontal rest only — do NOT attempt to sleep\nScenario B (no aircraft sleep): 90-min timed nap — set TWO alarms', alertKey:'checkin' },
  { bst:'~14:00', pdt:'~06:00', color:'#a855f7', title:'SS-31 1mg + NMN 1g sublingual + BPC-157 (1 of 2)', sub:'Full protocol on waking doses · eat 40–50g protein · hydrate aggressively', alertKey:'waking_doses' },
  { bst:'~15:30', pdt:'~07:30', color:'#f59e0b', title:'[Scenario B] Force wake from nap', sub:'Get up immediately — do NOT snooze · cold water on face · stay upright · inertia clears in 10–15 min', alertKey:'nap_wake' },
  { bst:'17:00–18:00', pdt:'09:00–10:00', color:'#10b981', title:'Zone 2 outdoors 40–50 min', sub:'Optimal body-clock window · cortisol aligned · daylight exposure anchors home clock · NOT intervals', alertKey:'workout' },
  { bst:'~19:00', pdt:'~11:00', color:'#ec4899', title:'Hot shower 10–15 min', sub:'Core temp rebound targets 20:30 BST sleep onset · hot water drives core temp drop for sleep onset', alertKey:'shower' },
  { bst:'19:30–20:30', pdt:'11:30–12:30', color:'#14b8a6', title:'Protein meal + evening protocol', sub:'Frog Fuel x2 · BPC-157 (2 of 2) · Creatine 5g · Glycine 3g · L-Theanine 200mg · Apigenin 50mg · Turmeric 750mg', alertKey:'eve_protocol' },
  { bst:'20:30', pdt:'12:30', color:'#7c3aed', title:'SLEEP — target 7+ hours', sub:'Mag 400mg · blackout + eye mask + earplugs · alarm 04:00–04:15 BST · three sleep drivers aligned', alertKey:'sleep' },
  { bst:'04:00–04:15', pdt:'20:00 (prev)', color:'#f59e0b', title:'Wake — departure prep', sub:'Ostarine + SS-31 + NMN · light breakfast · leave hotel 06:00 BST', alertKey:'wake_depart' },
];

// ── Rendering ──────────────────────────────────────────────────────────────
function groupBy(arr, key) {
  const map = {};
  arr.forEach(item => {
    if (!map[item[key]]) map[item[key]] = [];
    map[item[key]].push(item);
  });
  return map;
}

// ── Init ────────────────────────────────────────────────────────────────────
function render() {
  const c = document.getElementById('content');
  if (tab === 'flight') {
    if (mode === 'preflight') renderPreflight(c);
    else if (mode === 'arrival') renderArrival(c);
    else { renderFlight(c); setTimeout(updateBreakCountdowns, 50); }
  }
  else if (tab === 'layover') renderLayover(c);
}

function renderLayover(c) {
  // Auto-sync layover city from the current flight's arrival airport
  if (!state.layover) state.layover = {};
  const activeFl = currentFlight();
  const arrICAO  = (activeFl.arrCity || '').toUpperCase();
  const ICAO_TO_CITY = {
    LHR:'London', LGW:'London', MAN:'London',
    NRT:'Tokyo',  HND:'Tokyo',
    ICN:'Incheon',
    SYD:'Sydney',
    AKL:'Auckland',
    JFK:'New York', EWR:'New York',
    MIA:'Miami',
    DFW:'Dallas',
    LAX:'Los Angeles',
    PHX:'Phoenix',
    CLT:'Charlotte',
  };
  const mappedCity = ICAO_TO_CITY[arrICAO];
  if (mappedCity && mappedCity !== state.layover.city) selectCity(mappedCity);
  const now = new Date();
  const pdtOffsetMin = -7 * 60;
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const pdt = new Date(utc + pdtOffsetMin * 60000);
  const lay = state.layover || {};
  const localOffsetMin = lay.localOffsetMin !== undefined ? lay.localOffsetMin : 60;
  const cityName  = lay.city    || 'London';
  const displayCity = cityName === 'Other' ? (lay.customCity || 'Other') : cityName;
  const tzLabel   = lay.tzLabel || 'BST';
  const checkinTime = lay.checkinTime || '';
  const checkinDate = lay.checkinDate || '';
  const pickupTime  = lay.pickupTime  || '';
  const pickupDate  = lay.pickupDate  || '';
  const localNow = new Date(utc + localOffsetMin * 60000);
  const fmt  = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const fmtD = d => DAYS[d.getDay()];
  const parseHHMM = s => { if (!s) return null; const [h,m] = s.split(':').map(Number); return isNaN(h) ? null : h*60+(m||0); };
  const minToHHMM = m => { const n=((m%1440)+1440)%1440; return `${String(Math.floor(n/60)).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`; };
  const checkinMin = parseHHMM(checkinTime);
  const pickupMin  = parseHHMM(pickupTime);
  const pdtDiff = localOffsetMin - pdtOffsetMin;
  const layoverMins = (checkinMin!==null && pickupMin!==null && checkinDate && pickupDate)
    ? Math.round((new Date(`${pickupDate}T${pickupTime}`) - new Date(`${checkinDate}T${checkinTime}`))/60000)
    : (checkinMin!==null && pickupMin!==null ? ((pickupMin-checkinMin+1440)%1440) : null);
  const layoverHrs = layoverMins!==null ? (layoverMins/60).toFixed(1) : '—';
  const checkinPDT = checkinMin!==null ? minToHHMM(checkinMin-pdtDiff) : '—';
  const pickupPDT  = pickupMin !==null ? minToHHMM(pickupMin -pdtDiff) : '—';
  const pdtOf = lm => lm!==null ? minToHHMM(lm-pdtDiff) : '—';
  // ══════════════════════════════════════════════════════════════════════════
  // CIRCADIAN TIMING ENGINE
  // Home clock: PDT (UTC-7 = -420 min). Usual bedtime: 22:00 PDT.
  // pdtDiff = localUTCoffset - homeOffset. Converts PDT target → local time:
  //   localTime = pdtTarget + pdtDiff
  //   pdtTime   = localTime - pdtDiff
  // ══════════════════════════════════════════════════════════════════════════

  const HOME_BED_PDT  = 22 * 60;       // 22:00 PDT — usual bedtime
  const HOME_WAKE_PDT = 6  * 60 + 30;  // 06:30 PDT — natural wake
  const HOME_WK_PDT   = 9  * 60;       // 09:00 PDT — peak cortisol/workout window
  const HOME_MEL_PDT  = 21 * 60;       // 21:00 PDT — melatonin onset, wind-down

  // pdtDiff: how many minutes ahead local is vs PDT
  // e.g. London BST (UTC+1): pdtDiff = 60-(-420) = 480 (8hrs ahead)
  // e.g. Tokyo (UTC+9):      pdtDiff = 540-(-420) = 960 (16hrs ahead)
  // e.g. Sydney (UTC+10):    pdtDiff = 600-(-420) = 1020 (17hrs ahead)
  // e.g. Auckland (UTC+12):  pdtDiff = 720-(-420) = 1140 (19hrs ahead)
  // e.g. NYC EDT (UTC-4):    pdtDiff = -240-(-420) = 180 (3hrs ahead)
  // e.g. PHX MST (UTC-7):    pdtDiff = -420-(-420) = 0

  // Direction: eastbound = destination is significantly east of PDT
  // Use >2hrs east of home as threshold (avoids misclassifying Dallas CDT etc.)
  const isEastbound  = pdtDiff > 120;
  const isWestbound  = pdtDiff < -60;  // rare — would be e.g. Hawaii layover
  const isSameZone   = !isEastbound && !isWestbound;
  const phaseShiftHrs = pdtDiff / 60;  // how many hours east of PDT

  // ── Pickup absolute minutes (offset from midnight of checkin day) ─────────
  const pickupAbs = (pickupMin !== null && checkinMin !== null)
    ? (() => {
        if (pickupDate && checkinDate) {

          return checkinMin + diff;
        }
        return pickupMin < checkinMin ? pickupMin + 1440 : pickupMin;
      })()
    : null;
  const wakeAbs = pickupAbs !== null ? pickupAbs - 60 : null;

  // ── Body clock time at checkin ────────────────────────────────────────────
  // What does the PDT body clock say when we arrive at the hotel?
  const checkinPDTmin = checkinMin !== null ? ((checkinMin - pdtDiff) % 1440 + 1440) % 1440 : null;

  // ── Sleep target calculation ──────────────────────────────────────────────
  // Strategy:
  //   Eastbound: Sleep at LOCAL night (~21:30–22:00 local) regardless of body clock.
  //     This is the strongest eastward phase-advance signal.
  //     Body clock will say afternoon — that's expected and correct.
  //     Each night sleeping at local time shifts the clock ~1-2hrs eastward.
  //   Westbound/same zone: Sleep at PDT bedtime translated to local.
  //     PDT 22:00 + pdtDiff → local time. For PHX return, that's just 22:00 local.
  //   Very long east layovers (>18hrs ahead, e.g. AKL, SYD):
  //     Body clock at checkin may already be near PDT night (e.g. 19:00-21:00 PDT).
  //     Allow earlier local sleep if body clock >18:00 PDT at checkin.

  const localSleepTarget = (() => {

      // For large phase shifts (>15hrs, e.g. Auckland, Sydney), body clock is closer
      // to PDT night at checkin — can sleep earlier local if needed

        // Use local 21:00 or PDT-bed-local, whichever is later (but not past 23:30)
        const target = Math.max(21*60, Math.min(pdtBedLocal % 1440, 23*60+30));

    } else if (isWestbound) {
      // Westbound: PDT bedtime in local time
      return ((HOME_BED_PDT + pdtDiff) % 1440 + 1440) % 1440;
    } else {
      // Same zone: PDT bedtime directly
      return HOME_BED_PDT;

  let html = '';

function setLayover(key, val) {
  if (!state.layover) state.layover = {};
  state.layover[key] = val;
  saveState();
  render();
}

function setLayoverCity(val) {
  // Save city name without triggering a full re-render (avoids focus loss)
  if (!state.layover) state.layover = {};
  state.layover.customCity = val;
  try { localStorage.setItem('protocol_state', JSON.stringify(state)); } catch(e) {}
}

function lookupCityTZ(cityName) {
  if (!cityName || cityName.length < 2) return;
  const statusEl = document.getElementById('tz-lookup-status');
  if (statusEl) statusEl.textContent = 'Looking up ' + cityName + '...';

  // Try to find timezone using the worldtimeapi
  fetch('https://worldtimeapi.org/api/timezone')
    .then(r => r.json())
    .then(zones => {
      // Search for a zone matching the city name
      const q = cityName.toLowerCase().replace(/\s+/g, '_');
      const match = zones.find(z => z.toLowerCase().includes('/' + q)) ||
                    zones.find(z => z.toLowerCase().includes(q));
      if (!match) {
        // Fall back to Intl-based offset detection for the city
        return lookupCityTZFallback(cityName);
      }
      return fetch('https://worldtimeapi.org/api/timezone/' + match)
        .then(r => r.json())
        .then(data => {
          const rawOffset = data.utc_offset || '+00:00';
          const sign = rawOffset[0] === '-' ? -1 : 1;
          const parts = rawOffset.replace(/[+-]/, '').split(':');
          const offsetMin = sign * (parseInt(parts[0]) * 60 + parseInt(parts[1] || 0));
          const abbrev = data.abbreviation || rawOffset;
          setLayover('localOffsetMin', offsetMin);
          setLayover('tzLabel', abbrev);
          setLayover('tzLookupStatus', match + ' · ' + abbrev + ' UTC' + rawOffset);
          saveState(); render();
        });
    })
    .catch(() => lookupCityTZFallback(cityName));
}

function lookupCityTZFallback(cityName) {
  // Use Intl to detect offset — try common IANA zone guesses
  const guesses = [
    'Asia/' + cityName.replace(/ /g,'_'),
    'Europe/' + cityName.replace(/ /g,'_'),
    'America/' + cityName.replace(/ /g,'_'),
    'Pacific/' + cityName.replace(/ /g,'_'),
    'Australia/' + cityName.replace(/ /g,'_'),
    'Africa/' + cityName.replace(/ /g,'_'),
  ];
  for (const tz of guesses) {
    try {
      const now = new Date();
      const fmt = new Intl.DateTimeFormat('en', { timeZone: tz, timeZoneName: 'short', hour: 'numeric', hour12: false });
      const parts = fmt.formatToParts(now);
      const tzName = (parts.find(p => p.type === 'timeZoneName') || {}).value || '';
      const offsetMs = now.getTime() - new Date(now.toLocaleString('en-US', { timeZone: tz })).getTime();
      const offsetMin = -Math.round(offsetMs / 60000);
      setLayover('localOffsetMin', offsetMin);
      setLayover('tzLabel', tzName);
      setLayover('tzLookupStatus', tz + ' · ' + tzName);
      saveState(); render(); return;
    } catch(e) {}
  }
  // Nothing found
  const el = document.getElementById('tz-lookup-status');
  if (el) el.textContent = 'City not found — set TZ and offset manually';
}

function selectCity(cityVal) {
  const presets = {
    'London':   { offset: 60,   tz: 'BST'  },
    'Sydney':   { offset: 600,  tz: 'AEST' },
    'Tokyo':    { offset: 540,  tz: 'JST'  },
    'Incheon':  { offset: 540,  tz: 'KST'  },
    'Auckland': { offset: 720,  tz: 'NZST' },
    'New York': { offset: -240, tz: 'EDT'  },
    'Dallas':   { offset: -300, tz: 'CDT'  },
    'Miami':    { offset: -240, tz: 'EDT'  },
  };
  if (!state.layover) state.layover = {};
  state.layover.city = cityVal;
  if (presets[cityVal]) {
    state.layover.localOffsetMin = presets[cityVal].offset;
    state.layover.tzLabel = presets[cityVal].tz;
  }
  saveState();
  render();
}

function captureLocalTime(prefix) {
  const lay = state.layover || {};
  const localOffsetMin = lay.localOffsetMin !== undefined ? lay.localOffsetMin : 60;
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const ln = new Date(utc + localOffsetMin * 60000);
  const h = String(ln.getHours()).padStart(2,'0');
  const m = String(ln.getMinutes()).padStart(2,'0');
  const yyyy = ln.getFullYear();
  const mm   = String(ln.getMonth()+1).padStart(2,'0');
  const dd   = String(ln.getDate()).padStart(2,'0');
  setLayover(prefix+'Time', `${h}:${m}`);
  setLayover(prefix+'Date', `${yyyy}-${mm}-${dd}`);
}

function toggleAlert(key) {
  state.alerts[key] = state.alerts[key] === false ? true : false;
  saveState();
  scheduleNotifications();
  render();
}
function setAlertTime(key, val) {
  state.alerts[key+'_time'] = val;
  saveState();
  scheduleNotifications();
}

function scheduleNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    // Web notifications require service worker for delayed delivery
    // Show a confirmation that alerts are set
    const count = Object.keys(state.alerts).filter(k => !k.endsWith('_time') && state.alerts[k] !== false && state.alerts[k+'_time']).length;
    if (count > 0) {
      const b = document.getElementById('notif-banner');
      if (b) { b.classList.add('show'); b.querySelector('.notif-sub').textContent = `${count} alert${count>1?'s':''} configured · times set in BST`; }
    }
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

    const isAtlantic=atlanticPorts.some(p=>dep===p||arr===p);
    const isPacific =pacificPorts.some(p=>dep===p||arr===p);
    const pages = isAtlantic ? EUROPE_PAGES : (isPacific ? PACIFIC_PAGES : EUROPE_PAGES);
    pages.forEach(url => {
      const img = new Image();
      img.src = url; // browser caches the image silently
    });
  } catch(e) {}
}

    const atow = fl.atow||'—';
    const thrust= fl.perf1||'—';
    const eprVal= fl.epr||'—';
    const eprLbl= ac==='777-300ER'?'N1':'EPR';
    const flaps = fl.flaps||'—';
    const acPackBrief = 'A/C '+(fl.acPack||'OFF');
    const rwy   = fl.rwy||'—';
    const dry   = fl.perf2||'DRY';
    const ws    = fl.windSpd||'0';
    const wDir  = windCalc.hw>=0?'Headwind':'Tailwind';
    const oat   = fl.temp||'—';
    const planT = fl.plannedTemp||'—';
    const tempComp = isMax
      ? ((parseInt(fl.temp)||0) > (parseInt(fl.plannedTemp)||0) ? 'above' : (parseInt(fl.temp)||0) < (parseInt(fl.plannedTemp)||0) ? 'below' : 'equal to')
      : ((parseInt(fl.temp)||0) > (parseInt(fl.perf3)||0) ? 'above' : (parseInt(fl.temp)||0) < (parseInt(fl.perf3)||0) ? 'below' : 'equal to');
    const assumedTemp = fl.perf3||'—';

    // Altitude values + NADP auto-detect
    const eoAccel = fl.eoAccel||'';
    const accelHt = fl.accelHt||'';
    const thrRed  = fl.thrRed||'';
    const eoAccelMsl = fl.eoAccelMsl||'';
    const isNadp1 = eoAccel==='800' && accelHt==='1500' && thrRed==='3000';
    const isNadp2 = eoAccel==='800' && accelHt==='1000' && thrRed==='1000';
    const nadpLabel = isNadp1 ? 'NADP 1' : isNadp2 ? 'NADP 2' : 'NADP';
    const altLine = 'EO Accel ' + (eoAccel||'—') + ', Accel Ht ' + (accelHt||'—') + ', Thr Reduction ' + (thrRed||'—');
    const mslLine = eoAccelMsl ? 'EO Accel Alt ' + eoAccelMsl + ' MSL' : '';

    const mtow    = parseFloat(fl.mtow1) || 0;
    const acwtNum = parseFloat(acwt) || 0;
    const mtowComp  = acwtNum > mtow ? 'Above' : 'Below';
    const mtowDiffK = mtow > 0 ? (Math.round((acwtNum - mtow) * 10) / 10).toFixed(1) : null;

    // vs assumed/planned takeoff weight
    const towRef    = isMax ? (parseFloat(ptow)||0) : (parseFloat(atow)||0);
    const towLabel  = isMax ? 'Planned' : 'Assumed';
    const towVal    = isMax ? ptow : atow;
    const towDiff   = Math.abs(acwtNum - towRef);
    const towHundreds = Math.round(towDiff * 10); // diff in hundreds of lbs (thousands * 10)
    const towComp   = acwtNum > towRef ? 'above' : 'below';

    const wtLine1 = mtow > 0
      ? 'We closed out at ' + acwt + ', which is ' + mtowComp + ' the max takeoff weight of ' + fl.mtow1 + '.'
      : 'We closed out at ' + acwt + '.';
    const towDiffK = (Math.round(towDiff * 10) / 10).toFixed(1);
    const wtLine2 = towRef > 0
      ? towDiffK + ' thousand pounds ' + towComp + ' the ' + towLabel + ' takeoff weight of ' + towVal + '.'
      : 'Dispatch weight vs planned takeoff weight: not set.';

    const lines = isMax ? [
      'ZFW and CG is checked.',
      wtLine1,
      wtLine2,
      'Winds are ' + wDir + ' of ' + ws + ' knots.',
      'OAT is ' + oat + '°C, which is ' + tempComp + ' the planned temperature, for Runway ' + rwy + ' ' + dry.toUpperCase() + '.',
      'Max Power, Planned Temp ' + planT + '°C, ' + eprLbl + ' of ' + eprVal + '.',
      'Flaps ' + flaps + ', ' + acPackBrief + ', ' + nadpLabel,
      altLine,
      ...(mslLine ? [mslLine] : []),
      'Restricted Articles, Live Animals, and Security checked.'
    ] : [
      'ZFW and CG is checked.',
      wtLine1,
      wtLine2,
      'Winds are ' + wDir + ' of ' + ws + ' knots.',
      'OAT is ' + oat + '°C, which is ' + tempComp + ' the assumed temperature of ' + assumedTemp + '°C, for Runway ' + rwy + ' ' + dry.toUpperCase() + '.',
      thrust + ' Power, Assumed Temp ' + assumedTemp + '°C, ' + eprLbl + ' of ' + eprVal + '.',
      'Flaps ' + flaps + ', ' + acPackBrief + ', ' + nadpLabel,
      altLine,
      ...(mslLine ? [mslLine] : []),
      'Restricted Articles, Live Animals, and Security checked.'
    ];

    const isLight=document.body.classList.contains('light');
    const wtAlert = mtow > 0 && acwtNum > mtow;  // Disp Wt exceeds MTOW
    const tempAlert = isMax ? (parseInt(fl.temp)||0) > (parseInt(fl.plannedTemp)||0) : (parseInt(fl.temp)||0) > (parseInt(fl.perf3)||0);
    const anyAlert = wtAlert || tempAlert;
    const pop=document.createElement('div'); pop.id='tkoff-brief';
    pop.style.cssText='position:fixed;top:60px;left:12px;z-index:9999;background:'+(anyAlert?'var(--red-l)':'var(--surf)')+';border:2px solid '+(anyAlert?'var(--red)':'var(--blue)')+';border-radius:14px;padding:18px 20px;max-width:360px;width:calc(100% - 32px);box-shadow:0 6px 32px rgba(0,0,0,0.5)';

    const ttl=document.createElement('div');
    ttl.style.cssText='font-size:13px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px;text-align:center';
    ttl.textContent='Takeoff Brief — ' + (fl.flightNum?'AA '+fl.flightNum:'');
    pop.appendChild(ttl);

    lines.forEach((line,i) => {
      const d=document.createElement('div');
      const isWtLine = (i===1 || i===2) && wtAlert;
      const isTempLine = i===4 && tempAlert;
      const lineAlert = isWtLine || isTempLine;
      d.style.cssText='font-size:13px;color:'+(lineAlert?'var(--red)':'var(--text)')+';font-weight:'+(lineAlert?'700':'400')+';line-height:1.6;padding:6px 0;'+(i<lines.length-1?'border-bottom:1px solid var(--border)':'');
      d.textContent=line;
      pop.appendChild(d);
    });

    const dismissBtn=document.createElement('button'); dismissBtn.textContent='Dismiss';
    dismissBtn.style.cssText='width:100%;margin-top:14px;padding:10px;border-radius:8px;border:1px solid var(--blue);background:transparent;color:var(--blue);font-size:13px;font-weight:600;cursor:pointer';
    dismissBtn.addEventListener('click',()=>pop.remove());
    pop.appendChild(dismissBtn);
    document.body.appendChild(pop);
  });
  btnRow.appendChild(rgBtn);
  btnRow.appendChild(dnBtn);
  btnRow.appendChild(fbBtn);
  btnRow.appendChild(tbBtn);
  inner.appendChild(btnRow);

  // ── Route card ─────────────────────────────────────────────────────────────
  const routeFull = (fl.route || '').trim();
  const routeCard = document.createElement('div');
  routeCard.className = 'card';
  routeCard.style.cssText = 'margin-bottom:5px;flex-shrink:0';

  const routeHdr = document.createElement('div');
  routeHdr.className = 'card-hdr';
  const routeHdrLeft = document.createElement('div');
  routeHdrLeft.className = 'card-hdr-left';
  const routeDot = document.createElement('div');
  routeDot.className = 'card-dot';
  routeDot.style.background = 'var(--teal)';
  const routeTitle = document.createElement('div');
  routeTitle.className = 'card-title';
  routeTitle.textContent = 'Route';
  routeHdrLeft.appendChild(routeDot);
  routeHdrLeft.appendChild(routeTitle);
  routeHdr.appendChild(routeHdrLeft);
  if (routeFull) {
    const fixCount = document.createElement('div');
    fixCount.style.cssText = 'font-size:10px;font-weight:600;color:var(--text3)';
    fixCount.textContent = routeFull.split(' ').length + ' fixes';
    routeHdr.appendChild(fixCount);
  }
  routeCard.appendChild(routeHdr);

  const routeBody = document.createElement('div');
  routeBody.style.cssText = 'padding:8px 14px';
  const routeText = document.createElement('div');
  routeText.style.cssText = 'font-family:SF Mono,monospace;font-size:11px;color:' + (routeFull ? 'var(--text2)' : 'var(--text3)') + ';line-height:1.7;word-break:break-all;' + (routeFull ? '' : 'font-style:italic');
  routeText.textContent = routeFull || 'No route loaded — paste flight plan to populate';
  routeBody.appendChild(routeText);
  routeCard.appendChild(routeBody);
  c.appendChild(routeCard);
  // ── end route card ──────────────────────────────────────────────────────────

  // Run PTOW check on load in case value already over limit
  checkPTOW();
}

// ── ATIS fetch ───────────────────────────────────────────────────────────────
function fetchATIS(icao, atisSel, wdSel, wsSel, tempInp, rawDiv) {
  if (!icao) { alert('Select a departure city first'); return; }
  const ICAO_MAP = {PHX:'KPHX',LAX:'KLAX',DFW:'KDFW',CLT:'KCLT',JFK:'KJFK',MIA:'KMIA',LHR:'EGLL',NRT:'RJAA',HND:'RJTT',SYD:'YSSY',AKL:'NZAA',ICN:'RKSI'};
  const icaoCode = ICAO_MAP[icao] || icao;
  if (rawDiv) { rawDiv.style.display = 'block'; rawDiv.textContent = 'Fetching...'; }

  const parseAndFill = (text) => {
    if (rawDiv) rawDiv.textContent = text;
    setFlight('atisRaw', text);
    // Information letter
    const infoMatch = text.match(/INFORMATION\s+([A-Z])\b/i) || text.match(/\bINFO\s+([A-Z])\b/i);
    if (infoMatch && atisSel && atisSel.options) { setFlight('atis', infoMatch[1].toUpperCase()); Array.from(atisSel.options).forEach(o=>{ o.selected = o.value===infoMatch[1].toUpperCase(); }); }
    // Wind: 27015KT or WIND 270/15, with optional gust G25
    const windMatch = text.match(/(\d{3})(\d{2,3})(?:G(\d{2,3}))?KT/i) || text.match(/(?:WIND\s+)(\d{3})\/(\d{1,3})/i);
    if (windMatch) {
      const dir = windMatch[1].padStart(3,'0');
      const spd = String(parseInt(windMatch[2]));
      const gust = windMatch[3] ? String(parseInt(windMatch[3])) : '';
      setFlight('windDir',dir);
      if (wdSel && wdSel.options) Array.from(wdSel.options).forEach(o=>{ o.selected=o.value===dir; });
      setFlight('windSpd',spd);
      if (wsSel && wsSel.options) Array.from(wsSel.options).forEach(o=>{ o.selected=o.value===spd; });
      if (gust) setFlight('windGust', gust);
    }
    // Temp/dew: 20/10 or M02/M05
    const tempMatch = text.match(/\b(M?-?\d{1,2})\/M?-?\d{1,2}\b/i);
    if (tempMatch) {
      const t = tempMatch[1].replace('M','-');
      setFlight('temp', t);
      if (tempInp) tempInp.value = t;
    }
    // QNH: A2992 or Q1013
    const qnhM = text.match(/\bA(\d{4})\b/) || text.match(/\bQ(\d{4})\b/);
    if (qnhM) {
      const qnh = qnhM[0][0]==='A' ? (parseInt(qnhM[1])/100).toFixed(2) : qnhM[1];
      setFlight('qnh', qnh);
    }
  };

  // Source cascade: atisrelay.com → atis.guru → datis.clowd.io → corsproxy METAR → direct METAR
  const relayUrl  = 'https://www.atisrelay.com/api/atis/' + icaoCode;
  const guruUrl   = 'https://api.atis.guru/v1/stations/' + icaoCode;
  const datisUrl  = 'https://datis.clowd.io/api/' + icaoCode;
  const metarBase = 'https://aviationweather.gov/api/data/metar?ids=' + icaoCode + '&format=json&taf=false';
  const proxyUrl  = 'https://corsproxy.io/?' + encodeURIComponent(metarBase);

  const tryMetar = () => {
    fetch(proxyUrl)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const m=Array.isArray(data)?data[0]:data; const raw=m&&(m.rawOb||m.raw_text)||''; if(!raw) throw new Error(); parseAndFill('(METAR) '+raw); })
      .catch(() => {
        fetch(metarBase)
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(data => { const m=Array.isArray(data)?data[0]:data; const raw=m&&(m.rawOb||m.raw_text)||''; if(raw) parseAndFill('(METAR) '+raw); else throw new Error(); })
          .catch(() => { if (rawDiv) rawDiv.textContent = 'Could not fetch — enter manually'; });
      });
  };

  const tryDatis = () => {
    fetch(datisUrl)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const a=Array.isArray(data)?data[0]:data; const t=a.datis||a.text||''; if(!t) throw new Error(); parseAndFill(t); })
      .catch(() => tryMetar());
  };

  const tryGuru = () => {
    fetch(guruUrl)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => { const entry=Array.isArray(data)?data[0]:data; const text=entry.atis||entry.text||entry.atis_raw||''; if(!text) throw new Error(); parseAndFill(text); })
      .catch(() => tryDatis());
  };

  fetch(relayUrl)
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      const text = data.atis || data.text || data.raw || (Array.isArray(data.atis_body)?data.atis_body.join(' '):'') || '';
      if (!text) throw new Error();
      parseAndFill(text);
    })
    .catch(() => tryGuru());
}



function renderFlight(c) {
const now = new Date();
  const utcOffset = -7 * 60; // PDT
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const pdt = new Date(utc + utcOffset * 60000);
  const fmt = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

  // Multi-flight slot management
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const fl = currentFlight();
  const flightIdx = state.flightIdx;
  const totalFlights = state.flights.length;
  const depCity    = fl.depCity    || 'PHX';
  const arrCity    = fl.arrCity    || 'LHR';
  const depDate    = fl.depDate    || '';
  const depTime    = fl.depTime    || '';
  const arrDate    = fl.arrDate    || '';
  const arrTime    = fl.arrTime    || '';
  const wakeTime   = fl.wakeTime   || '';
  const break2Time  = fl.break2Time  || '';
  const break3Time  = fl.break3Time  || '';
  const break4Time  = fl.break4Time  || '';
  const crewRest   = fl.crewRest   || '';
  const notes      = fl.notes      || '';

  const depObj = CITY_LIST.find(x=>x.v===depCity) || CITY_LIST[0];
  const arrObj = CITY_LIST.find(x=>x.v===arrCity) || CITY_LIST[6];
  const depOff = depObj.off;
  const arrOff = arrObj.off;
  const arrTZ  = arrObj.tz;
  const pdtOff  = -7 * 60;

  const parseHHMM = s => { if (!s) return null; const [h,m]=s.split(':').map(Number); return isNaN(h)?null:h*60+(m||0); };
  const minToHHMM = m => { const n=((m%1440)+1440)%1440; return `${String(Math.floor(n/60)).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`; };
  const toUTC = (localMin, offsetMin) => ((localMin - offsetMin) % 1440 + 1440) % 1440;
  const fromUTC = (utcMin, offsetMin) => ((utcMin + offsetMin) % 1440 + 1440) % 1440;

  const depMin  = parseHHMM(depTime);
  const arrMin  = parseHHMM(arrTime);
  const wakeMin   = parseHHMM(wakeTime);
  const break2Min = parseHHMM(break2Time);
  const break3Min = parseHHMM(break3Time);
  const break4Min = parseHHMM(break4Time);

  const depUTC  = depMin  !== null ? toUTC(depMin,  depOff) : null;
  const arrUTC  = arrMin  !== null ? toUTC(arrMin,  arrOff) : null;
  const wakeUTC   = wakeMin   !== null ? wakeMin   : null;
  const break2UTC = break2Min !== null ? break2Min : null;
  const break3UTC = break3Min !== null ? break3Min : null;
  const break4UTC = break4Min !== null ? break4Min : null;

  const depPDT  = depUTC  !== null ? fromUTC(depUTC,  pdtOff) : null;
  const arrPDT  = arrUTC  !== null ? fromUTC(arrUTC,  pdtOff) : null;
  const wakePDT   = wakeUTC   !== null ? fromUTC(wakeUTC,   pdtOff) : null;
  const break2PDT = break2UTC !== null ? fromUTC(break2UTC, pdtOff) : null;
  const break3PDT = break3UTC !== null ? fromUTC(break3UTC, pdtOff) : null;
  const break4PDT = break4UTC !== null ? fromUTC(break4UTC, pdtOff) : null;

  const flightMins = (depDate && arrDate && depMin !== null && arrMin !== null)
    ? Math.round((new Date(`${arrDate}T${arrTime}`) - new Date(`${depDate}T${depTime}`))/60000) - arrOff + depOff
    : null;
  const flightNeg = flightMins !== null && flightMins < 0;
  const flightHrs = flightMins !== null
    ? (flightNeg ? `CHECK DATE — negative result (${Math.floor(flightMins/60)}h ${Math.abs(flightMins%60)}m)` : `${Math.floor(flightMins/60)}h ${Math.abs(flightMins%60)}m`)
    : '—';

  // IDL crossing detection — Pacific routes from US West/East
  const IDL_PAC = ['AKL','SYD','NRT','HND'];
  const IDL_US  = ['LAX','PHX','DFW','JFK','CLT','MIA'];
  const idlNote = (() => {
    if (!depDate) return null;
    if (IDL_PAC.includes(arrCity) && IDL_US.includes(depCity)) {
      const days = (arrCity === 'AKL' || arrCity === 'SYD') ? '+2 days' : '+1 or +2 days';
      return { dir:'westbound', note:`Crosses IDL — arrival is ${days} local at ${arrCity}. Ensure arrival date reflects local ${arrCity} date.` };
    }
    if (IDL_PAC.includes(depCity) && (IDL_US.includes(arrCity) || arrCity === 'LHR')) {
      return { dir:'eastbound', note:`Crosses IDL eastbound — arrival may be same calendar day or a day earlier local at ${arrCity}. Arrival date should reflect local ${arrCity} date.` };
    }
    return null;
  })();

  const localNow = new Date(utc + depOff * 60000);
  const arrNow   = new Date(utc + arrOff * 60000);

  const INPUT = (type, val, key, style='') => {
    if (type === 'time') {
      return `<input type="text" value="${val}" placeholder="HH:MM"
        inputmode="numeric" maxlength="5"
        style="padding:8px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:13px;min-height:36px;font-family:'SF Mono',monospace;${style}"
        oninput="fmtTime(this)"
        onchange="if(validTime(this.value))setFlight('${key}',this.value)">`;
    }
    return `<input type="${type}" value="${val}" style="padding:8px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:13px;min-height:36px;${style}" onchange="setFlight('${key}',this.value)">`;
  };

  let html = '';

  // ── Flight slot navigation ───────────────────────────────────────────────
  const depLabel = fl.depCity && fl.depDate ? `${fl.depCity} → ${fl.arrCity || '?'} · ${fl.depDate}` : `Flight ${flightIdx + 1}`;
  html += `<div style="display:flex;align-items:center;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden">
    <button onclick="shiftFlight(-1)" style="background:none;border:none;border-right:1px solid var(--border);padding:10px 14px;cursor:pointer;color:${flightIdx===0?'var(--text3)':'var(--text)'};font-size:12px;line-height:1;flex-shrink:0" ${flightIdx===0?'disabled':''}>&#8592;</button>
    ${fl.flightNum ? `<div style="padding:6px 12px;border-right:1px solid var(--border);flex-shrink:0;display:flex;align-items:center"><span style="font-size:20px;font-weight:800;color:var(--blue);white-space:nowrap">American ${fl.flightNum}</span></div>` : ''}
    <div style="flex:1;text-align:center;padding:8px 4px">
      <div style="font-size:13px;font-weight:600;color:var(--text)">${depLabel}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">Flight ${flightIdx+1} of ${totalFlights} · ← prev · → next / new</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:5px 8px;border-left:1px solid var(--border);flex-shrink:0">
      ${crewInput('crewN1','Capt',fl.crewN1)}
      ${crewInput('crewN2','F/O', fl.crewN2)}
      ${crewInput('crewN3','RO 1',fl.crewN3)}
      ${crewInput('crewN4','RO 2',fl.crewN4)}
    </div>
    <button onclick="deleteFlightSlot()" style="background:none;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);padding:10px 10px;cursor:pointer;color:var(--text3);font-size:12px;font-weight:600;line-height:1;flex-shrink:0" title="Delete this flight">✕</button>
    <button onclick="shiftFlight(1)" style="background:none;border:none;padding:10px 14px;cursor:pointer;color:var(--text);font-size:12px;line-height:1;flex-shrink:0">&#8594;</button>
  </div>`;

  // ── Live dual clock ──────────────────────────────────────────────────────
  // Arrival time display (scheduled)
  const arrLocalDisp = arrUTC !== null ? minToHHMM(fromUTC(arrUTC, arrOff)) : '—:——';
  const arrUTCDisp   = arrUTC !== null ? minToHHMM(arrUTC) : '—:——';
  const arrDayLabel  = (arrDate && arrTime) ? DAYS[new Date(arrDate+'T'+arrTime).getDay()] : '';

  html += `<div class="tz-bar" style="margin-bottom:8px">
    <div class="tz-block">
      <div class="tz-label">${depCity} local</div>
      <div class="tz-time" style="color:var(--blue)">${fmt(localNow)}</div>
      <div class="tz-body">${DAYS[localNow.getDay()]} · ${minToHHMM(toUTC(localNow.getHours()*60+localNow.getMinutes(), depOff))} UTC</div>
    </div>
    <div class="tz-block" style="margin-left:1px;border-left:2px solid var(--green);border-right:2px solid var(--green);padding:4px 6px">
      <div class="tz-label">Arrival · ${arrCity}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:5px">
        <button onclick="adjustArrTime(-1)" style="padding:1px 7px;border-radius:4px;border:1px solid var(--green);background:var(--green-l);color:var(--green);font-size:14px;font-weight:700;cursor:pointer;line-height:1.4">−</button>
        <div class="tz-time" style="color:var(--green);margin:0">${arrLocalDisp}</div>
        <button onclick="adjustArrTime(1)" style="padding:1px 7px;border-radius:4px;border:1px solid var(--green);background:var(--green-l);color:var(--green);font-size:14px;font-weight:700;cursor:pointer;line-height:1.4">+</button>
      </div>
      <div class="tz-body">${arrDayLabel}${arrDayLabel?' · ':''}${arrUTCDisp} UTC</div>
    </div>
    <div class="tz-block" style="margin-left:1px">
      <div class="tz-label">${arrCity} ${arrTZ}</div>
      <div class="tz-time" style="color:var(--amber)">${fmt(arrNow)}</div>
      <div class="tz-body">${DAYS[arrNow.getDay()]} · ${minToHHMM(toUTC(arrNow.getHours()*60+arrNow.getMinutes(), arrOff))} UTC</div>
    </div>
  </div>`;

  // ── Flight details card ───────────────────────────────────────────────────
  html += `<div class="card" style="margin-bottom:8px" id="flight-details-card">

  // ── IDL notice ───────────────────────────────────────────────────────────

// ── Flight state helpers ───────────────────────────────────────────────────
// Centralised flight accessor — avoids repeating the three-line guard everywhere.
function currentFlight() {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  if (state.flightIdx >= state.flights.length) state.flightIdx = state.flights.length - 1;
  return state.flights[state.flightIdx] || {};
}

// Break-alarm key maps — single source of truth
const BREAK_TIME_KEY = { wake:'wakeTime', break2:'break2Time', break3:'break3Time', break4:'break4Time' };
const BREAK_DATE_KEY = { wake:'wakeDate', break2:'break2Date', break3:'break3Date', break4:'break4Date' };

function setFlight(key, val) {
  if (!state.flights) state.flights = [{}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  if (!state.flights[state.flightIdx]) state.flights[state.flightIdx] = {};
  state.flights[state.flightIdx][key] = val;
  state.flight = state.flights[state.flightIdx]; // keep legacy ref in sync
  saveState();
  if (key === 'arrCity') setTimeout(preloadRefGuide, 200);
  render();
}

function adjustArrTime(deltaMins) {
  const fl = currentFlight();
  const parts = (fl.arrTime || '00:00').split(':');
  let total = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0) + deltaMins;
  const dateStr = fl.arrDate || '';
  if (total < 0 || total >= 1440) {
    const dir = total < 0 ? -1 : 1;
    total = ((total % 1440) + 1440) % 1440;
    if (dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      d.setDate(d.getDate() + dir);
      setFlight('arrDate', d.toISOString().split('T')[0]);
      return;
    }
  }
  setFlight('arrTime', String(Math.floor(total / 60)).padStart(2,'0') + ':' + String(total % 60).padStart(2,'0'));
}

function swapFlightCities() {
  const fl = currentFlight();
  setFlight('depCity', fl.arrCity || 'LHR');
  setFlight('arrCity', fl.depCity || 'PHX');
}

function shiftFlight(dir) {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const newIdx = state.flightIdx + dir;
  if (newIdx < 0) return;
  if (newIdx >= state.flights.length) state.flights.push({});
  state.flightIdx = newIdx;
  state.flight = state.flights[state.flightIdx] || {};
  saveState();
  render();
  setTimeout(updateBreakCountdowns, 50);
}

function deleteFlightSlot() {
  if (!state.flights || state.flights.length <= 1) {
    state.flights = [{}];
    state.flightIdx = 0;
  } else {
    state.flights.splice(state.flightIdx, 1);
    state.flightIdx = Math.min(state.flightIdx, state.flights.length - 1);
    state.flights[state.flightIdx] = {};
  }
  state.flight = state.flights[state.flightIdx] || {};
  saveState();
  render();
  setTimeout(updateBreakCountdowns, 50);
}

function breakAlarmPlus3(prefix) {
  const fl = currentFlight();
  const timeKey = BREAK_TIME_KEY[prefix] || 'wakeTime';
  const dateKey = BREAK_DATE_KEY[prefix] || 'wakeDate';
  const baseMs = (fl[dateKey] && validTime(fl[timeKey]))
    ? new Date(`${fl[dateKey]}T${fl[timeKey]}:00Z`).getTime()
    : Date.now();
  const t = new Date(baseMs + 3 * 3600000);
  setFlight(timeKey, `${String(t.getUTCHours()).padStart(2,'0')}:${String(t.getUTCMinutes()).padStart(2,'0')}`);
  setFlight(dateKey, `${t.getUTCFullYear()}-${String(t.getUTCMonth()+1).padStart(2,'0')}-${String(t.getUTCDate()).padStart(2,'0')}`);
}

function clearBreakAlarm(prefix) {
  setFlight(BREAK_TIME_KEY[prefix] || 'wakeTime', '');
  setFlight(BREAK_DATE_KEY[prefix] || 'wakeDate', '');
}

// ── Shortcuts alarm integration ───────────────────────────────────────────
function openShortcutsAlarm() {
  const fl = currentFlight();
  const alarms = [];
  if (fl.wakeDate   && validTime(fl.wakeTime))   alarms.push({ label:'Break Alarm 1', date:fl.wakeDate,   time:fl.wakeTime });
  if (fl.break2Date && validTime(fl.break2Time)) alarms.push({ label:'Break Alarm 2', date:fl.break2Date, time:fl.break2Time });
  if (fl.break3Date && validTime(fl.break3Time)) alarms.push({ label:'Break Alarm 3', date:fl.break3Date, time:fl.break3Time });
  if (fl.break4Date && validTime(fl.break4Time)) alarms.push({ label:'Break Alarm 4', date:fl.break4Date, time:fl.break4Time });
  if (!alarms.length) return;

  const lines = ['PROTOCOL BREAK ALARMS', ''];
  alarms.forEach(a => {
    const ms    = new Date(a.date + 'T' + a.time + ':00Z').getTime();
    const local = new Date(ms);
    const lh    = String(local.getHours()).padStart(2,'0');
    const lm    = String(local.getMinutes()).padStart(2,'0');
    lines.push(a.label + ': ' + a.date + ' at ' + a.time + ' UTC');
    lines.push('Local device time: ' + lh + ':' + lm);
    lines.push('');
  });
  lines.push('Message: WAKE UP — end crew rest now');
  const text = lines.join('\n');

  const copy = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    } catch(e) {}
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(copy);
  } else { copy(); }

  showShortcutsOverlay(alarms);
}

function showShortcutsOverlay(alarms) {

  const isLight = document.body.classList.contains('light');

  const t2    = isLight ? '#5f5e5a' : '#8892a4';

  const btnbg = isLight ? '#185FA5' : '#185FA5';

  const rows = alarms.map(a => {
    const ms    = new Date(a.date + 'T' + a.time + ':00Z').getTime();
    const local = new Date(ms);
    const lh    = String(local.getHours()).padStart(2,'0');
    const lm    = String(local.getMinutes()).padStart(2,'0');
    return '<div style="margin:8px 0;padding:10px;border-radius:8px;border:1px solid ' + bdr + '">'
      + '<div style="font-size:13px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">' + a.label + '</div>'
      + '<div style="font-size:13px;font-weight:700;font-family:SF Mono,monospace;color:' + t1 + '">' + a.time + ' UTC</div>'
      + '<div style="font-size:12px;color:' + t2 + ';margin-top:2px">' + lh + ':' + lm + ' device local time</div>'
      + '</div>';
  }).join('');

  const ov = document.createElement('div');
  ov.id = 'sc-overlay';
  ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:' + outer + ';display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML = '<div style="background:' + bg + ';border-radius:16px;padding:22px;width:100%;max-width:340px;border:1px solid ' + bdr + '">'
    + '<div style="font-size:17px;font-weight:700;color:' + t1 + ';margin-bottom:3px">Alarm times copied</div>'
    + '<div style="font-size:12px;color:' + t2 + ';margin-bottom:12px">Alarm details are on your clipboard</div>'
    + rows
    + '<div style="border-top:1px solid ' + bdr + ';margin:14px 0"></div>'
    + '<div style="font-size:12px;color:' + t2 + ';line-height:1.65;margin-bottom:14px">'
    + '<strong style="color:' + t1 + '">One-time setup:</strong> In Shortcuts, create a shortcut called "Protocol Alarm" with a Receive Input action, then a Set Timer or Create Reminder action using the clipboard text. After setup, this button does it in one tap.<br><br>'
    + 'Or: open Shortcuts, tap + to add a new automation timed to each alarm time below, and add a notification action saying "WAKE UP — end crew rest".'
    + '</div>'
    + '<a href="shortcuts://" style="display:block;padding:12px;border-radius:10px;background:' + btnbg + ';color:#fff;text-align:center;font-size:12px;font-weight:700;text-decoration:none;margin-bottom:8px">Open Shortcuts</a>'
    + '<button onclick="dismissShortcutsOverlay()" style="width:100%;padding:10px;border-radius:10px;border:1px solid ' + bdr + ';background:transparent;color:' + t2 + ';font-size:13px;cursor:pointer">Dismiss</button>'
    + '</div>';
  document.body.appendChild(ov);
  ov.addEventListener('click', function(e){ if(e.target===ov) dismissShortcutsOverlay(); });
}

function showOceanicNotes() {
  const existing = document.getElementById('oceanic-notes-pop');
  if (existing) { existing.remove(); return; }

  if (!state.flights) state.flights = [{}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const fl = state.flights[state.flightIdx] || {};

  const pop = document.createElement('div');
  pop.id = 'oceanic-notes-pop';
  pop.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column';

  const bar = document.createElement('div');
  bar.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0';

  const ttl = document.createElement('div');
  ttl.style.cssText = 'font-size:14px;font-weight:700;color:var(--text)';
  ttl.textContent = 'Oceanic Notes';

  const cls = document.createElement('button');
  cls.textContent = '✕ Close';
  cls.style.cssText = 'padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer';
  cls.addEventListener('click', () => pop.remove());

  bar.appendChild(ttl);
  bar.appendChild(cls);

  const bdy = document.createElement('div');
  bdy.style.cssText = 'flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:flex;flex-direction:column';

  const ta = document.createElement('textarea');
  ta.placeholder = 'Oceanic notes for this flight...';
  ta.value = fl.oceanicNotes || '';
  ta.style.cssText = 'flex:1;width:100%;min-height:300px;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;line-height:1.8;resize:none;font-family:inherit';

  // Save directly to state — do NOT call render() or setFlight() to avoid destroying the popup
  ta.addEventListener('input', e => {
    if (!state.flights) state.flights = [{}];
    if (!state.flights[state.flightIdx]) state.flights[state.flightIdx] = {};
    state.flights[state.flightIdx].oceanicNotes = e.target.value;
    state.flight = state.flights[state.flightIdx];
    saveState();
  });

  bdy.appendChild(ta);
  pop.appendChild(bar);
  pop.appendChild(bdy);
  document.body.appendChild(pop);

  // Focus textarea after mount
  setTimeout(() => ta.focus(), 50);
}

function openClockAlarm(hour, min, label) {
  const h = String(hour % 24).padStart(2,'0');
  const m = String(min % 60).padStart(2,'0');
  showClockToast(h, m, label);
}

function openClockAlarmUTC(dateStr, timeStr, label) {
  const alarmMs = new Date(dateStr + 'T' + timeStr + ':00Z').getTime();
  const local = new Date(alarmMs);
  openClockAlarm(local.getHours(), local.getMinutes(), label);
}

// ── Break alarm countdowns ──────────────────────────────────────────────────
let alarmFired = { 'cd-break1': false, 'cd-break2': false, 'cd-break3': false, 'cd-break4': false };

function updateBreakCountdowns() {
  if (tab !== 'flight') return;
  const fl = state.flights ? (state.flights[state.flightIdx] || {}) : (state.flight || {});
  const utcNowMs = Date.now();

  // Derive break date from dep/arr dates: start at depDate, advance days until
  // the break UTC time falls within the flight window (dep → arr + 4h buffer).
  // Falls back to today/tomorrow if no dep date set.
  function resolveBreakDate(timeStr) {
    const p = timeStr.split(':');
    const brkHr  = parseInt(p[0]);
    const brkMin = parseInt(p[1]);
    const depDate = fl.depDate;
    const arrDate = fl.arrDate;
    const depTime = fl.depTime || '00:00';
    const arrTime = fl.arrTime || '23:59';
    if (depDate) {
      // Build dep and arr boundaries purely in UTC
      const depMs = new Date(depDate + 'T' + depTime + ':00Z').getTime();
      const arrMs = arrDate
        ? new Date(arrDate + 'T' + arrTime + ':00Z').getTime() + 4 * 3600000
        : depMs + 30 * 3600000;
      // Try depDate through depDate+4 to handle long Pacific routes
      for (let d = 0; d <= 4; d++) {
        const base = new Date(depDate + 'T00:00:00Z');
        base.setUTCDate(base.getUTCDate() + d);
        const candidate = base.getTime() + brkHr * 3600000 + brkMin * 60000;
        if (candidate >= depMs - 3600000 && candidate <= arrMs) return base.toISOString().slice(0, 10);
      }
      return depDate;
    }
    // No dep date — use today or tomorrow UTC
    const now = new Date();
    const todayUTC = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), brkHr, brkMin, 0);
    const base = todayUTC >= Date.now()
      ? new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()))
      : new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + 1));
    return base.toISOString().slice(0, 10);
  }

  function countdownFor(ignoredDate, timeStr, elId) {
    const el = document.getElementById(elId);
    if (!el) return;
    if (!timeStr || !validTime(timeStr)) { el.textContent = '—'; alarmFired[elId] = false; return; }
    const dateStr = resolveBreakDate(timeStr);
    let alarmMs;
    alarmMs = new Date(dateStr + 'T' + timeStr + ':00Z').getTime();
    if (isNaN(alarmMs)) { el.textContent = '??'; return; }
    const diffMs = alarmMs - utcNowMs;
    if (diffMs <= 0) {
      if (diffMs < -600000) {
        el.textContent = 'DONE'; el.style.color = 'var(--text3)';
        if (el.parentElement) el.parentElement.style.opacity = '0.5';
        alarmFired[elId] = false;
      } else {
        el.textContent = 'WAKE'; el.style.color = '#ef4444';
        if (el.parentElement) el.parentElement.style.opacity = '1';
      }
      return;
    }
    if (alarmFired[elId] && diffMs > 10000) alarmFired[elId] = false;
    if (el.parentElement) el.parentElement.style.opacity = '1';
    const totalSecs = Math.floor(diffMs / 1000);
    const hrs  = Math.floor(totalSecs / 3600);
    const mins = Math.floor((totalSecs % 3600) / 60);
    const secs = totalSecs % 60;
    el.textContent = String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    if (elId === 'cd-break1') el.style.color = totalSecs < 1800 ? '#ef4444' : 'var(--amber)';
    if (elId === 'cd-break2') el.style.color = totalSecs < 1800 ? '#ef4444' : '#ec4899';
    if (elId === 'cd-break3') el.style.color = totalSecs < 1800 ? '#ef4444' : 'var(--teal)';
    if (elId === 'cd-break4') el.style.color = totalSecs < 1800 ? '#ef4444' : 'var(--purple)';
  }

  countdownFor(fl.wakeDate,   fl.wakeTime,   'cd-break1');
  countdownFor(fl.break2Date, fl.break2Time, 'cd-break2');
  countdownFor(fl.break3Date, fl.break3Time, 'cd-break3');
  countdownFor(fl.break4Date, fl.break4Time, 'cd-break4');
}

setInterval(updateBreakCountdowns, 1000);

function captureFlightTime(prefix) {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const fl = state.flights[state.flightIdx] || {};
  const depOff = {LAX:-420,DFW:-300,JFK:-240,CLT:-240,PHX:-420,MIA:-240}[fl.depCity||'PHX'] || -420;
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  const isBreak = prefix === 'wake' || prefix === 'break2';
  let h, m, yyyy, mm, dd;
  if (isBreak) {
    // Break alarms are UTC — extract UTC values directly from now
    const nowObj = new Date();
    h    = String(nowObj.getUTCHours()).padStart(2,'0');
    m    = String(nowObj.getUTCMinutes()).padStart(2,'0');
    yyyy = nowObj.getUTCFullYear();
    mm   = String(nowObj.getUTCMonth()+1).padStart(2,'0');
    dd   = String(nowObj.getUTCDate()).padStart(2,'0');
  } else {
    const offset = prefix === 'arr'
      ? ((function(){ const c = (CITY_LIST||[{v:'LHR',off:60}]).find(x=>x.v===(fl.arrCity||'LHR')); return c?c.off:60; })())
      : depOff;
    const ln = new Date(utcMs + offset * 60000);
    h    = String(ln.getHours()).padStart(2,'0');
    m    = String(ln.getMinutes()).padStart(2,'0');
    yyyy = ln.getFullYear();
    mm   = String(ln.getMonth()+1).padStart(2,'0');
    dd   = String(ln.getDate()).padStart(2,'0');
  }
  setFlight(prefix+'Time', `${h}:${m}`);
  setFlight(prefix+'Date', `${yyyy}-${mm}-${dd}`);
}

function pickupPlus24() {
  const lay = state.layover || {};
  const checkinDate = lay.checkinDate || '';
  const checkinTime = lay.checkinTime || '';
  if (!checkinDate || !checkinTime) {
    alert('Enter check-in date and time first');
    return;
  }
  const ci = new Date(`${checkinDate}T${checkinTime}`);
  const pu = new Date(ci.getTime() + 24 * 60 * 60000);
  const h  = String(pu.getHours()).padStart(2,'0');
  const m  = String(pu.getMinutes()).padStart(2,'0');
  const yyyy = pu.getFullYear();
  const mm   = String(pu.getMonth()+1).padStart(2,'0');

  setLayover('pickupTime', `${h}:${m}`);
  setLayover('pickupDate', `${yyyy}-${mm}-${dd}`);
}


function showRefGuide(depIcao, arrIcao, flightNum) {
  const ex=document.getElementById('ref-guide-pop'); if(ex){ex.remove();return;}
  const dep=(depIcao||'').toUpperCase();
  const arr=(arrIcao||'').toUpperCase();
  const atlanticPorts=['LHR','FCO','DUB','MAD','CDG','LGW','AMS','FRA','BCN','ZRH','BRU','MAN','OSL','ARN'];
  const pacificPorts=['ICN','NRT','HND','AKL','SYD','PEK','PVG','HKG','NAN','PPT'];
  const isAtlantic=atlanticPorts.some(p=>dep===p||arr===p);
  const isPacific =pacificPorts.some(p=>dep===p||arr===p);

  const pop=document.createElement('div'); pop.id='ref-guide-pop';
  pop.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;box-sizing:border-box';
  const bar=document.createElement('div'); bar.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0';
  const tabRow=document.createElement('div'); tabRow.style.cssText='display:flex;gap:6px';
  let activeGuide=isAtlantic?'atlantic':(isPacific?'pacific':'atlantic');
  const content=document.createElement('div'); content.style.cssText='flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;touch-action:pan-y pinch-zoom';

  const CK_KEY='refguide_marks_';
  const loadMarks=(g)=>{ try{return JSON.parse(localStorage.getItem(CK_KEY+g)||'{}')}catch(e){return{}} };
  const saveMarks=(g,m)=>{ try{localStorage.setItem(CK_KEY+g,JSON.stringify(m))}catch(e){} };
  const drawMarks=(canvas,marks,idx)=>{
    const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height);
    const r=canvas.width*0.009; // scales with image resolution, ~capital-O sized
    (marks[idx]||[]).forEach(([rx,ry])=>{
      const x=rx*canvas.width, y=ry*canvas.height;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle='rgba(16,185,129,0.85)'; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=r*0.21;
      ctx.beginPath(); ctx.moveTo(x-r*0.43,y); ctx.lineTo(x-r*0.07,y+r*0.36); ctx.lineTo(x+r*0.5,y-r*0.43); ctx.stroke();
    });
  };

  const renderGuide=(guide)=>{
    content.innerHTML=''; activeGuide=guide;
    [atlBtn,pacBtn].forEach(b=>{b.style.background='transparent';b.style.color='var(--text2)'});
    if(guide==='atlantic'){atlBtn.style.background='var(--blue)';atlBtn.style.color='#fff';}
    else{pacBtn.style.background='var(--blue)';pacBtn.style.color='#fff';}
    let marks=loadMarks(guide);
    const pageImgs=guide==='atlantic'?EUROPE_PAGES:PACIFIC_PAGES;
    pageImgs.forEach((src,idx)=>{
      const pgLbl=document.createElement('div');
      pgLbl.style.cssText='font-size:12px;color:var(--text3);text-align:center;padding:4px 0;letter-spacing:0.3px';
      pgLbl.textContent='Page '+(idx+1)+' of '+pageImgs.length; content.appendChild(pgLbl);
      const wrap=document.createElement('div');
      wrap.style.cssText='position:relative;width:100%;margin-bottom:20px;border:1px solid var(--border);border-radius:4px;overflow:hidden;touch-action:pan-x pan-y pinch-zoom';
      const img=document.createElement('img'); img.src=src;
      img.style.cssText='width:100%;display:block;user-select:none;-webkit-user-select:none'; img.draggable=false;
      const canvas=document.createElement('canvas');
      canvas.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;touch-action:pan-x pan-y pinch-zoom';
      const setupCanvas=()=>{canvas.width=img.naturalWidth;canvas.height=img.naturalHeight;drawMarks(canvas,marks,idx)};
      if(img.complete)setupCanvas(); else img.addEventListener('load',setupCanvas);
      let _ptrs={},_moved=false,_startT=0;
      canvas.addEventListener('pointerdown',e=>{_ptrs[e.pointerId]=true;_moved=false;_startT=Date.now()});
      canvas.addEventListener('pointermove',e=>{
        if(Object.keys(_ptrs).length>1)_moved=true;
        else if(e.movementX!=null&&(Math.abs(e.movementX)+Math.abs(e.movementY))>6)_moved=true;
      });
      canvas.addEventListener('pointerup',e=>{
        delete _ptrs[e.pointerId];
        if(!(!_moved&&Object.keys(_ptrs).length===0&&(Date.now()-_startT)<400))return;
        const rect=canvas.getBoundingClientRect();
        const rx=(e.clientX-rect.left)/rect.width, ry=(e.clientY-rect.top)/rect.height;
        if(!marks[idx])marks[idx]=[];
        const hi=marks[idx].findIndex(([ox,oy])=>{const dx=(ox-rx)*rect.width,dy=(oy-ry)*rect.height;return Math.sqrt(dx*dx+dy*dy)<14});
        if(hi>=0)marks[idx].splice(hi,1); else marks[idx].push([rx,ry]);
        saveMarks(guide,marks); drawMarks(canvas,marks,idx);
      });
      canvas.addEventListener('pointercancel',e=>{delete _ptrs[e.pointerId]});
      wrap.appendChild(img); wrap.appendChild(canvas); content.appendChild(wrap);
    });
    const resetBtn=document.createElement('button'); resetBtn.textContent='Clear All Marks';
    resetBtn.style.cssText='width:100%;margin-top:8px;padding:10px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:13px;cursor:pointer';
    resetBtn.addEventListener('click',()=>{saveMarks(guide,{});renderGuide(guide)});
    content.appendChild(resetBtn);
  };

  const atlBtn=document.createElement('button'); atlBtn.textContent='Atlantic'; atlBtn.style.cssText='padding:5px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer';
  const pacBtn=document.createElement('button'); pacBtn.textContent='Pacific';  pacBtn.style.cssText='padding:5px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer';
  atlBtn.addEventListener('click',()=>renderGuide('atlantic'));
  pacBtn.addEventListener('click',()=>renderGuide('pacific'));
  const clrBtn=document.createElement('button'); clrBtn.textContent='Clear';
  clrBtn.style.cssText='padding:5px 12px;border-radius:6px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:12px;font-weight:600;cursor:pointer';
  clrBtn.addEventListener('click',()=>{saveMarks(activeGuide,{});renderGuide(activeGuide);});
  const closBtn=document.createElement('button'); closBtn.textContent='✕'; closBtn.style.cssText='padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;margin-left:auto';
  closBtn.addEventListener('click',()=>pop.remove());
  tabRow.appendChild(atlBtn); tabRow.appendChild(pacBtn); tabRow.appendChild(clrBtn);
  bar.appendChild(tabRow); bar.appendChild(closBtn);
  pop.appendChild(bar); pop.appendChild(content);
  document.body.appendChild(pop);
  renderGuide(activeGuide);
}

function renderArrival(c) {

  const fmt = d => { const h=String(d.getHours()).padStart(2,'0'); const m=String(d.getMinutes()).padStart(2,'0'); return h+':'+m; };
  const minToHHMM = m => { const n=((m%1440)+1440)%1440; return String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0'); };
  const toUTC = (localMin, offsetMin) => ((localMin - offsetMin) % 1440 + 1440) % 1440;
  const fromUTC = (utcMin, offsetMin) => ((utcMin + offsetMin) % 1440 + 1440) % 1440;
  const parseHHMM = v => { if (!v) return null; const p=v.split(':'); return p.length===2?parseInt(p[0])*60+parseInt(p[1]):null; };
